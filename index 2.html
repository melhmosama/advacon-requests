<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>ADVACON — Service Requests</title>
<style>
:root{
  --navy:#15406E;--navy2:#1B4D7E;--med:#2A5C8A;--accent:#3E6E9E;--steel:#5B7A99;
  --lblue:#DCE6F0;--pale:#EEF2F7;--lgray:#F4F6F9;--head:#EAEEF3;--grid:#D3DAE3;
  --txt:#23303D;--grey:#6E7A87;--white:#fff;
  --green:#3C7D5A;--amber:#C08A3E;--red:#B0504A;--purple:#6E5C8A;
  --shadow:0 1px 3px rgba(21,64,110,.08),0 4px 16px rgba(21,64,110,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--lgray);color:var(--txt);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
.app{min-height:100vh;display:flex;flex-direction:column}
/* gate */
.gate{position:fixed;inset:0;background:linear-gradient(135deg,#15406E,#0E2C4D);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.gate-card{background:#fff;border-radius:18px;padding:40px 34px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.35);max-width:460px;width:100%}
.gate-card img{height:58px;margin-bottom:8px}
.gate-card .co{font-size:11px;letter-spacing:.08em;color:var(--grey);font-weight:700}
.gate-card .intro{margin:16px 0 22px}
.gate-card .intro-ar{direction:rtl;font-size:15px;font-weight:700;color:var(--navy);line-height:1.6;margin-bottom:6px}
.gate-card .intro-ar-sub{direction:rtl;font-size:12.5px;color:var(--steel);line-height:1.6;margin-bottom:14px}
.gate-card .intro-en{font-size:13px;font-weight:600;color:var(--med);line-height:1.5;margin-bottom:5px}
.gate-card .intro-en-sub{font-size:11.5px;color:var(--grey);line-height:1.5}
.gate-card .intro::after{content:"";display:block;height:1px;background:var(--grid);margin:16px auto 0;width:70%}
.gate-card h2{font-size:18px;color:var(--navy);margin-bottom:4px}
.gate-card .sub{font-size:13px;color:var(--steel);margin-bottom:18px;direction:rtl}
.lang-btns{display:flex;gap:12px}
.lang-btns button{flex:1;padding:18px;border:2px solid var(--grid);background:var(--white);border-radius:13px;cursor:pointer;font-family:inherit;transition:.18s;display:flex;flex-direction:column;gap:3px;align-items:center}
.lang-btns button:hover{border-color:var(--accent);background:var(--pale)}
.lang-btns .big{font-size:19px;font-weight:700;color:var(--navy)}
.lang-btns .small{font-size:11px;color:var(--grey)}
.gate-card input{font-family:inherit;font-size:16px;padding:12px;border:1.5px solid var(--grid);border-radius:8px;width:100%}
/* topbar */
.topbar{background:var(--white);border-bottom:3px solid var(--navy);box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.topbar-inner{max-width:1280px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{height:38px}
.brand-txt{display:flex;flex-direction:column;line-height:1.15}
.brand-txt .co{font-size:9px;letter-spacing:.06em;color:var(--grey);font-weight:700}
.brand-txt .sys{font-size:15px;font-weight:700;color:var(--navy)}
.nav{margin-inline-start:auto;display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.nav button{background:none;border:none;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--grey);cursor:pointer;border-radius:7px;font-family:inherit;transition:.15s;white-space:nowrap}
.nav button:hover{background:var(--lgray);color:var(--navy)}
.nav button.active{background:var(--navy);color:var(--white)}
.langtoggle{border:1.5px solid var(--grid)!important;color:var(--med)!important;font-weight:700!important}
.wrap{max-width:1280px;margin:0 auto;padding:22px 18px;width:100%;flex:1}
.phead{margin-bottom:18px}
.phead .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700}
.phead h1{font-size:24px;color:var(--navy);font-weight:700;margin-top:2px}
.phead p{color:var(--grey);margin-top:4px;font-size:13px}
.panel{background:var(--white);border:1px solid var(--grid);border-radius:12px;box-shadow:var(--shadow)}
.panel-pad{padding:22px}
/* form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:12.5px;font-weight:600;color:var(--med)}
label .req{color:var(--red)}
input,select,textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--grid);border-radius:8px;background:var(--white);color:var(--txt);transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,110,158,.13)}
textarea{resize:vertical;min-height:80px}
.hint{font-size:11.5px;color:var(--grey)}
.btn{background:var(--navy);color:var(--white);border:none;padding:11px 22px;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn:hover{background:var(--navy2)}
.btn.sm{padding:7px 13px;font-size:12.5px}
.btn.sec{background:var(--white);color:var(--navy);border:1.5px solid var(--grid)}
.btn.sec:hover{background:var(--lgray)}
.btn.danger{background:var(--white);color:var(--red);border:1.5px solid #E8C9C7}
.btn.danger:hover{background:#FBF0EF}
.btn.green{background:var(--green)}.btn.green:hover{background:#346B4E}
.btnrow{display:flex;gap:10px;margin-top:8px;align-items:center;flex-wrap:wrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--green);color:#fff;padding:12px 22px;border-radius:10px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:150;transition:.35s;font-size:13.5px;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
/* kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--white);border:1px solid var(--grid);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lab{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--grey);font-weight:700}
.kpi .val{font-size:27px;font-weight:700;color:var(--navy);margin-top:4px}
.kpi .bar{position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--med)}
/* quick counters */
.qcount{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.qchip{background:var(--white);border:1px solid var(--grid);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow)}
.qchip b{font-size:16px}
.qchip .dot{width:9px;height:9px;border-radius:50%}
/* table */
.tablewrap{overflow-x:auto;border-radius:12px;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;background:var(--white);font-size:13px;min-width:760px}
thead th{background:var(--med);color:#fff;font-weight:600;text-align:start;padding:10px 11px;white-space:nowrap;font-size:11.5px}
tbody td{padding:9px 11px;border-bottom:1px solid var(--grid);vertical-align:middle}
tbody tr:hover{background:var(--pale)}
.id-cell{font-variant-numeric:tabular-nums;font-weight:600;color:var(--med);white-space:nowrap}
.pri{font-weight:700;font-size:12px}
.pri.High{color:var(--red)}.pri.Med{color:var(--amber)}.pri.Low{color:var(--steel)}
.mini-input{padding:6px 8px;font-size:12.5px;border:1px solid var(--grid);border-radius:6px;min-width:110px;font-family:inherit}
.mini-input.dt{min-width:138px}.mini-input.dur{min-width:56px;width:62px;text-align:center}
.mini-input.notes{min-width:150px}
.daysleft{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.progress-wrap{background:var(--grid);border-radius:10px;height:18px;width:90px;overflow:hidden;position:relative}
.progress-bar{height:100%;border-radius:10px;background:var(--accent)}
.progress-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--txt)}
.rowbtn{background:none;border:1px solid var(--grid);border-radius:6px;cursor:pointer;padding:5px 8px;font-size:13px;line-height:1;transition:.15s}
.rowbtn.del{color:var(--red)}.rowbtn.del:hover{background:#FBF0EF;border-color:#E8C9C7}
.rowbtn.close{color:var(--green)}.rowbtn.close:hover{background:#EAF3EE;border-color:#BFE0CC}
.empty{padding:44px 20px;text-align:center;color:var(--grey)}
/* filter bar */
.filterbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filterbar select,.filterbar input{padding:8px 10px;font-size:13px;width:auto;min-width:130px}
.filterbar .spacer{flex:1}
.count-chip{background:var(--lblue);color:var(--navy);padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap}
.section-head{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--navy);margin:4px 0 12px;flex-wrap:wrap}
.section-head .spacer{flex:1}
.sec-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.sec-dot.inbox{background:var(--amber)}.sec-dot.work{background:var(--green)}
/* pagination */
.pager{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:16px;flex-wrap:wrap}
.pager button{min-width:36px;height:36px;border:1px solid var(--grid);background:var(--white);border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--med);padding:0 10px}
.pager button:hover:not(:disabled){background:var(--pale)}
.pager button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.pager button:disabled{opacity:.4;cursor:default}
.pager .pinfo{font-size:12.5px;color:var(--grey);margin:0 8px}
/* charts */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.chart-card{background:var(--white);border:1px solid var(--grid);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.chart-card h3{font-size:14px;color:var(--navy);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bar-row .blab{font-size:12px;width:130px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--lgray);border-radius:6px;height:21px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-inline-start:7px;color:#fff;font-size:11px;font-weight:700;min-width:22px}
/* settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.list-card{background:var(--white);border:1px solid var(--grid);border-radius:11px;overflow:hidden}
.list-card h3{background:var(--head);color:var(--navy);padding:11px 15px;font-size:13px;border-bottom:1px solid var(--grid);display:flex;justify-content:space-between;align-items:center}
.list-card .items{padding:8px;max-height:260px;overflow-y:auto}
.list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px}
.list-item:hover{background:var(--lgray)}
.list-item span{flex:1;font-size:13px}
.list-item button{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;line-height:1}
.additem{display:flex;gap:8px;padding:10px;border-top:1px solid var(--grid)}
.additem input{flex:1}
.wtoggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 22px}
.wtoggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--grid);font-size:13.5px}
.switch{width:42px;height:24px;border-radius:14px;background:var(--grid);border:none;cursor:pointer;position:relative;transition:.2s;padding:0;flex-shrink:0}
.switch.on{background:var(--green)}
.switch .knob{position:absolute;top:3px;inset-inline-start:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on .knob{inset-inline-start:21px}
/* thanks */
.thanks-wrap{display:flex;align-items:center;justify-content:center;min-height:60vh;padding:18px}
.thanks-card{background:var(--white);border:1px solid var(--grid);border-radius:18px;box-shadow:var(--shadow);padding:40px 32px;text-align:center;max-width:460px;width:100%}
.thanks-check{width:68px;height:68px;border-radius:50%;background:var(--green);color:#fff;font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 8px 24px rgba(60,125,90,.3)}
.thanks-card h1{font-size:24px;color:var(--navy);margin-bottom:8px}
.thanks-msg{color:var(--steel);font-size:14px;margin-bottom:16px}
.thanks-id{display:inline-block;background:var(--lblue);color:var(--navy);font-weight:700;padding:7px 18px;border-radius:24px;font-size:15px;letter-spacing:1px;margin-bottom:22px}
.thanks-contact{background:var(--lgray);border-radius:12px;padding:16px;margin-bottom:22px}
.thanks-contact p{font-size:12.5px;color:var(--grey);margin-bottom:8px}
.thanks-name{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
.thanks-phone{font-size:18px;font-weight:700;color:var(--med);text-decoration:none;display:inline-block}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,40,70,.5);display:flex;align-items:center;justify-content:center;z-index:160;padding:16px}
.modal{background:#fff;border-radius:14px;padding:26px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:17px;color:var(--navy);margin-bottom:10px}
.modal p{font-size:13.5px;color:var(--steel);margin-bottom:18px;line-height:1.6}
.modal .modal-form{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.modal .btnrow{justify-content:flex-end;margin-top:0}
.note-cell{font-size:12px;color:var(--purple);max-width:160px}
.req-text{font-size:13px}
@media(max-width:820px){
  .form-grid,.settings-grid,.charts,.wtoggle-grid{grid-template-columns:1fr}
  .kpis{grid-template-columns:1fr 1fr}
  .brand-txt .sys{font-size:13px}
  .brand-txt .co{font-size:8px}
  .nav{width:100%;margin-top:6px;margin-inline-start:0;overflow-x:auto}
  .wrap{padding:16px 12px}
  .phead h1{font-size:20px}
  .logo{height:32px}
}

.alert-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--navy);padding:13px 16px;border-bottom:1px solid var(--grid)}
.alert-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--grid);font-size:13px}
.alert-row:last-child{border-bottom:none}
.alert-row .alert-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alert-row .alert-meta{color:var(--grey);font-size:12px;min-width:80px;text-align:end;white-space:nowrap}
.alert-row .alert-days{font-weight:700;font-size:12px;color:var(--amber);min-width:100px;text-align:end;white-space:nowrap}
.alert-row.ov .alert-days{color:var(--red)}
</style>
</head>

function today(){return new Date().toISOString().slice(0,10);}
function fmtID(n){return 'TSK-'+String(n).padStart(4,'0');}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// derived calcs incl. AUTO-OVERDUE
function calc(r){
  const o={...r};
  if(r.start&&r.duration){const d=new Date(r.start);d.setDate(d.getDate()+Number(r.duration)-1);o.due=d.toISOString().slice(0,10);}else o.due='';
  // auto-overdue: if due passed and not complete/cancelled -> effective status Overdue
  o.effStatus=r.status;
  if(o.due && r.status!=='Complete' && r.status!=='Cancelled'){
    if(new Date(o.due)<new Date(today())) o.effStatus='Overdue';
  }
  if(o.effStatus==='Complete')o.daysleft='✓';
  else if(o.due){o.daysleft=Math.round((new Date(o.due)-new Date(today()))/86400000);}else o.daysleft='';
  const P={'Not Started':0,'Complete':1,'On Hold':.1,'Overdue':.1,'Needs Review':0,'Needs Update':0,'Cancelled':1};
  if(o.effStatus==='In Progress'){let p=.1;if(r.start){const days=Math.round((new Date(today())-new Date(r.start))/86400000)+1;p=Math.min(.8,Math.max(.1,days*.1));}o.progress=p;}
  else o.progress=P[o.effStatus]!=null?P[o.effStatus]:0;
  return o;
}
function isOpen(r){return r.accepted && r.effStatus!=='Complete' && r.effStatus!=='Cancelled';}

/* ---- realtime ---- */
let _rt=null,_rtRef=1,_rtHb=null;
async function refreshNow(){
  if(state.role!=='admin')return;
  if(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)){const sb=await sbFetchAll();if(sb!==null)state.requests=sb;return;}
  const sb=await sbFetchAll();if(sb!==null){state.requests=sb;render();}
}
function startRealtime(){
  try{if(_rt)return;
    const ws=SB_URL.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+encodeURIComponent(SB_KEY)+'&vsn=1.0.0';
    _rt=new WebSocket(ws);
    _rt.onopen=()=>{_rt.send(JSON.stringify({topic:'realtime:public:requests',event:'phx_join',payload:{config:{postgres_changes:[{event:'*',schema:'public',table:'requests'}]}},ref:String(_rtRef++)}));_rtHb=setInterval(()=>{if(_rt&&_rt.readyState===1)_rt.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:String(_rtRef++)}));},25000);};
    _rt.onmessage=(m)=>{try{const d=JSON.parse(m.data);if(d.event==='postgres_changes'||(d.payload&&d.payload.data))refreshNow();}catch(e){}};
    _rt.onclose=()=>{_rt=null;if(_rtHb){clearInterval(_rtHb);_rtHb=null;}setTimeout(()=>{if(state.role==='admin')startRealtime();},3000);};
    _rt.onerror=()=>{try{_rt.close();}catch(e){}};
  }catch(e){}
}
function startPolling(){startRealtime();}

/* ---- shared filtering ---- */
function applyFilters(arr){
  let rows=arr;
  if(filters.status)rows=rows.filter(r=>r.effStatus===filters.status);
  if(filters.project)rows=rows.filter(r=>r.project===filters.project);
  if(filters.assignee)rows=rows.filter(r=>r.assignedTo===filters.assignee);
  if(filters.q){const q=filters.q.toLowerCase();rows=rows.filter(r=>(r.title+r.requestedBy+r.assignedTo+r.notes+fmtID(r.id)).toLowerCase().includes(q));}
  return rows;
}
// smart sort: overdue first, then priority high>med>low, then newest id
function smartSort(rows){
  const prRank={High:0,Med:1,Low:2};
  return rows.sort((a,b)=>{
    const ao=a.effStatus==='Overdue'?0:1, bo=b.effStatus==='Overdue'?0:1;
    if(ao!==bo)return ao-bo;
    const ap=prRank[a.priority]!=null?prRank[a.priority]:1, bp=prRank[b.priority]!=null?prRank[b.priority]:1;
    if(ap!==bp)return ap-bp;
    return b.id-a.id;
  });
}

function pager(routeKey,totalPages){
  if(totalPages<=1)return '';
  const cur=pageNum[routeKey];
  let btns='';
  btns+=`<button onclick="setPage('${routeKey}',${cur-1})" ${cur<=1?'disabled':''}>‹</button>`;
  const win=[];for(let i=1;i<=totalPages;i++){if(i===1||i===totalPages||Math.abs(i-cur)<=1)win.push(i);else if(win[win.length-1]!=='…')win.push('…');}
  win.forEach(p=>{btns+= p==='…'?`<span class="pinfo">…</span>`:`<button class="${p===cur?'active':''}" onclick="setPage('${routeKey}',${p})">${p}</button>`;});
  btns+=`<button onclick="setPage('${routeKey}',${cur+1})" ${cur>=totalPages?'disabled':''}>›</button>`;
  return `<div class="pager">${btns}<span class="pinfo">${t('page')} ${cur} ${t('of')} ${totalPages}</span></div>`;
}
function setPage(routeKey,p){pageNum[routeKey]=p;render();window.scrollTo({top:0,behavior:'smooth'});}

/* ---- MANAGE ---- */
function viewManage(){
  let all=state.requests.map(calc);
  const pending=all.filter(r=>!r.accepted);
  pending.sort((a,b)=>b.id-a.id);
  let acc=applyFilters(all.filter(r=>r.accepted));
  acc=smartSort(acc);
  // pagination
  const totalPages=Math.max(1,Math.ceil(acc.length/PAGE_SIZE));
  if(pageNum.manage>totalPages)pageNum.manage=totalPages;
  const startI=(pageNum.manage-1)*PAGE_SIZE;
  const pageRows=acc.slice(startI,startI+PAGE_SIZE);

  const pendingTable = pending.length ? `<div class="tablewrap"><table>
    <thead><tr><th>${t('tId')}</th><th>${t('tReqBy')}</th><th>${t('tProj')}</th><th>${t('tCat')}</th><th>${t('tTitle')}</th><th>${t('tPri')}</th><th>${t('tRecv')}</th><th></th></tr></thead>
    <tbody>${pending.map(r=>`<tr>
      <td class="id-cell">${fmtID(r.id)}</td><td>${esc(r.requestedBy)}</td><td>${esc(r.project)}</td><td>${esc(r.category)}</td><td class="req-text">${esc(r.title)}</td>
      <td><span class="pri ${r.priority}">${esc(r.priority)}</span></td><td>${esc(r.received)}</td>
      <td style="white-space:nowrap"><button class="btn sm green" onclick="acceptReq(${r.id})">✓ ${t('accept')}</button> <button class="btn sm danger" onclick="declineReq(${r.id})">${t('decline')}</button></td>
    </tr>`).join('')}</tbody></table></div>` : `<div class="empty">${t('noNew')}</div>`;

  const body=pageRows.length?pageRows.map(rowHtml).join(''):`<tr><td colspan="17"><div class="empty">${t('noAccepted')}</div></td></tr>`;

  return `<div class="phead"><div class="eyebrow">${t('opsEye')}</div><h1>${t('manageH1')}</h1><p>${t('manageP')}</p></div>
  <div class="section-head"><span class="sec-dot inbox"></span> ${t('incoming')} <span class="count-chip" style="margin-inline-start:8px">${pending.length} ${t('waiting')}</span></div>
  <div class="panel" style="margin-bottom:26px">${pendingTable}</div>
  <div class="section-head"><span class="sec-dot work"></span> ${t('accepted')} <span class="count-chip" style="margin-inline-start:8px">${acc.length}</span></div>
  ${filtBar('manage')}
  <div class="panel"><div class="tablewrap"><table>${tableHead()}<tbody>${body}</tbody></table></div></div>
  ${pager('manage',totalPages)}`;
}

/* ---- OPEN TASKS ---- */
function viewOpen(){
  let all=state.requests.map(calc);
  let openRows=applyFilters(all.filter(isOpen));
  openRows=smartSort(openRows);
  const overdue=openRows.filter(r=>r.effStatus==='Overdue').length;
  const onhold=openRows.filter(r=>r.effStatus==='On Hold').length;
  const totalPages=Math.max(1,Math.ceil(openRows.length/PAGE_SIZE));
  if(pageNum.open>totalPages)pageNum.open=totalPages;
  const startI=(pageNum.open-1)*PAGE_SIZE;
  const pageRows=openRows.slice(startI,startI+PAGE_SIZE);
  const body=pageRows.length?pageRows.map(openRowHtml).join(''):`<tr><td colspan="17"><div class="empty">${t('noMatch')}</div></td></tr>`;
  return `<div class="phead"><div class="eyebrow">${t('openEye')}</div><h1>${t('openH1')}</h1><p>${t('openP')}</p></div>
  <div class="qcount">
    <div class="qchip"><span class="dot" style="background:var(--green)"></span> ${openRows.length} ${t('kOpen')}</div>
    <div class="qchip"><span class="dot" style="background:var(--red)"></span> ${overdue} ${t('kOver')}</div>
    <div class="qchip"><span class="dot" style="background:var(--amber)"></span> ${onhold} On Hold</div>
  </div>
  ${filtBar('open')}
  <div class="panel"><div class="tablewrap"><table>${tableHead()}<tbody>${body}</tbody></table></div></div>
  ${pager('open',totalPages)}`;
}
function openRowHtml(r){
  // same as rowHtml but with a Close button added before delete
  const base=rowHtml(r);
  const closeBtn=`<button class="rowbtn close" title="${t('closeTask')}" onclick="closeTask(${r.id})">✓</button> `;
  return base.replace('<td><button class="rowbtn del"', '<td style="white-space:nowrap">'+closeBtn+'<button class="rowbtn del"');
}

/* ---- actions ---- */
async function acceptReq(id){const r=state.requests.find(x=>x.id===id);if(!r)return;r.accepted=true;if(!r.start)r.start=today();if(r.status==='Not Started')r.status='In Progress';try{await sbUpdate(id,r);}catch(e){}render();toast(fmtID(id)+' — '+t('acceptedToast'));}
async function declineReq(id){const r=state.requests.find(x=>x.id===id);if(!r)return;r.accepted=true;r.status='Cancelled';try{await sbUpdate(id,r);}catch(e){}render();toast(fmtID(id)+' '+t('declined'));}
async function upd(id,f,v){const r=state.requests.find(x=>x.id===id);if(!r)return;r[f]=v;try{await sbUpdate(id,r);}catch(e){}render();}
async function closeTask(id){const r=state.requests.find(x=>x.id===id);if(!r)return;r.status='Complete';r.closed=today();try{await sbUpdate(id,r);}catch(e){}render();toast(fmtID(id)+' '+t('closedToast'));}

/* ---- delete with confirm modal ---- */
function askDelete(id){modal={type:'del',id};renderModal();}
async function doDelete(id){try{await sbDelete(id);}catch(e){}state.requests=state.requests.filter(x=>x.id!==id);modal=null;render();toast(fmtID(id)+' '+t('deletedToast'));}

/* ---- add task modal ---- */
function openAddTask(){modal={type:'add'};renderModal();}
async function saveNewTask(){
  const g=id=>document.getElementById(id);
  const proj=g('a_proj').value,cat=g('a_cat').value,title=g('a_title').value.trim(),req=g('a_req').value.trim();
  if(!proj||!cat||!title){toast(t('fillReq'));return;}
  const obj={requestedBy:req||'—',project:proj,category:cat,title:title,priority:g('a_pri').value||'Med',received:today(),assignedTo:g('a_assign').value||'',start:'',duration:'',status:'Not Started',accepted:true,notes:g('a_notes').value.trim(),closed:''};
  try{const s=await sbInsert(obj);state.requests.push(s);}catch(e){toast(t('connErr'));return;}
  modal=null;render();toast(t('added'));
}
function renderModal(){
  let el=document.getElementById('modal');
  if(!el){el=document.createElement('div');el.id='modal';document.body.appendChild(el);}
  if(!modal){el.innerHTML='';return;}
  if(modal.type==='del'){
    el.innerHTML=`<div class="modal-bg" onclick="if(event.target===this){modal=null;renderModal();}"><div class="modal">
      <h3>${t('confirmDelTitle')}</h3><p>${t('confirmDelMsg')} <b>${fmtID(modal.id)}</b>.</p>
      <div class="btnrow"><button class="btn sec" onclick="modal=null;renderModal()">${t('cancel')}</button><button class="btn danger" onclick="doDelete(${modal.id})">${t('confirmDelYes')}</button></div>
    </div></div>`;
  } else if(modal.type==='add'){
    el.innerHTML=`<div class="modal-bg" onclick="if(event.target===this){modal=null;renderModal();}"><div class="modal" style="max-width:560px">
      <h3>${t('addTaskTitle')}</h3>
      <div class="form-grid">
        <div class="field"><label>${t('requestedBy')}</label><input id="a_req" placeholder="—"/></div>
        <div class="field"><label>${t('projLoc')} <span class="req">*</span></label><select id="a_proj">${opts(state.lists.projects)}</select></div>
        <div class="field"><label>${t('svcType')} <span class="req">*</span></label><select id="a_cat">${opts(state.lists.categories)}</select></div>
        <div class="field"><label>${t('priority')}</label><select id="a_pri">${opts(state.lists.priorities,'Med')}</select></div>
        <div class="field full"><label>${t('needs')} <span class="req">*</span></label><textarea id="a_title" placeholder="${t('needsPh')}"></textarea></div>
        <div class="field"><label>${t('tAssign')}</label><select id="a_assign"><option value="">—</option>${state.lists.employees.map(e=>`<option>${esc(e)}</option>`).join('')}</select></div>
        <div class="field full"><label>${t('tNotes')}</label><input id="a_notes" placeholder="${t('notesPh')}"/></div>
      </div>
      <div class="btnrow" style="margin-top:14px"><button class="btn sec" onclick="modal=null;renderModal()">${t('cancel')}</button><button class="btn green" onclick="saveNewTask()">${t('save')}</button></div>
    </div></div>`;
  }
}

/* ---- DASHBOARD ---- */
function viewDashboard(){
  const rows=state.requests.map(calc);const W=state.widgets;
  const total=rows.length;
  const pending=rows.filter(r=>!r.accepted).length;
  const open=rows.filter(isOpen).length;
  const done=rows.filter(r=>r.effStatus==='Complete').length;
  const overdue=rows.filter(r=>r.effStatus==='Overdue').length;
  const dueWk=rows.filter(r=>typeof r.daysleft==='number'&&r.daysleft>=0&&r.daysleft<=7&&isOpen(r)).length;
  const rate=total?Math.round(done/total*1000)/10:0;
  const compDays=rows.filter(r=>r.effStatus==='Complete'&&r.received&&(r.closed||r.due)).map(r=>Math.round((new Date(r.closed||r.due)-new Date(r.received))/86400000)).filter(n=>n>=0);
  const avgDays=compDays.length?Math.round(compDays.reduce((a,b)=>a+b,0)/compDays.length):0;
  function group(field,listKey,useEff){const m={};(state.lists[listKey]||[]).forEach(x=>m[x]=0);rows.forEach(r=>{const k=useEff?r.effStatus:r[field];if(m[k]!=null)m[k]++;});return Object.entries(m).filter(([k,v])=>v>0);}
  const cats=group('category','categories'),sts=group(null,'statuses',true),pris=group('priority','priorities');
  const pm={};rows.forEach(r=>{if(r.project)pm[r.project]=(pm[r.project]||0)+1;});const projRows=Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const wm={};rows.forEach(r=>{if(r.assignedTo&&isOpen(r))wm[r.assignedTo]=(wm[r.assignedTo]||0)+1;});const wlRows=Object.entries(wm).sort((a,b)=>b[1]-a[1]);
  const rm={};rows.forEach(r=>{if(r.requestedBy&&r.requestedBy!=='—')rm[r.requestedBy]=(rm[r.requestedBy]||0)+1;});const reqRows=Object.entries(rm).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tm={};rows.forEach(r=>{if(r.received){const mo=r.received.slice(0,7);tm[mo]=(tm[mo]||0)+1;}});const timeRows=Object.entries(tm).sort((a,b)=>a[0]<b[0]?-1:1);
  const alertRows=rows.filter(r=>isOpen(r)&&typeof r.daysleft==='number'&&r.daysleft<=7).sort((a,b)=>a.daysleft-b.daysleft).slice(0,12);
  function bars(arr,colorFn){const max=Math.max(1,...arr.map(x=>x[1]));return arr.map(([k,v])=>`<div class="bar-row"><div class="blab">${esc(k)}</div><div class="bar-track"><div class="bar-fill" style="width:${v/max*100}%;background:${colorFn?colorFn(k):'var(--accent)'}">${v}</div></div></div>`).join('');}
  let h=`<div class="phead"><div class="eyebrow">${t('dashEye')}</div><h1>${t('dashH1')}</h1><p>${t('dashP')}</p></div>`;
  if(W.kpis)h+=`<div class="kpis">
    <div class="kpi"><div class="bar"></div><div class="lab">${t('kTotal')}</div><div class="val">${total}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--amber)"></div><div class="lab">${t('kPending')}</div><div class="val">${pending}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--accent)"></div><div class="lab">${t('kOpen')}</div><div class="val">${open}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--amber)"></div><div class="lab">${t('kDueWk')}</div><div class="val">${dueWk}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--red)"></div><div class="lab">${t('kOver')}</div><div class="val">${overdue}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--green)"></div><div class="lab">${t('kDone')}</div><div class="val">${done}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--accent)"></div><div class="lab">${t('kRate')}</div><div class="val">${rate}%</div></div>
    <div class="kpi"><div class="bar" style="background:var(--steel)"></div><div class="lab">${t('kAvgDays')}</div><div class="val">${avgDays}</div></div>
  </div>`;
  if(W.alerts){const aH=alertRows.length?alertRows.map(r=>{const ov=r.daysleft<0;return `<div class="alert-row ${ov?'ov':''}"><span class="id-cell">${fmtID(r.id)}</span><span class="alert-title">${esc(r.title)}</span><span class="alert-meta">${esc(r.assignedTo||'—')}</span><span class="alert-days">${ov?(Math.abs(r.daysleft)+'d '+t('overdueBy')):(t('dueIn')+' '+r.daysleft+'d')}</span></div>`;}).join(''):`<div class="empty" style="padding:18px">${t('noAlerts')}</div>`;h+=`<div class="panel" style="margin-bottom:20px"><div class="alert-head"><span class="sec-dot inbox"></span> ${t('alerts')}</div>${aH}</div>`;}
  let cards='';
  if(W.byCat)cards+=`<div class="chart-card"><h3>${t('byCat')}</h3>${cats.length?bars(cats):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.bySt)cards+=`<div class="chart-card"><h3>${t('bySt')}</h3>${sts.length?bars(sts,k=>STATUS_COLORS[k]):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.byPri)cards+=`<div class="chart-card"><h3>${t('byPri')}</h3>${pris.length?bars(pris,k=>PR_COLOR[k]||'var(--accent)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.byProj)cards+=`<div class="chart-card"><h3>${t('byProj')}</h3>${projRows.length?bars(projRows):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.wlTeam)cards+=`<div class="chart-card"><h3>${t('wlTeam')}</h3>${wlRows.length?bars(wlRows,()=>'var(--med)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.overTime)cards+=`<div class="chart-card"><h3>${t('overTime')}</h3>${timeRows.length?bars(timeRows,()=>'var(--steel)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.topReq)cards+=`<div class="chart-card"><h3>${t('topReq')}</h3>${reqRows.length?bars(reqRows,()=>'var(--purple)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(cards)h+=`<div class="charts">${cards}</div>`;
  return h;
}

/* ---- SETTINGS ---- */
function viewSettings(){
  const card=(title,key)=>`<div class="list-card"><h3>${title}<span style="font-size:11px;color:var(--grey);font-weight:600">${state.lists[key].length}</span></h3>
    <div class="items">${state.lists[key].map((x,i)=>`<div class="list-item"><span>${esc(x)}</span><button onclick="delItem('${key}',${i})">×</button></div>`).join('')}</div>
    <div class="additem"><input id="add_${key}" placeholder="${t('addNew')}" onkeydown="if(event.key==='Enter')addItem('${key}')"/><button class="btn sm" onclick="addItem('${key}')">${t('add')}</button></div></div>`;
  const wt=ALL_WIDGETS.map(([k,en,ar])=>{const on=state.widgets[k];const lbl=L==='ar'?ar:en;return `<div class="wtoggle"><span>${esc(lbl)}</span><button class="switch ${on?'on':''}" onclick="toggleWidget('${k}')"><span class="knob"></span></button></div>`;}).join('');
  return `<div class="phead"><div class="eyebrow">${t('setEye')}</div><h1>${t('setH1')}</h1><p>${t('setP')}</p></div>
  <div class="panel panel-pad" style="margin-bottom:20px"><h3 style="font-size:14px;color:var(--navy);margin-bottom:4px">${t('chartsCfg')}</h3><p class="hint" style="margin-bottom:14px">${t('chartsCfgHint')}</p><div class="wtoggle-grid">${wt}</div></div>
  <div class="settings-grid">${card(t('sProjects'),'projects')}${card(t('sCats'),'categories')}${card(t('sEmps'),'employees')}${card(t('sPris'),'priorities')}${card(t('sStatuses'),'statuses')}</div>`;
}
async function addItem(key){const el=document.getElementById('add_'+key);const v=el.value.trim();if(!v)return;if(state.lists[key].includes(v)){toast(t('exists'));return;}state.lists[key].push(v);await saveLists();render();toast(t('added'));}
async function delItem(key,i){state.lists[key].splice(i,1);await saveLists();render();}
async function toggleWidget(k){state.widgets[k]=!state.widgets[k];await saveWidgets();render();}

/* ---- export ---- */
function exportExcel(){
  const rows=state.requests.map(calc).sort((a,b)=>a.id-b.id);
  const head=['#','Project','Category','Priority','Assigned To','Task Title','Manager Note','Received','Start','Duration','Status','Task ID','Due','Closed','Days Left','Completion','Progress %','Requested By'];
  const data=rows.map((r,i)=>[i+1,r.project,r.category,r.priority,r.assignedTo,r.title,r.notes,r.received,r.start,r.duration,r.effStatus,fmtID(r.id),r.due,r.closed,r.daysleft,(r.effStatus==='Complete'?(r.closed||r.due):''),Math.round((r.progress||0)*100)+'%',r.requestedBy]);
  let csv=[head].concat(data).map(row=>row.map(c=>{c=c==null?'':String(c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='OM_Service_Requests.csv';a.click();URL.revokeObjectURL(url);
  toast(rows.length+' '+t('exported'));
}
