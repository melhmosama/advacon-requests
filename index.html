<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"><title>ADVACON — Service Requests</title><style>
:root{
  --navy:#15406E;--navy2:#1B4D7E;--med:#2A5C8A;--accent:#3E6E9E;--steel:#5B7A99;
  --lblue:#DCE6F0;--pale:#EEF2F7;--lgray:#F4F6F9;--head:#EAEEF3;--grid:#D3DAE3;
  --txt:#23303D;--grey:#6E7A87;--white:#fff;
  --green:#3C7D5A;--amber:#C08A3E;--red:#B0504A;--purple:#6E5C8A;
  --shadow:0 1px 3px rgba(21,64,110,.08),0 4px 16px rgba(21,64,110,.06);
  --sidew:230px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--lgray);color:var(--txt);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
html,body{overflow-x:hidden}
.app{width:100%}
.app:has(.emp-stage){display:block!important}
/* gate */
.gate{position:fixed;inset:0;background:linear-gradient(135deg,#15406E,#0E2C4D);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.gate-card{background:#fff;border-radius:18px;padding:40px 34px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.35);max-width:460px;width:100%}
.gate-card img{height:58px;margin-bottom:8px}
.gate-card .co{font-size:11px;letter-spacing:.08em;color:var(--grey);font-weight:700}
.gate-card .intro{margin:16px 0 22px}
.gate-card .intro-ar{direction:rtl;font-size:15px;font-weight:700;color:var(--navy);line-height:1.6;margin-bottom:6px}
.gate-card .intro-ar-sub{direction:rtl;font-size:12.5px;color:var(--steel);line-height:1.6;margin-bottom:14px}
.gate-card .intro-en{font-size:13px;font-weight:600;color:var(--med);line-height:1.5;margin-bottom:5px}
.gate-card .intro-en-sub{font-size:11.5px;color:var(--grey);line-height:1.5}
.gate-card .intro::after{content:"";display:block;height:1px;background:var(--grid);margin:16px auto 0;width:70%}
.gate-card h2{font-size:18px;color:var(--navy);margin-bottom:4px}
.gate-card .sub{font-size:13px;color:var(--steel);margin-bottom:18px;direction:rtl}
.lang-btns{display:flex;gap:12px}
.lang-btns button{flex:1;padding:18px;border:2px solid var(--grid);background:var(--white);border-radius:13px;cursor:pointer;font-family:inherit;transition:.18s;display:flex;flex-direction:column;gap:3px;align-items:center}
.lang-btns button:hover{border-color:var(--accent);background:var(--pale)}
.lang-btns .big{font-size:19px;font-weight:700;color:var(--navy)}
.lang-btns .small{font-size:11px;color:var(--grey)}
.gate-card input{font-family:inherit;font-size:16px;padding:12px;border:1.5px solid var(--grid);border-radius:8px;width:100%}
/* ===== LAYOUT: sidebar + content ===== */
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidew);background:var(--white);border-inline-end:1px solid var(--grid);box-shadow:var(--shadow);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:40}
.side-brand{padding:18px 16px;border-bottom:1px solid var(--grid);text-align:left;direction:ltr}
.side-brand img{height:38px;margin-bottom:6px}
.side-brand .co{font-size:8px;letter-spacing:.05em;color:var(--grey);font-weight:700;line-height:1.3;display:block}
.side-brand .sys{font-size:12.5px;font-weight:700;color:var(--navy);margin-top:3px;display:block}
.side-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.side-nav button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;padding:11px 13px;font-size:13.5px;font-weight:600;color:var(--grey);cursor:pointer;border-radius:9px;font-family:inherit;transition:.15s;text-align:start}
.side-nav button:hover{background:var(--lgray);color:var(--navy)}
.side-nav button.active{background:var(--navy);color:var(--white)}
.side-nav button .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.side-nav button .badge{margin-inline-start:auto;background:var(--amber);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:18px;text-align:center}
.side-nav button.active .badge{background:#fff;color:var(--navy)}
.side-foot{padding:10px;border-top:1px solid var(--grid);display:flex;gap:6px}
.side-foot button{flex:1;background:var(--white);border:1.5px solid var(--grid);color:var(--med);font-weight:700;padding:8px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12.5px}
.side-foot button:hover{background:var(--pale)}
.content{flex:1;min-width:0;display:flex;flex-direction:column}
.wrap{max-width:1500px;margin:0 auto;padding:24px 26px;width:100%;flex:1}
/* employee top (no sidebar) */
.empbar{background:var(--white);border-bottom:3px solid var(--navy);box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.empbar-inner{max-width:760px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px}
.empbar img{height:34px;width:auto;max-width:160px;object-fit:contain;display:block}
.empbar .sys{font-size:15px;font-weight:700;color:var(--navy)}
.empbar .lt{margin-inline-start:auto;border:1.5px solid var(--grid);color:var(--med);font-weight:700;border-radius:7px;padding:7px 12px;background:none;cursor:pointer;font-family:inherit;font-size:12.5px}
/* heads */
.phead{margin-bottom:18px}
.phead .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700}
.phead h1{font-size:24px;color:var(--navy);font-weight:700;margin-top:2px}
.phead p{color:var(--grey);margin-top:4px;font-size:13px}
.panel{background:var(--white);border:1px solid var(--grid);border-radius:12px;box-shadow:var(--shadow)}
.panel-pad{padding:22px}
/* form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:12.5px;font-weight:600;color:var(--med)}
label .req{color:var(--red)}
input,select,textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--grid);border-radius:8px;background:var(--white);color:var(--txt);transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,110,158,.13)}
textarea{resize:vertical;min-height:80px}
.hint{font-size:11.5px;color:var(--grey)}
.btn{background:var(--navy);color:var(--white);border:none;padding:11px 22px;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn:hover{background:var(--navy2)}
.btn.sm{padding:7px 13px;font-size:12.5px}
.btn.sec{background:var(--white);color:var(--navy);border:1.5px solid var(--grid)}
.btn.sec:hover{background:var(--lgray)}
.btn.danger{background:var(--white);color:var(--red);border:1.5px solid #E8C9C7}
.btn.danger:hover{background:#FBF0EF}
.btn.green{background:var(--green)}.btn.green:hover{background:#346B4E}
.btnrow{display:flex;gap:10px;margin-top:8px;align-items:center;flex-wrap:wrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--green);color:#fff;padding:12px 22px;border-radius:10px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:150;transition:.35s;font-size:13.5px;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
/* kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--white);border:1px solid var(--grid);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lab{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--grey);font-weight:700}
.kpi .val{font-size:27px;font-weight:700;color:var(--navy);margin-top:4px}
.kpi .bar{position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--med)}
.qcount{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.qchip{background:var(--white);border:1px solid var(--grid);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow)}
.qchip .dot{width:9px;height:9px;border-radius:50%}
/* ===== TASK CARDS ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.tcard{background:var(--white);border:1px solid var(--grid);border-radius:13px;box-shadow:var(--shadow);overflow:hidden;border-inline-start:4px solid var(--med)}
.tcard.ov{border-inline-start-color:var(--red)}
.tcard.warn{border-inline-start-color:var(--amber)}
.tcard-head{display:flex;align-items:center;gap:8px;padding:12px 15px;background:var(--head);border-bottom:1px solid var(--grid);flex-wrap:wrap}
.tcard-head .id{font-weight:700;color:var(--med);font-size:13px}
.tcard-head .st{margin-inline-start:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.tcard-head .prio{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid}
.prio.High{color:var(--red);border-color:#E8C9C7}.prio.Medium,.prio.Med{color:var(--amber);border-color:#E8D6BC}.prio.Low{color:var(--steel);border-color:var(--grid)}
.tcard-body{padding:14px 15px}
.tcard .req-q{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:4px;line-height:1.45}
.tcard .meta{display:flex;flex-wrap:wrap;gap:5px 16px;margin:10px 0;font-size:12.5px}
.tcard .meta div{display:flex;flex-direction:column}
.tcard .meta .ml{font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--grey);font-weight:700}
.tcard .meta .mv{color:var(--txt);font-weight:600}
.tcard .field-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.tcard .field-row .fr{flex:1;min-width:120px;display:flex;flex-direction:column;gap:3px}
.tcard .field-row label{font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--grey)}
.tcard .mini{padding:7px 9px;font-size:13px;border:1px solid var(--grid);border-radius:7px;font-family:inherit;width:100%}
.tcard .notes-in{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--grid);border-radius:7px;font-family:inherit;margin-top:8px;background:#FBF8F2}
.dl{font-weight:700;font-size:12.5px}
.tcard-foot{display:flex;gap:8px;padding:11px 15px;border-top:1px solid var(--grid);background:var(--lgray);flex-wrap:wrap}
.tcard-foot .btn{flex:1;justify-content:center;min-width:90px}
.progress-wrap{background:var(--grid);border-radius:10px;height:16px;overflow:hidden;position:relative;margin-top:10px}
.progress-bar{height:100%;border-radius:10px;background:var(--accent)}
.progress-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--txt)}
.empty{padding:44px 20px;text-align:center;color:var(--grey)}
.filterbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filterbar select,.filterbar input{padding:8px 10px;font-size:13px;width:auto;min-width:130px}
.filterbar .spacer{flex:1}
.count-chip{background:var(--lblue);color:var(--navy);padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap}
.section-head{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--navy);margin:4px 0 12px;flex-wrap:wrap}
.sec-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.sec-dot.inbox{background:var(--amber)}.sec-dot.work{background:var(--green)}.sec-dot.pend{background:#C08A3E}
/* incoming cards (simpler) */
.in-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px;margin-bottom:26px}
.in-card{background:var(--white);border:1px solid var(--grid);border-inline-start:4px solid var(--amber);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.in-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.in-card .q{font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.4}
.in-card .meta{font-size:12.5px;color:var(--steel);margin-bottom:4px}
.in-card .meta b{color:var(--txt)}
.in-card .acts{display:flex;gap:8px;margin-top:12px}
.in-card .acts .btn{flex:1;justify-content:center}
/* pagination */
.pager{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:18px;flex-wrap:wrap}
.pager button{min-width:36px;height:36px;border:1px solid var(--grid);background:var(--white);border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--med);padding:0 10px}
.pager button:hover:not(:disabled){background:var(--pale)}
.pager button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.pager button:disabled{opacity:.4;cursor:default}
.pager .pinfo{font-size:12.5px;color:var(--grey);margin:0 8px}
/* charts */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.chart-card{background:var(--white);border:1px solid var(--grid);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.chart-card h3{font-size:14px;color:var(--navy);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bar-row .blab{font-size:12px;width:130px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--lgray);border-radius:6px;height:21px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-inline-start:7px;color:#fff;font-size:11px;font-weight:700;min-width:22px}
.alert-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--navy);padding:13px 16px;border-bottom:1px solid var(--grid)}
.alert-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--grid);font-size:13px}
.alert-row:last-child{border-bottom:none}
.alert-row .alert-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alert-row .alert-meta{color:var(--grey);font-size:12px;min-width:80px;text-align:end;white-space:nowrap}
.alert-row .alert-days{font-weight:700;font-size:12px;color:var(--amber);min-width:100px;text-align:end;white-space:nowrap}
.alert-row.ov .alert-days{color:var(--red)}
/* settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.list-card{background:var(--white);border:1px solid var(--grid);border-radius:11px;overflow:hidden}
.list-card h3{background:var(--head);color:var(--navy);padding:11px 15px;font-size:13px;border-bottom:1px solid var(--grid);display:flex;justify-content:space-between;align-items:center}
.list-card .items{padding:8px;max-height:260px;overflow-y:auto}
.list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px}
.list-item:hover{background:var(--lgray)}
.list-item span{flex:1;font-size:13px}
.list-item button{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.additem{display:flex;gap:8px;padding:10px;border-top:1px solid var(--grid)}
.additem input{flex:1}
.wtoggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 22px}
.wtoggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--grid);font-size:13.5px}
.switch{width:42px;height:24px;border-radius:14px;background:var(--grid);border:none;cursor:pointer;position:relative;transition:.2s;padding:0;flex-shrink:0}
.switch.on{background:var(--green)}
.switch .knob{position:absolute;top:3px;inset-inline-start:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on .knob{inset-inline-start:21px}
/* thanks */
.thanks-wrap{display:flex;align-items:center;justify-content:center;min-height:70vh;padding:18px}
.thanks-card{background:var(--white);border:1px solid var(--grid);border-radius:18px;box-shadow:var(--shadow);padding:40px 32px;text-align:center;max-width:460px;width:100%}
.thanks-check{width:68px;height:68px;border-radius:50%;background:var(--green);color:#fff;font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.thanks-card h1{font-size:24px;color:var(--navy);margin-bottom:8px}
.thanks-msg{color:var(--steel);font-size:14px;margin-bottom:16px}
.thanks-id{display:inline-block;background:var(--lblue);color:var(--navy);font-weight:700;padding:7px 18px;border-radius:24px;font-size:15px;letter-spacing:1px;margin-bottom:22px}
.thanks-contact{background:var(--lgray);border-radius:12px;padding:16px;margin-bottom:22px}
.thanks-contact p{font-size:12.5px;color:var(--grey);margin-bottom:8px}
.thanks-name{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
.thanks-phone{font-size:18px;font-weight:700;color:var(--med);text-decoration:none;display:inline-block}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,40,70,.5);display:flex;align-items:center;justify-content:center;z-index:160;padding:16px}
.modal{background:#fff;border-radius:14px;padding:26px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;color:var(--navy);margin-bottom:10px}
.modal p{font-size:13.5px;color:var(--steel);margin-bottom:18px;line-height:1.6}
/* mobile */
.menu-btn{display:none}
@media(max-width:860px){
  .form-grid,.settings-grid,.charts,.wtoggle-grid{grid-template-columns:1fr}
  .kpis{grid-template-columns:1fr 1fr}
  .cards,.in-cards{grid-template-columns:1fr}
  .sidebar{position:fixed;inset-inline-start:0;top:0;height:100vh;transform:translateX(-110%);transition:.25s}
  body[dir="rtl"] .sidebar{transform:translateX(110%)}
  .sidebar.open{transform:translateX(0)!important}
  .menu-btn{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border:none;background:var(--navy);color:#fff;border-radius:9px;font-size:20px;cursor:pointer;position:fixed;top:12px;inset-inline-start:12px;z-index:45;box-shadow:var(--shadow)}
  .content{padding-top:8px}
  .wrap{padding:64px 14px 20px}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:39}
}

/* images */
.img-upload{display:flex;flex-direction:column;gap:8px}
.img-btn{display:inline-flex;align-items:center;gap:8px;background:var(--pale);color:var(--navy);border:1.5px dashed var(--accent);border-radius:9px;padding:12px 16px;font-size:13.5px;font-weight:600;cursor:pointer;width:fit-content;transition:.15s}
.img-btn:hover{background:var(--lblue)}
.img-previews{display:flex;flex-wrap:wrap;gap:8px}
.img-prev{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid var(--grid);background:var(--lgray);display:flex;align-items:center;justify-content:center}
.img-prev img{width:100%;height:100%;object-fit:cover}
.img-prev .upl{font-size:10px;color:var(--grey);text-align:center;padding:4px}
.img-prev button{position:absolute;top:2px;inset-inline-end:2px;width:20px;height:20px;border-radius:50%;background:rgba(176,80,74,.92);color:#fff;border:none;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.card-imgs{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.card-imgs img{width:58px;height:58px;object-fit:cover;border-radius:7px;border:1px solid var(--grid);cursor:pointer;transition:.15s}
.card-imgs img:hover{transform:scale(1.05)}
.note-box{background:#FBF8F2;border:1px solid #E8D6BC;border-radius:8px;padding:9px 11px;font-size:13px;color:var(--txt);margin:8px 0;line-height:1.5}
.note-box .ml{display:block;font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:3px}
/* ===== CLEAN TABLES ===== */
.tbl-wrap{background:var(--white);border:1px solid var(--grid);border-radius:12px;box-shadow:var(--shadow);overflow-x:auto;overflow-y:hidden;margin-bottom:6px;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:9px}
.tbl-wrap::-webkit-scrollbar-track{background:var(--lgray);border-radius:0 0 12px 12px}
.tbl-wrap::-webkit-scrollbar-thumb{background:#c3ccd6;border-radius:6px}
.tbl-wrap::-webkit-scrollbar-thumb:hover{background:#a7b3c0}
.tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
.tbl thead th{background:var(--head);color:var(--navy);font-weight:700;font-size:10px;letter-spacing:.02em;text-transform:uppercase;text-align:start;padding:8px 9px;border-bottom:2px solid var(--grid);white-space:nowrap}

async function sbInsert(o){const res=await fetch(SB_URL+'/rest/v1/requests',{method:'POST',headers:{...SB_HEAD,'Prefer':'return=representation'},body:JSON.stringify(toRow(o))});if(!res.ok)throw new Error();return fromRow((await res.json())[0]);}

const SB_BUCKET='request-images';
async function sbUploadImage(file){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const name=Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
  const res=await fetch(SB_URL+'/storage/v1/object/'+SB_BUCKET+'/'+name,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type||'image/jpeg'},body:file});
  if(!res.ok)throw new Error('upload '+res.status);
  return SB_URL+'/storage/v1/object/public/'+SB_BUCKET+'/'+name;
}

  // migrate lists to bilingual {en,ar} objects (categories & priorities) — keeps old data, never loses it
  const AR_CAT={"Maint 🔧":"أعمال الصيانة","Movement 🔄":"النقل والتنقّل","Procurement 🛒":"المشتريات","Fuel Supply ⛽":"تزويد الوقود","Material Transport 🚛":"نقل المواد","Others 🧩":"أخرى","Maintenance":"أعمال الصيانة","Movement":"النقل والتنقّل","Procurement":"المشتريات","Fuel Supply":"تزويد الوقود","Material Transport":"نقل المواد","Others":"أخرى","Administrative":"شؤون إدارية"};
  const EN_CAT={"Maint 🔧":"Maintenance","Movement 🔄":"Movement","Procurement 🛒":"Procurement","Fuel Supply ⛽":"Fuel Supply","Material Transport 🚛":"Material Transport","Others 🧩":"Others"};
  const AR_PRI={"Low":"منخفضة","Med":"متوسطة","Medium":"متوسطة","High":"عالية"};
  let changed=false;
  if(state.lists&&Array.isArray(state.lists.categories)){
    const seen=new Set();const out=[];
    for(let c of state.lists.categories){
      if(typeof c==='string'){const en=EN_CAT[c]||c;const ar=AR_CAT[c]||AR_CAT[en]||en;c={en,ar};changed=true;}
      else if(c&&c.en){if(!c.ar){c.ar=AR_CAT[c.en]||c.en;changed=true;}}
      if(c&&c.en&&!seen.has(c.en)){seen.add(c.en);out.push(c);}
    }
    state.lists.categories=out;
  }
  if(state.lists&&Array.isArray(state.lists.priorities)){
    const seen=new Set();const out=[];
    for(let p of state.lists.priorities){
      if(typeof p==='string'){const en=(p==='Med')?'Medium':p;const ar=AR_PRI[p]||AR_PRI[en]||en;p={en,ar};changed=true;}
      else if(p&&p.en){if(!p.ar){p.ar=AR_PRI[p.en]||p.en;changed=true;}}
      if(p&&p.en&&!seen.has(p.en)){seen.add(p.en);out.push(p);}
    }
    state.lists.priorities=out;
  }
  if(changed){try{await LS.set('advacon_lists',JSON.stringify(state.lists));}catch(e){}}
}

function calc(r){
  const o={...r};
  if(r.start&&r.duration){const d=new Date(r.start);d.setDate(d.getDate()+Number(r.duration)-1);o.due=d.toISOString().slice(0,10);}else o.due='';
  o.effStatus=r.status;
  if(o.due&&r.status!=='Complete'&&r.status!=='Cancelled'){if(new Date(o.due)<new Date(today()))o.effStatus='Overdue';}
  if(o.effStatus==='Complete')o.daysleft='✓';
  else if(o.due){o.daysleft=Math.round((new Date(o.due)-new Date(today()))/86400000);}else o.daysleft='';
  const P={'Not Started':0,'Complete':1,'On Hold':.1,'Overdue':.1,'Needs Review':0,'Needs Update':0,'Cancelled':1};
  if(o.effStatus==='In Progress'){let p=.1;if(r.start){const days=Math.round((new Date(today())-new Date(r.start))/86400000)+1;p=Math.min(.8,Math.max(.1,days*.1));}o.progress=p;}
  else o.progress=P[o.effStatus]!=null?P[o.effStatus]:0;
  return o;
}

async function pick(l){L=l;await saveLang();state.role='employee';state.route='request';document.getElementById('gate').innerHTML='';document.getElementById('app').style.display='flex';applyDir();render();}
function setAdminFlag(){try{sessionStorage.setItem('advacon_admin','1');}catch(e){}}
function clearAdminFlag(){try{sessionStorage.removeItem('advacon_admin');}catch(e){}try{localStorage.removeItem('advacon_admin');}catch(e){}try{LS.delete('advacon_admin');}catch(e){}}
async function checkAdminFlag(){
  // session-only: cleared automatically when the browser is fully closed
  try{if(sessionStorage.getItem('advacon_admin')==='1')return true;}catch(e){}
  // clean up any old persistent flags from previous versions
  try{localStorage.removeItem('advacon_admin');}catch(e){}
  try{LS.delete('advacon_admin');}catch(e){}
  return false;
}
async function tryAdmin(){const v=document.getElementById('pin').value.trim();if(v==='Ahmad1001'){setAdminFlag();state.role='admin';state.route='dashboard';if(!L)L='en';await saveLang();document.getElementById('gate').innerHTML='';document.getElementById('app').style.display='flex';applyDir();render();startRealtime();}else{const p=document.getElementById('pin');p.value='';p.placeholder=(L==='ar'?'رمز غير صحيح':'Incorrect code');p.style.borderColor='var(--red)';}}

let _pubPoll=null;
function startPublicPolling(){if(_pubPoll)return;_pubPoll=setInterval(async()=>{if(staffModal||staffModal2)return;if(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;const sb=await sbFetchAll();if(sb!==null){const sig=JSON.stringify(sb.map(r=>[r.id,r.status,r.accepted,r.archived,r.pendingConfirm,r.confirmedAt].join('|')));if(sig!==_pubSig){_pubSig=sig;state.requests=sb;render();}else if(state.role==='track'&&!trackQ){render();}}},20000);}
let _pubSig='';
function applyDir(){document.body.setAttribute('dir',L==='ar'?'rtl':'ltr');document.documentElement.lang=L;}

function exitToGate(){state.role='employee';clearAdminFlag();renderGate();document.getElementById('app').style.display='none';}
function go(r){state.route=r;sideOpen=false;render();}
function toggleSide(){sideOpen=!sideOpen;render();}

/* realtime */
let _rt=null,_rtRef=1,_rtHb=null,_poll=null;
async function refreshNow(){if(state.role!=='admin')return;
  // don't disrupt if a modal is open or user is typing in a field
  if(modal)return;
  if(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;
  const sb=await sbFetchAll();
  if(sb!==null){
    // only re-render if data actually changed (avoid needless flicker)
    const sig=JSON.stringify(sb.map(r=>[r.id,r.status,r.accepted,r.archived,r.assignedTo,r.duration,r.start,r.notes].join('|')));
    if(sig!==_lastSig){_lastSig=sig;state.requests=sb;render();}
    else{state.requests=sb;}
  }
}
let _lastSig='';
function startRealtime(){
  // reliable auto-refresh: poll every 6s so new requests appear without manual refresh
  if(!_poll)_poll=setInterval(refreshNow,6000);
  // also attempt websocket realtime for near-instant updates
  try{if(_rt)return;const ws=SB_URL.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+encodeURIComponent(SB_KEY)+'&vsn=1.0.0';_rt=new WebSocket(ws);_rt.onopen=()=>{_rt.send(JSON.stringify({topic:'realtime:public:requests',event:'phx_join',payload:{config:{postgres_changes:[{event:'*',schema:'public',table:'requests'}]}},ref:String(_rtRef++)}));_rtHb=setInterval(()=>{if(_rt&&_rt.readyState===1)_rt.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:String(_rtRef++)}));},25000);};_rt.onmessage=(m)=>{try{const d=JSON.parse(m.data);if(d.event==='postgres_changes'||(d.payload&&d.payload.data))refreshNow();}catch(e){}};_rt.onclose=()=>{_rt=null;if(_rtHb){clearInterval(_rtHb);_rtHb=null;}setTimeout(()=>{if(state.role==='admin')startRealtime();},3000);};_rt.onerror=()=>{try{_rt.close();}catch(e){}};}catch(e){}}

function opts(arr,sel){return [`<option value="">${t('select')}</option>`].concat((arr||[]).map(x=>{const v=biVal(x),d=biDisp(x);return `<option value="${esc(v)}" ${v===sel?'selected':''}>${esc(d)}</option>`;})).join('');}

/* ===== REQUEST + THANKS ===== */
/* pending images for the request form */
let reqImages=[]; // array of {url, name}
let reqFiles=[];  // array of {url, name} — PDF files
let uploadingCount=0; // attachments currently uploading
function setSubmitState(){const b=document.getElementById('submitBtn');if(!b)return;if(uploadingCount>0){b.disabled=true;b.classList.add('loading');b.textContent=t('waitUpload');}else{b.disabled=false;b.classList.remove('loading');b.innerHTML=t('submit')+' →';}}
async function handleReqImages(input){
  const files=Array.from(input.files||[]);
  if(!files.length)return;
  const wrap=document.getElementById('img-previews');
  for(const f of files){
    const tmpId='t'+Math.random().toString(36).slice(2,8);
    if(wrap){const d=document.createElement('div');d.className='img-prev';d.id=tmpId;d.innerHTML='<span class="upl">'+t('uploading')+'</span>';wrap.appendChild(d);}
    uploadingCount++;setSubmitState();
    try{const url=await sbUploadImage(f);reqImages.push({url,name:f.name});const el=document.getElementById(tmpId);if(el)el.innerHTML='<img src="'+url+'"/><button type="button" onclick="removeReqImage(\''+url+'\')">×</button>';}
    catch(e){const el=document.getElementById(tmpId);if(el)el.remove();toast(t('connErr'));}
    finally{uploadingCount=Math.max(0,uploadingCount-1);setSubmitState();}
  }
  input.value='';
}
function removeReqImage(url){reqImages=reqImages.filter(x=>x.url!==url);const wrap=document.getElementById('img-previews');if(wrap){[...wrap.children].forEach(c=>{const img=c.querySelector('img');if(img&&img.src===url)c.remove();});}}
async function handleReqFiles(input){
  const files=Array.from(input.files||[]);
  if(!files.length)return;
  const wrap=document.getElementById('file-previews');
  for(const f of files){
    if(f.type!=='application/pdf' && !/\.pdf$/i.test(f.name)){toast(t('pdfOnly'));continue;}
    if(f.size>10*1024*1024){toast(t('fileTooBig'));continue;}
    const tmpId='f'+Math.random().toString(36).slice(2,8);
    if(wrap){const d=document.createElement('div');d.className='file-prev';d.id=tmpId;d.innerHTML='<span class="upl">'+t('uploading')+'</span>';wrap.appendChild(d);}
    uploadingCount++;setSubmitState();
    try{const url=await sbUploadImage(f);reqFiles.push({url,name:f.name});const el=document.getElementById(tmpId);if(el)el.innerHTML='<span class="fic">📄</span><span class="fnm">'+esc(f.name)+'</span><button type="button" onclick="removeReqFile(\''+url+'\')">×</button>';}
    catch(e){const el=document.getElementById(tmpId);if(el)el.remove();toast(t('connErr'));}
    finally{uploadingCount=Math.max(0,uploadingCount-1);setSubmitState();}
  }
  input.value='';
}
function removeReqFile(url){reqFiles=reqFiles.filter(x=>x.url!==url);const wrap=document.getElementById('file-previews');if(wrap){[...wrap.children].forEach(c=>{const b=c.querySelector('button');if(b&&b.getAttribute('onclick')&&b.getAttribute('onclick').includes(url))c.remove();});}}

async function submitReq(){
  if(uploadingCount>0){toast(t('waitUpload'));return;}
  const req=document.getElementById('f_req').value.trim(),phone=document.getElementById('f_phone').value.trim(),proj=document.getElementById('f_proj').value,cat=document.getElementById('f_cat').value,title=document.getElementById('f_title').value.trim();
  if(!req||!phone||!proj||!cat||!title){toast(t('fillReq'));return;}
  const btn=document.getElementById('submitBtn');if(btn){btn.disabled=true;btn.classList.add('loading');btn.textContent=t('sending');}
  const obj={requestedBy:req,phone:phone,project:proj,category:cat,title:title,priority:document.getElementById('f_pri').value||'Medium',received:today(),assignedTo:'',start:'',duration:'',status:'Not Started',accepted:false,notes:'',closed:'',archived:false,images:JSON.stringify(reqImages.map(x=>x.url)),files:JSON.stringify(reqFiles.map(x=>({url:x.url,name:x.name}))),pendingConfirm:false};
  let id=null;try{const s=await sbInsert(obj);state.requests.push(s);id=s.id;}catch(e){toast(t('connErr'));if(btn){btn.disabled=false;btn.classList.remove('loading');btn.innerHTML=t('submit')+' →';}return;}
  thanksInfo={id,project:proj,category:cat,received:today()};reqImages=[];reqFiles=[];uploadingCount=0;state.route='thanks';render();
}
async function shareRequest(){
  if(!thanksInfo)return;
  const id=fmtID(thanksInfo.id);
  try{
    const W=1080,H=1080;
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const x=cv.getContext('2d');
    const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#16314c');g.addColorStop(1,'#0a1a2b');
    x.fillStyle=g;x.fillRect(0,0,W,H);
    const pad=90,cardY=150;
    x.fillStyle='#ffffff';roundRect(x,pad,cardY,W-2*pad,H-cardY-pad,40);x.fill();
    try{const logo=new Image();logo.src='data:image/png;base64,'+LOGO_B64;await logo.decode();const lw=300,lh=lw*logo.height/logo.width;x.drawImage(logo,(W-lw)/2,cardY+60,lw,lh);}catch(e){}
    const cy=cardY+260;x.fillStyle='#3f9a5c';x.beginPath();x.arc(W/2,cy,70,0,7);x.fill();
    x.strokeStyle='#fff';x.lineWidth=12;x.lineCap='round';x.beginPath();x.moveTo(W/2-32,cy);x.lineTo(W/2-6,cy+26);x.lineTo(W/2+34,cy-22);x.stroke();
    const ar=(L==='ar');
    x.fillStyle='#16314c';x.textAlign='center';
    x.font='bold 52px "Segoe UI",Tahoma,Arial';x.fillText(ar?'تم استلام طلبك':'Request Received',W/2,cy+170);
    x.fillStyle='#eef3f8';roundRect(x,W/2-260,cy+210,520,140,24);x.fill();
    x.fillStyle='#3e6e9e';x.font='30px "Segoe UI",Tahoma,Arial';x.fillText(ar?'رقم الطلب':'Request No.',W/2,cy+258);
    x.fillStyle='#16314c';x.font='bold 76px "Segoe UI",Tahoma,Arial';x.fillText(id,W/2,cy+330);
    x.fillStyle='#5a6b7b';x.font='32px "Segoe UI",Tahoma,Arial';
    const proj=thanksInfo.project||'';const cat=thanksInfo.category?dispCat(thanksInfo.category):'';
    x.fillText((proj?proj:'')+(proj&&cat?'  •  ':'')+(cat?cat:''),W/2,cy+420);
    x.fillStyle='#9aa7b3';x.font='28px "Segoe UI",Tahoma,Arial';x.fillText(thanksInfo.received||today(),W/2,cy+470);
    x.fillStyle='#9aa7b3';x.font='26px "Segoe UI",Tahoma,Arial';x.fillText(ar?'طلبات خدمة التشغيل والصيانة':'Operations & Maintenance Service Requests',W/2,H-pad-50);
    const blob=await new Promise(res=>cv.toBlob(res,'image/png'));
    const file=new File([blob],'request-'+id+'.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:id,text:(ar?'رقم الطلب: ':'Request No: ')+id});
    }else{
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='request-'+id+'.png';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);
      toast(t('imgSaved'));
    }
  }catch(e){toast(t('connErr'));}
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function pager(key,total){if(total<=1)return '';const cur=pageNum[key];let b='';b+=`<button onclick="setPage('${key}',${cur-1})" ${cur<=1?'disabled':''}>‹</button>`;const w=[];for(let i=1;i<=total;i++){if(i===1||i===total||Math.abs(i-cur)<=1)w.push(i);else if(w[w.length-1]!=='…')w.push('…');}w.forEach(p=>{b+=p==='…'?`<span class="pinfo">…</span>`:`<button class="${p===cur?'active':''}" onclick="setPage('${key}',${p})">${p}</button>`;});b+=`<button onclick="setPage('${key}',${cur+1})" ${cur>=total?'disabled':''}>›</button>`;return `<div class="pager">${b}<span class="pinfo">${t('page')} ${cur} ${t('of')} ${total}</span></div>`;}

function imgThumbs(r){

  return '<div class="card-imgs">'+arr.map(u=>'<img src="'+esc(u)+'" onclick="openLightbox(\''+esc(u)+'\')"/>').join('')+'</div>';

function dueCell(r){
  let dl=r.daysleft,dlTxt=dl,dlCol='var(--green)';
  if(dl==='✓'){dlTxt='✓';}
  else if(typeof dl==='number'){if(dl<0){dlTxt=Math.abs(dl)+'d '+t('overdueBy');dlCol='var(--red)';}else if(dl<=2){dlTxt=dl+'d';dlCol='var(--amber)';}else{dlTxt=dl+'d';}}
  return {txt:dlTxt,col:dlCol};
}
// clean table row (open + manage accepted)
function taskRow(r){
  const rowCls=(r.pendingConfirm?'pendrow ':'')+(r.effStatus==='Overdue'?'ov':(typeof r.daysleft==='number'&&r.daysleft>=0&&r.daysleft<=2?'warn':''));
  const stColor=STATUS_COLORS[r.effStatus]||'#6E7A87';
  const dl=dueCell(r);
  const isDone=r.effStatus==='Complete';
  const imgIcon=(()=>{let a=[];try{a=JSON.parse(r.images||'[]');}catch(e){}return a.length?`<button class="lk" onclick="openGallery(${r.id})" title="${t('viewImages')}">🖼 ${a.length}</button>`:'';})();
  let acts='';
  if(r.pendingConfirm){
    acts+=`<button class="ico ok wide" title="${t('confirmDone')}" onclick="confirmStaffDone(${r.id})">✓ ${t('confirmDone')}</button>`;
    acts+=`<button class="ico wide" title="${t('returnTask')}" onclick="returnStaffTask(${r.id})">↩ ${t('returnTask')}</button>`;
  }
  acts+=`<button class="ico" title="${t('edit')}" onclick="openEdit(${r.id})">✎</button>`;
  if(isDone)acts+=`<button class="ico" title="${t('reopen')}" onclick="reopenTask(${r.id})">↺</button>`;

// Save handler for accept / edit / add forms
async function saveTaskForm(mode,id){
  const g=i=>document.getElementById(i);
  const assign=g('tf_assign').value, dur=g('tf_dur').value, note=g('tf_notes').value.trim();
  if(mode==='accept'){
    if(!assign||!dur){toast(t('fillReq'));return;}
    const r=state.requests.find(x=>x.id===id);if(!r)return;
    r.accepted=true;r.archived=false;r.assignedTo=assign;r.duration=dur;r.notes=note;
    r.start=today();
    r.status='In Progress';r.closed='';
    modal=null;render();toast(fmtID(id)+' — '+t('acceptedToast'));saveBg(id,r);return;
  }
  if(mode==='edit'){
    const proj=g('tf_proj').value,cat=g('tf_cat').value,pri=g('tf_pri').value,start=g('tf_start').value,status=g('tf_status').value;
    if(!proj||!cat||!pri||!assign||!dur||!start||!status){toast(t('fillReq'));return;}
    const r=state.requests.find(x=>x.id===id);if(!r)return;
    r.project=proj;r.category=cat;r.priority=pri;r.assignedTo=assign;r.duration=dur;r.start=start;r.notes=note;
    r.status=status;
    if(status==='Complete'){if(!r.closed)r.closed=today();if(!r.confirmedAt)r.confirmedAt=nowTs();r.archived=false;r.accepted=true;}
    else if(status==='Cancelled'){r.archived=false;r.closed='';r.accepted=false;}
    else if(status==='Not Started'){r.accepted=false;r.archived=false;r.closed='';}
    else{r.closed='';r.archived=false;r.accepted=true;}
    modal=null;render();toast(fmtID(id));saveBg(id,r);return;
  }
  if(mode==='add'){
    const req=g('tf_req').value.trim(),proj=g('tf_proj').value,cat=g('tf_cat').value,pri=g('tf_pri').value;
    if(!proj||!cat||!pri||!assign||!dur){toast(t('fillReq'));return;}
    const title=g('tf_title').value.trim();if(!title){toast(t('fillReq'));return;}
    const obj={requestedBy:req||'—',project:proj,category:cat,title:title,priority:pri,received:today(),assignedTo:assign,start:today(),duration:dur,status:'In Progress',accepted:true,notes:note,closed:'',archived:false,images:''};
    try{const s=await sbInsert(obj);state.requests.push(s);}catch(e){toast(t('connErr'));return;}
    modal=null;render();toast(t('added'));return;
  }
}

function renderModal(){

  const close=`onclick="if(event.target===this){modal=null;renderModal();}"`;
  if(modal.type==='del'){
    el.innerHTML=`<div class="modal-bg" ${close}><div class="modal" style="max-width:420px"><h3>${t('confirmDelTitle')}</h3><p>${t('confirmDelMsg')}<br><b>${fmtID(modal.id)}</b></p><div class="btnrow" style="justify-content:flex-end"><button class="btn sec" onclick="modal=null;renderModal()">${t('cancel')}</button><button class="btn danger" onclick="doDelete(${modal.id})">${t('confirmDelYes')}</button></div></div></div>`;return;
  }
  if(modal.type==='close'){
    el.innerHTML=`<div class="modal-bg" ${close}><div class="modal" style="max-width:430px"><h3>${t('confirmCloseTitle')}</h3><p>${t('confirmCloseMsg')}<br><b>${fmtID(modal.id)}</b></p><div class="btnrow" style="justify-content:flex-end"><button class="btn sec" onclick="modal=null;renderModal()">${t('cancel')}</button><button class="btn green" onclick="doClose(${modal.id})">${t('confirmCloseYes')}</button></div></div></div>`;return;

/* ===== DASHBOARD ===== */
function viewDashboard(){
  const rows=state.requests.map(calc);const W=state.widgets;
  const active=rows.filter(r=>!r.archived);
  const total=active.length;
  const pending=active.filter(isIncoming).length;
  const open=active.filter(isOpen).length;
  const done=active.filter(r=>r.effStatus==='Complete').length;
  const overdue=active.filter(r=>r.effStatus==='Overdue').length;
  const dueWk=active.filter(r=>typeof r.daysleft==='number'&&r.daysleft>=0&&r.daysleft<=7&&isOpen(r)).length;
  const rate=total?Math.round(done/total*1000)/10:0;
  const cd=active.filter(r=>r.effStatus==='Complete'&&r.received&&(r.closed||r.due)).map(r=>Math.round((new Date(r.closed||r.due)-new Date(r.received))/86400000)).filter(n=>n>=0);
  const avg=cd.length?Math.round(cd.reduce((a,b)=>a+b,0)/cd.length):0;
  function grp(field,listKey,eff){const m={};(state.lists[listKey]||[]).forEach(x=>m[biVal(x)]=0);active.forEach(r=>{const k=eff?r.effStatus:r[field];if(m[k]!=null)m[k]++;});return Object.entries(m).filter(([k,v])=>v>0);}
  const cats=grp('category','categories'),sts=grp(null,'statuses',true),pris=grp('priority','priorities');
  const pm={};active.forEach(r=>{if(r.project)pm[r.project]=(pm[r.project]||0)+1;});const projR=Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const wm={};active.forEach(r=>{if(r.assignedTo&&isOpen(r))wm[r.assignedTo]=(wm[r.assignedTo]||0)+1;});const wlR=Object.entries(wm).sort((a,b)=>b[1]-a[1]);
  const rm={};active.forEach(r=>{if(r.requestedBy&&r.requestedBy!=='—')rm[r.requestedBy]=(rm[r.requestedBy]||0)+1;});const reqR=Object.entries(rm).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tm={};active.forEach(r=>{if(r.received){const mo=r.received.slice(0,7);tm[mo]=(tm[mo]||0)+1;}});const tR=Object.entries(tm).sort((a,b)=>a[0]<b[0]?-1:1);
  const al=active.filter(r=>isOpen(r)&&typeof r.daysleft==='number'&&r.daysleft<=7).sort((a,b)=>a.daysleft-b.daysleft).slice(0,12);
  function bars(arr,cf,lf){const mx=Math.max(1,...arr.map(x=>x[1]));return arr.map(([k,v])=>`<div class="bar-row"><div class="blab">${esc(lf?lf(k):k)}</div><div class="bar-track"><div class="bar-fill" style="width:${v/mx*100}%;background:${cf?cf(k):'var(--accent)'}">${v}</div></div></div>`).join('');}
  let h=`<div class="phead"><div class="eyebrow">${t('dashEye')}</div><h1>${t('dashH1')}</h1><p>${t('dashP')}</p></div>`;
  if(W.kpis)h+=`<div class="kpis">
    <div class="kpi"><div class="bar"></div><div class="lab">${t('kTotal')}</div><div class="val">${total}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--amber)"></div><div class="lab">${t('kPending')}</div><div class="val">${pending}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--accent)"></div><div class="lab">${t('kOpen')}</div><div class="val">${open}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--amber)"></div><div class="lab">${t('kDueWk')}</div><div class="val">${dueWk}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--red)"></div><div class="lab">${t('kOver')}</div><div class="val">${overdue}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--green)"></div><div class="lab">${t('kDone')}</div><div class="val">${done}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--accent)"></div><div class="lab">${t('kRate')}</div><div class="val">${rate}%</div></div>
    <div class="kpi"><div class="bar" style="background:var(--steel)"></div><div class="lab">${t('kAvgDays')}</div><div class="val">${avg}</div></div></div>`;
  if(W.alerts){const aH=al.length?al.map(r=>{const ov=r.daysleft<0;return `<div class="alert-row ${ov?'ov':''}"><span class="id" style="font-weight:700;color:var(--med);font-size:12px">${fmtID(r.id)}</span><span class="alert-title">${esc(r.title)}</span><span class="alert-meta">${esc(r.assignedTo||'—')}</span><span class="alert-days">${ov?(Math.abs(r.daysleft)+'d '+t('overdueBy')):(t('dueIn')+' '+r.daysleft+'d')}</span></div>`;}).join(''):`<div class="empty" style="padding:18px">${t('noAlerts')}</div>`;h+=`<div class="panel" style="margin-bottom:20px"><div class="alert-head"><span class="sec-dot inbox"></span> ${t('alerts')}</div>${aH}</div>`;}
  let c='';
  if(W.byCat)c+=`<div class="chart-card"><h3>${t('byCat')}</h3>${cats.length?bars(cats,null,dispCat):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.bySt)c+=`<div class="chart-card"><h3>${t('bySt')}</h3>${sts.length?bars(sts,k=>STATUS_COLORS[k]):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.byPri)c+=`<div class="chart-card"><h3>${t('byPri')}</h3>${pris.length?bars(pris,k=>PR_COLOR[k]||'var(--accent)',dispPri):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.byProj)c+=`<div class="chart-card"><h3>${t('byProj')}</h3>${projR.length?bars(projR):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.wlTeam)c+=`<div class="chart-card"><h3>${t('wlTeam')}</h3>${wlR.length?bars(wlR,()=>'var(--med)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.overTime)c+=`<div class="chart-card"><h3>${t('overTime')}</h3>${tR.length?bars(tR,()=>'var(--steel)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(W.topReq)c+=`<div class="chart-card"><h3>${t('topReq')}</h3>${reqR.length?bars(reqR,()=>'var(--purple)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`}</div>`;
  if(c)h+=`<div class="charts">${c}</div>`;
  return h;
}

  const card=(title,key)=>`<div class="list-card"><h3>${title}<span style="font-size:11px;color:var(--grey);font-weight:600">${state.lists[key].length}</span></h3><div class="items">${state.lists[key].map((x,i)=>`<div class="list-item"><span>${esc(biVal(x))}</span><button onclick="delItem('${key}',${i})">×</button></div>`).join('')}</div><div class="additem"><input id="add_${key}" placeholder="${t('addNew')}" onkeydown="if(event.key==='Enter')addItem('${key}')"/><button class="btn sm" onclick="addItem('${key}')">${t('add')}</button></div></div>`;

  <div class="settings-grid">${card(t('sProjects'),'projects')}${biCard(t('sCats'),'categories')}${card(t('sEmps'),'employees')}${biCard(t('sPris'),'priorities')}</div>`;
}
async function addItem(key){const el=document.getElementById('add_'+key);const v=el.value.trim();if(!v)return;if(state.lists[key].some(x=>biVal(x)===v)){toast(t('exists'));return;}state.lists[key].push(v);await saveLists();render();toast(t('added'));}
async function addBiItem(key){const ar=(document.getElementById('add_'+key+'_ar').value||'').trim();const en=(document.getElementById('add_'+key+'_en').value||'').trim();if(!ar&&!en){return;}const enV=en||ar;const arV=ar||en;if(state.lists[key].some(x=>biVal(x)===enV)){toast(t('exists'));return;}state.lists[key].push({en:enV,ar:arV});await saveLists();render();toast(t('added'));}
async function delItem(key,i){state.lists[key].splice(i,1);await saveLists();render();}
async function toggleWidget(k){state.widgets[k]=!state.widgets[k];await saveWidgets();render();}

/* ===== export ===== */
function exportExcel(scope){
  let rows;let fname='OM_Service_Requests.csv';
  if(scope==='open'){rows=state.requests.map(calc).filter(isOpen).sort((a,b)=>a.id-b.id);fname='OM_Open_Tasks.csv';}
  else{rows=state.requests.map(calc).filter(r=>!r.archived).sort((a,b)=>a.id-b.id);}
  const head=['#','Project','Category','Priority','Assigned To','Task Title','Manager Note','Received','Start','Duration','Status','Task ID','Due','Closed','Days Left','Progress %','Requested By','Mobile'];
  const data=rows.map((r,i)=>[i+1,r.project,r.category,r.priority,r.assignedTo,r.title,r.notes,r.received,r.start,r.duration,r.effStatus,fmtID(r.id),r.due,r.closed,r.daysleft,Math.round((r.progress||0)*100)+'%',r.requestedBy,r.phone||'']);
  let csv=[head].concat(data).map(row=>row.map(c=>{c=c==null?'':String(c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
  toast(rows.length+' '+t('exported'));
}

function trackStatus(r){
  if(r.effStatus==='Complete'||r.status==='Complete')return {label:t('stComplete'),bg:'#D8EADF',fg:'#2E6E4E'};
  if(r.effStatus==='Cancelled'||r.status==='Cancelled')return {label:t('stCancelled'),bg:'#F0E1E0',fg:'#9A5450'};
  if(!r.accepted)return {label:t('trkWaiting'),bg:'#FBEFD6',fg:'#9A6B1E'};
  if(r.effStatus==='Overdue')return {label:t('stOverdue'),bg:'#F6DAD7',fg:'#A33B33'};
  if(r.effStatus==='On Hold')return {label:t('stOnHold'),bg:'#E6E9ED',fg:'#5A6B7B'};
  if(r.effStatus==='Needs Review')return {label:t('stNeedsReview'),bg:'#E3E9F5',fg:'#3A5A9E'};
  if(r.effStatus==='Needs Update')return {label:t('stNeedsUpdate'),bg:'#E3E9F5',fg:'#3A5A9E'};
  return {label:t('trkInProg'),bg:'#E3EDF6',fg:'#2E5E8E'};
}
let _trkSoft=null;function softTrack(){clearTimeout(_trkSoft);_trkSoft=setTimeout(()=>{const v=document.getElementById('trkSearch');const pos=v?v.selectionStart:null;render();const n=document.getElementById('trkSearch');if(n){n.focus();if(pos!=null)try{n.setSelectionRange(pos,pos);}catch(e){}}},250);}

  const mine=state.requests.map(calc).filter(r=>r.assignedTo===staffName && r.accepted && !r.archived && r.effStatus!=='Complete' && r.status!=='Cancelled').sort((a,b)=>b.id-a.id);
  if(staffModal){return staffDetail(staffModal);}
  const cards=mine.length?mine.map(r=>{
    let imgs=[];try{imgs=JSON.parse(r.images||'[]');}catch(e){}
    const pend=r.pendingConfirm?`<span class="stf-pend">⏳ ${t('stfPendBadge')}</span>`:'';
    return `<div class="stf-card" onclick="openStaffTask(${r.id})">

function openStaffTask(id){staffModal=id;render();}
function pickStaff(i){const names=(state.lists.employees||[]).map(biVal);if(names[i]!=null){staffName=names[i];staffModal=null;render();}}
function staffDetail(id){
  const r=state.requests.map(calc).find(x=>x.id===id);
  if(!r)return (staffModal=null,viewStaff());
  let imgs=[];try{imgs=JSON.parse(r.images||'[]');}catch(e){}
  let pdfs=[];try{pdfs=JSON.parse(r.files||'[]');}catch(e){}
  const gal=imgs.length?`<div class="stf-imgs">${imgs.map((u,i)=>`<img src="${esc(u)}" onclick="openLightboxArr(${id},${i})"/>`).join('')}</div>`:'';
  const pdfList=pdfs.length?`<div class="stf-files">${pdfs.map(f=>{const u=typeof f==='string'?f:f.url;const nm=typeof f==='string'?'PDF':(f.name||'PDF');return `<a class="stf-file" href="${esc(u)}" target="_blank" rel="noopener">📄 ${esc(nm)}</a>`;}).join('')}</div>`:'';
  const pend=r.pendingConfirm;
  return `<div class="panel emp-card staff-panel">
    <div class="stf-head"><button class="stf-back" onclick="staffModal=null;render()">‹ ${t('stfBackList')}</button><div class="stf-who">${esc(staffDisp(staffName))}</div></div>
    <div class="stf-detail">
      <div class="stf-d-id">${fmtID(r.id)}</div>
      <div class="stf-d-title">${esc(r.title)}</div>
      <div class="stf-d-grid">
        <div><span>${t('mProj')}</span><b>${esc(r.project)}</b></div>
        <div><span>${t('svcType')}</span><b>${esc(dispCat(r.category))}</b></div>
        <div><span>${t('priority')}</span><b>${esc(dispPri(r.priority))}</b></div>
        <div><span>${t('mDue')}</span><b>${esc(r.due||'—')}</b></div>
      </div>
      ${r.notes?`<div class="stf-note"><span>${t('noteLabel')}</span><p>${esc(r.notes)}</p></div>`:''}
      ${gal}
      ${pdfList}
      ${pend?`<div class="stf-pend-msg">⏳ ${t('stfPendMsg')}</div>`
            :`<button class="btn btn-lg stf-done" onclick="staffMarkDone(${r.id})">✅ ${t('stfDone')}</button>`}
    </div>
  </div>`;
}
function openLightboxArr(id,i){const r=state.requests.find(x=>x.id===id);if(!r)return;let a=[];try{a=JSON.parse(r.images||'[]');}catch(e){}if(!a.length)return;modal={type:'img',imgs:a,idx:i};
  // render a standalone modal overlay on top of staff page
  let host=document.getElementById('staff-modal-host');if(!host){host=document.createElement('div');host.id='staff-modal-host';document.body.appendChild(host);}
  const el={innerHTML:''};Object.defineProperty(el,'innerHTML',{set(v){host.innerHTML=v;}});
  // reuse gallery markup
  const imgs=a;const idx=i;const multi=imgs.length>1;
  const nav=multi?`<button class="gal-nav prev" onclick="event.stopPropagation();galStaffNav(-1)">‹</button><button class="gal-nav next" onclick="event.stopPropagation();galStaffNav(1)">›</button>`:'';
  host.innerHTML=`<div class="modal-bg gal-bg" onclick="closeStaffGal()"><button class="gal-close" onclick="closeStaffGal()">✕</button>${multi?`<div class="gal-count">${idx+1} / ${imgs.length}</div>`:''}<div class="gal-stage" onclick="event.stopPropagation()">${nav}<img class="gal-img" id="staffGalImg" src="${esc(imgs[idx])}"/></div></div>`;
}
function galStaffNav(d){if(!modal||modal.type!=='img')return;const n=modal.imgs.length;modal.idx=(modal.idx+d+n)%n;const img=document.getElementById('staffGalImg');if(img)img.src=modal.imgs[modal.idx];const c=document.querySelector('#staff-modal-host .gal-count');if(c)c.textContent=(modal.idx+1)+' / '+n;}
function closeStaffGal(){const h=document.getElementById('staff-modal-host');if(h)h.innerHTML='';modal=null;}
function staffMarkDone(id){
  staffModal2={id};
  // confirm dialog
  let host=document.getElementById('staff-modal-host');if(!host){host=document.createElement('div');host.id='staff-modal-host';document.body.appendChild(host);}
  host.innerHTML=`<div class="modal-bg" onclick="closeStaffConfirm()"><div class="modal" style="max-width:400px" onclick="event.stopPropagation()"><h3>${t('stfConfirmTitle')}</h3><p>${t('stfConfirmMsg')}<br><b>${fmtID(id)}</b></p><div class="btnrow" style="justify-content:flex-end"><button class="btn sec" onclick="closeStaffConfirm()">${t('cancel')}</button><button class="btn green" onclick="doStaffDone(${id})">${t('stfDoneYes')}</button></div></div></div>`;
}
let staffModal2=null;
function closeStaffConfirm(){const h=document.getElementById('staff-modal-host');if(h)h.innerHTML='';}
function doStaffDone(id){
  const r=state.requests.find(x=>x.id===id);if(!r){closeStaffConfirm();return;}
  r.pendingConfirm=true;
  closeStaffConfirm();staffModal=null;render();toast(t('stfDoneToast'));
  saveBg(id,r);
}

/* ===== boot ===== */
(async function(){await load();const p=(location.pathname||'').toLowerCase();
  if(p.indexOf('/admin')>=0){if(!L)L='en';const authed=await checkAdminFlag();if(authed)enterAdminDirect();else openAdmin();}
  else if(p.indexOf('/track')>=0){enterPublic('track');}
  else if(p.indexOf('/staff')>=0){enterPublic('staff');}
  else renderGate();
})();

</script></body></html>
