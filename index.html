function svgLine(data,opts){
  opts=opts||{};const w=opts.w||680,h=opts.h||260,padL=40,padR=16,padT=20,padB=48;
  if(!data.length)return `<div class="empty" style="padding:24px">${t('noData')}</div>`;
  const max=Math.max(1,...data.map(d=>d.v));
  const innerW=w-padL-padR, innerH=h-padT-padB;
  const n=data.length;
  const xFor=(i)=>padL+(n===1?innerW/2:innerW*i/(n-1));
  const yFor=(v)=>padT+innerH-(innerH*v/max);
  // grid + y labels (4 lines)
  let grid='';
  for(let i=0;i<=4;i++){const gy=padT+innerH-(innerH*i/4);grid+=`<line x1="${padL}" y1="${gy}" x2="${w-padR}" y2="${gy}" stroke="var(--grid)" stroke-width="1"/>`;grid+=`<text x="${padL-7}" y="${gy+3}" text-anchor="end" font-size="9" fill="var(--grey)">${Math.round(max*i/4)}</text>`;}
  // area + line path
  let linePts=data.map((d,i)=>`${xFor(i).toFixed(1)},${yFor(d.v).toFixed(1)}`).join(' ');
  let areaPath=`M${xFor(0).toFixed(1)},${(padT+innerH).toFixed(1)} `+data.map((d,i)=>`L${xFor(i).toFixed(1)},${yFor(d.v).toFixed(1)}`).join(' ')+` L${xFor(n-1).toFixed(1)},${(padT+innerH).toFixed(1)} Z`;
  // peak
  const mx=Math.max(...data.map(d=>d.v));
  let dots='',labels='';
  data.forEach((d,i)=>{
    const x=xFor(i),y=yFor(d.v);const peak=d.v===mx;
    dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${peak?5:3.5}" fill="${peak?'var(--med)':'var(--accent)'}" stroke="#fff" stroke-width="1.5"><title>${esc(d.k)}: ${d.v}</title></circle>`;
    dots+=`<text x="${x.toFixed(1)}" y="${(y-9).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${peak?'var(--med)':'var(--navy)'}">${d.v}</text>`;
    labels+=`<text x="${x.toFixed(1)}" y="${h-padB+16}" text-anchor="middle" font-size="10" font-weight="600" fill="var(--steel)">${esc(d.k)}</text>`;
  });
  // year band (once per year, centered under its months)
  let yearBand='';
  if(opts.showYear){
    const yearGroups={};data.forEach((d,i)=>{const y=d.year||'';if(!yearGroups[y])yearGroups[y]={xs:[]};yearGroups[y].xs.push(xFor(i));});
    Object.keys(yearGroups).forEach(y=>{const xs=yearGroups[y].xs;const cx=(Math.min(...xs)+Math.max(...xs))/2;yearBand+=`<text x="${cx.toFixed(1)}" y="${h-padB+30}" text-anchor="middle" font-size="11" font-weight="800" fill="var(--navy)">${esc(y)}</text>`;});
  }
  return `<svg viewBox="0 0 ${w} ${h}" class="rep-svg" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="lgArea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity="0.18"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${grid}
    <path d="${areaPath}" fill="url(#lgArea)"/>
    <polyline points="${linePts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}${labels}${yearBand}
  </svg>`;
}
function svgBars(data,opts){
  opts=opts||{};const w=opts.w||640,h=opts.h||220,pad=34,bw=Math.max(1,data.length);
  if(!data.length)return `<div class="empty" style="padding:24px">${t('noData')}</div>`;
  const max=Math.max(1,...data.map(d=>d.v));
  const innerW=w-pad*2, innerH=h-pad*2, gap=innerW/data.length*0.25, barW=(innerW/data.length)-gap;
  let bars='',labels='',grid='';
  for(let i=0;i<4;i++){const gy=pad+innerH-(innerH*i/3);grid+=`<line x1="${pad}" y1="${gy}" x2="${w-pad}" y2="${gy}" stroke="var(--grid)" stroke-width="1"/>`;grid+=`<text x="${pad-6}" y="${gy+3}" text-anchor="end" font-size="9" fill="var(--grey)">${Math.round(max*i/3)}</text>`;}
  data.forEach((d,i)=>{
    const x=pad+i*(barW+gap)+gap/2;
    const bh=innerH*(d.v/max);const y=pad+innerH-bh;
    const col=d.c||'var(--accent)';
    bars+=`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="4" fill="${col}"><title>${esc(d.k)}: ${d.v}</title></rect>`;
    if(d.v>0)bars+=`<text x="${x+barW/2}" y="${y-5}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--navy)">${d.v}</text>`;
    labels+=`<text x="${x+barW/2}" y="${h-pad+15}" text-anchor="middle" font-size="9.5" fill="var(--steel)">${esc(d.k)}</text>`;
  });

function monthlyTrend(){
  const all=state.requests.map(calc);
  const byMonth={};
  all.forEach(r=>{const ts=r.receivedAt;let m;if(ts){try{m=new Date(new Date(ts).getTime()+3*3600000).toISOString().slice(0,7);}catch(e){}}if(!m)m=(r.received||'').slice(0,7);if(!m)return;byMonth[m]=(byMonth[m]||0)+1;});
  const keys=Object.keys(byMonth).sort();
  if(!keys.length)return svgLine([],{w:680,h:260,showYear:true});
  // build a continuous month sequence from first month with data → current month
  const start=keys[0];
  const todayM=new Date(new Date(Date.now()+3*3600000)).toISOString().slice(0,7);
  const end=todayM>keys[keys.length-1]?todayM:keys[keys.length-1];
  let y=Number(start.slice(0,4)),mo=Number(start.slice(5,7));
  const ey=Number(end.slice(0,4)),em=Number(end.slice(5,7));
  const data=[];let guard=0;
  while((y<ey||(y===ey&&mo<=em))&&guard<240){
    const key=y+'-'+String(mo).padStart(2,'0');
    data.push({k:String(mo),year:String(y),v:byMonth[key]||0});
    mo++;if(mo>12){mo=1;y++;}guard++;
  }
  return svgLine(data,{w:680,h:260,showYear:true});
}

// ===== REPORT ENGINE =====
// Daily report = EVENTS that happened that day (by their own timestamp)
function reportDataDaily(from,to){
  const all=state.requests.map(calc);
  const requested=all.filter(r=>inRange(r.receivedAt||r.received,from,to));
  const pending=all.filter(r=>isIncoming(r)&&inRange(r.receivedAt||r.received,from,to));
  const daily=all.filter(r=>isAccepted(r)&&!r.pendingConfirm&&r.effStatus==='In Progress'&&inRange(r.startedAt||r.start,from,to));
  const ongoing=all.filter(r=>isAccepted(r)&&!r.pendingConfirm&&r.effStatus==='In Progress'&&!inRange(r.startedAt||r.start,from,to));
  const closed=all.filter(r=>r.effStatus==='Complete'&&inRange(r.confirmedAt,from,to));
  const rejected=all.filter(r=>(r.effStatus==='Cancelled'||r.status==='Rejected')&&inRange(r.rejectedAt,from,to));
  return {requested,pending,daily,ongoing,closed,rejected};
}
// Period report = requests RECEIVED in the period, classified by CURRENT status.
// `archived` is a STORAGE flag (auto-archive after 8h), never a business state:
// it must not affect any bucket here. Buckets are mutually exclusive and total
// to inPeriod.length -> Complete | Cancelled/Rejected | In Progress | Other.
function reportDataPeriod(from,to){
  const all=state.requests.map(calc);
  const inPeriod=all.filter(r=>inRange(r.receivedAt||r.received,from,to));
  const completed=inPeriod.filter(r=>r.effStatus==='Complete');
  const rejected=inPeriod.filter(r=>r.effStatus==='Cancelled'||r.status==='Rejected');
  const inprog=inPeriod.filter(r=>r.effStatus==='In Progress');
  const other=inPeriod.filter(r=>r.effStatus!=='Complete'&&r.effStatus!=='Cancelled'&&r.status!=='Rejected'&&r.effStatus!=='In Progress');
  return {all:inPeriod,completed,rejected,inprog,other};
}
async function generateReport(kind){
  let from,to,label;
  if(kind==='today'){from=to=today();label=today();}
  else if(kind==='day'){const d=document.getElementById('rep_day').value;if(!d){toast(t('repPickDates'));return;}from=to=d;label=d;}
  else{from=document.getElementById('rep_from').value;to=document.getElementById('rep_to').value;if(!from||!to){toast(t('repPickDates'));return;}if(from>to){const x=from;from=to;to=x;}label=from===to?from:(from+' \u2192 '+to);}
  toast(t('repGenerating'));
  // pull the latest data from the database so the report is fully up to date
  try{const sb=await sbFetchAll();if(sb!==null){state.requests=sb;render();}}catch(e){}
  if(kind==='range'){
    const data=reportDataPeriod(from,to);
    buildPeriodPDF(data,label);
    try{await buildPeriodExcel(data,label);}catch(e){toast(t('repExcelErr'));}
  }else{
    const data=reportDataDaily(from,to);
    buildDailyPDF(data,label);
    try{await buildDailyExcel(data,label);}catch(e){toast(t('repExcelErr'));}
  }
}

function repTable(arr){
  const rows=arr.length?arr.map(r=>`<tr><td>${fmtID(r.id)}</td><td>${esc(r.title)}</td><td>${esc(r.requestedBy||'\u2014')}</td><td>${esc(r.assignedTo||'\u2014')}</td><td>${esc(r.effStatus)}</td><td>${fmtTime(r.receivedAt)}</td><td>${fmtTime(r.startedAt)}</td><td>${fmtTime(r.confirmedAt)}</td><td>${fmtDuration(r.receivedAt,r.confirmedAt)}</td></tr>`).join(''):`<tr><td colspan="9" style="text-align:center;color:#888">No records</td></tr>`;
  return `<table><thead><tr><th>Task ID</th><th>Title</th><th>Requested By</th><th>Assigned To</th><th>Status</th><th>Received</th><th>Accepted</th><th>Closed</th><th>Completion</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// Save handler for accept / edit / add forms
// A8-UI-1a: status-change comment is collected via a popup (askStatusComment), never mixed
// with the permanent Manager Note. These statuses trigger the comment popup on save.
const STATUS_COMMENT_SET=['On Hold','Needs Review','Needs Update','Cancelled','Complete'];
// A8-UI-1a: popup to collect an optional comment for a status change, then fire the RPC.
function askStatusComment(id,status,action){
  modal={type:'statusComment',id,status,action};renderModal();
}
async function doStatusComment(id,action){
  const el=document.getElementById('sc_reason');
  const reason=el?(el.value||'').trim():'';
  await admTaskAction(id,action,reason||null,'savedToast');
}
async function saveTaskForm(mode,id){
  clearDirty();
  const g=i=>document.getElementById(i);
  const gv=i=>{const e=g(i);return e?e.value:'';};
  const assign=gv('tf_assign'), dur=gv('tf_dur');
  const note=(gv('tf_notes')||'').trim();  // permanent task note / acceptance instructions
  if(mode==='accept'){
    if(!assign||!dur){toast(t('fillReq'));return;}
    if(!/^\d+$/.test(String(dur))||Number(dur)<1){toast(t('badDur'));return;}
    const r=state.requests.find(x=>x.id===id);if(!r)return;
    const startAtRaw=g('tf_startat')?g('tf_startat').value:'';
    let schedIso=null;
    if(startAtRaw){
      const startMs=new Date(startAtRaw).getTime();
      if(isNaN(startMs)){toast(t('badDate'));return;}
      // a scheduled start must be in the FUTURE — reject past/now moments
      if(startMs<=Date.now()){toast(t('schedPast'));return;}
      schedIso=new Date(startMs).toISOString();
    }
    {
      // Accept + assign via server RPC: verifies admin, staff and task state;
      // immediate tasks → In Progress, future scheduled tasks → Not Started
      if(adminActionBusy)return;
      adminActionBusy=true;
      try{
        const res=await admRpc('admin_accept_assign_task',{p_task_id:id,p_assigned_to:assign,p_duration:Number(dur),p_sched_start:schedIso,p_note:note||null});
        if(res&&res.ok===true){await admReloadRequests();finishModal(fmtID(id)+' — '+t('acceptedToast'));}
        else{toast(admOpError(res));if(res&&res.error==='session'){admSessionGone();}}
      }finally{adminActionBusy=false;}
      return;
    }
  }
  if(mode==='edit'){
    const statusEl=g('tf_status');
    const proj=g('tf_proj').value,cat=g('tf_cat').value,pri=g('tf_pri').value,start=g('tf_start').value,status=statusEl?statusEl.value:null;
    if(!proj||!cat||!pri||!assign||!dur||!start||(statusEl&&!status)){toast(t('fillReq'));return;}
    if(!/^\d+$/.test(String(dur))||Number(dur)<1){toast(t('badDur'));return;}
    const r=state.requests.find(x=>x.id===id);if(!r)return;
    // A7: if the manager changed the STATUS to an administrative state, that takes priority —
    // route it through admin_task_action (server-validated) and ignore the field edits this time.
    if(statusEl && status!==r.status){
      const ACTION_MAP={'On Hold':'on_hold','Needs Review':'needs_review','Needs Update':'needs_update','Cancelled':'cancel','Complete':'complete','Not Started':'return_to_acceptance','In Progress':'return_to_technician'};
      const action=ACTION_MAP[status];
      if(action){
        // A8-UI-1a fix: the ordinary fields (incl. permanent Manager Note) must NOT be lost when
        // status also changes. Save them first via admin_edit_task; only on success proceed to the
        // status change. This never mixes the permanent note with the status-change comment.
        let schedIso=r.schedStart||'';
        if(r.schedStart && start && start!==r.start){
          const prev=new Date(r.schedStart);const hh=(prev.getTime()+3*3600000);const d2=new Date(hh);
          const stampMs=Date.UTC(Number(start.slice(0,4)),Number(start.slice(5,7))-1,Number(start.slice(8,10)),d2.getUTCHours(),d2.getUTCMinutes(),0)-3*3600000;
          schedIso=new Date(stampMs).toISOString();
        }
        // admin_edit_task only edits ordinary fields on an accepted, non-archived task. For
        // transitions where it would be rejected (e.g. returning to acceptance, or a not-yet-
        // accepted task), skip the pre-save and go straight to the status action.
        const canPreSave=(r.accepted && !r.archived && !r.pendingConfirm && status!=='Not Started');
        if(canPreSave){
          const patch={project:proj,category:cat,priority:pri,assigned_to:assign,start_date:start,duration:String(dur),notes:note||''};
          if(schedIso)patch.sched_start=schedIso;
          const ok=await admEditSilent(id,patch);   // saves fields; keeps modal open; no toast/close
          if(!ok)return;                              // save failed → keep Edit modal open, no popup
        }
        // fields saved (or not applicable) → now handle the status change
        if(STATUS_COMMENT_SET.includes(status)){askStatusComment(id,status,action);return;}
        await admTaskAction(id,action,null,'savedToast');
        return;
      }
      // Note: Complete IS mapped ('complete') and IS in STATUS_COMMENT_SET, so it takes the
      // secure path above (admEditSilent → admTaskAction('complete')) and returns. Only a status
      // with no mapped action would fall through to the legacy PATCH below.
    }
    // A8-1: status unchanged → this is a pure field edit. Route through the secure
    // admin_edit_task RPC (never touches status). Build sched_start consistent with the date.
    if(statusEl && status===r.status){
      let schedIso=r.schedStart||'';
      if(r.schedStart && start && start!==r.start){
        const prev=new Date(r.schedStart);const hh=(prev.getTime()+3*3600000);const d2=new Date(hh);
        const stampMs=Date.UTC(Number(start.slice(0,4)),Number(start.slice(5,7))-1,Number(start.slice(8,10)),d2.getUTCHours(),d2.getUTCMinutes(),0)-3*3600000;
        schedIso=new Date(stampMs).toISOString();
      }
      const patch={project:proj,category:cat,priority:pri,assigned_to:assign,start_date:start,duration:String(dur),notes:note||''};
      if(schedIso)patch.sched_start=schedIso;
      await admEditTask(id,patch,'savedToast');
      return;
    }
    // Every status the dropdown offers (EDIT_STATUSES) is mapped in ACTION_MAP, so
    // one of the two secure branches above always returns. Nothing reaches here.
    return;
  }
  if(mode==='add'){
    const req=g('tf_req').value.trim(),proj=g('tf_proj').value,cat=g('tf_cat').value,pri=g('tf_pri').value;
    if(!proj||!cat||!pri||!assign||!dur){toast(t('fillReq'));return;}
    const title=g('tf_title').value.trim();if(!title){toast(t('fillReq'));return;}
    // Manual add via admin_add_task RPC (server sets status/accepted/archived/timestamps).
    await admAddTask({p_requested_by:req||null,p_project:proj,p_category:cat,p_priority:pri,p_title:title,p_assigned_to:assign,p_duration:Number(dur),p_note:note||null},'added');
    return;
  }
}

function fieldSelect(id,arr,sel,label,req){return `<div class="field"><label>${label}${req?' <span class=\"req\">*</span>':''}</label><select id="${id}">${opts(arr,sel)}</select></div>`;}
function empSelect(id,sel,req){
  /* Pickers offer ACTIVE technicians only — but the task's CURRENT assignee must
     stay visible even when deactivated, otherwise the field would render empty and
     the admin could not edit a legacy task's date/duration without changing staff.
     admin_edit_task deliberately allows that (it only enforces active on a CHANGE). */
  const names=activeStaffNames().slice();
  if(sel&&names.indexOf(sel)===-1)names.unshift(sel);
  const isInactive=function(n){const s=staffList().find(x=>x.en===n);return !!(s&&s.active===false);};
  return `<div class="field"><label>${t('mAssign')}${req?' <span class=\"req\">*</span>':''}</label><select id="${id}"><option value="">${t('select')}</option>${names.map(e=>`<option value="${esc(e)}" ${sel===e?'selected':''}>${esc(staffDisp(e))}${isInactive(e)?' — '+t('stfInactiveTag'):''}</option>`).join('')}</select></div>`;}

function renderModal(){
  let el=document.getElementById('modal');if(!el){el=document.createElement('div');el.id='modal';document.body.appendChild(el);}
  if(!modal){el.innerHTML='';return;}
  const close=`onclick="if(event.target===this){modal=null;renderModal();}"`;
  if(modal.type==='staffedit'){
    el.innerHTML=`<div class="modal-bg" onclick="if(event.target===this){guardCloseModal();}"><div class="modal" oninput="markDirty()" onchange="markDirty()" style="max-width:440px"><h3>${t('editStaffTitle')}</h3>
      <div class="field" style="margin-bottom:12px"><label>${t('addNameAr')}</label><input id="se_ar" value="${esc(modal.ar)}"/></div>
      <div class="field" style="margin-bottom:12px"><label>${t('addNameEn')}</label><input id="se_en" value="${esc(modal.en)}"/></div>
      <div class="field" style="margin-bottom:12px"><label>${t('stfCodeLab')}</label><input id="se_code" value="${esc(modal.code)}" maxlength="3" inputmode="numeric" dir="ltr" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/></div>
      <div class="field" style="margin-bottom:16px"><label>${t('mPhone')}</label><input id="se_phone" value="${esc(modal.phone||'')}" inputmode="tel" dir="ltr" placeholder="05XXXXXXXX"/></div>
      <div class="btnrow" style="justify-content:flex-end"><button class="btn sec" onclick="guardCloseModal()">${t('cancel')}</button><button class="btn" onclick="saveStaffEdit()">${t('save')}</button></div></div></div>`;return;
  }
  if(modal.type==='period'){
    el.innerHTML=`<div class="modal-bg" onclick="if(event.target===this){guardCloseModal();}"><div oninput="markDirty()" onchange="markDirty()">${periodFormHTML()}</div></div>`;return;
  }
  if(modal.type==='confirm'){
    el.innerHTML=`<div class="modal-bg" ${close}><div class="modal" style="max-width:420px"><h3>${esc(modal.title)}</h3>${modal.msg?`<p><b>${modal.msg}</b></p>`:''}<div class="btnrow" style="justify-content:flex-end"><button class="btn sec" onclick="modal=null;renderModal()">${t('cancel')}</button><button class="btn ${modal.okClass||''}" onclick="${modal.onok}">${modal.okLabel||t('confirmRejYes')}</button></div></div></div>`;return;

/* ===== DASHBOARD ===== */
function viewDashboard(){
  const rows=state.requests.map(calc);const W=state.widgets;
  // `archived` is a legacy internal flag, NOT a status. The 8h auto-archive Cron is now
  // DISABLED and completed tasks were un-archived: the requester's 8h window is computed
  // from confirmed_at at read time instead. Only Rejected/Cancelled rows still carry the
  // flag (pending phase-2 separation). It must never change the counters.
  //   allRows  -> historical: totals, completion, charts, reports
  //   workRows -> operational: queues, alerts, workload
  const allRows=rows;
  const workRows=rows.filter(r=>!r.archived);
  // TOTAL means TOTAL: every request ever raised is counted, whatever its outcome.
  // (It used to exclude Cancelled, which made the headline number disagree with the
  //  charts and with the database — a "total" that hides records is not a total.)
  const total=allRows.length;
  const pending=workRows.filter(isIncoming).length;
  const open=workRows.filter(isOpen).length;
  const done=allRows.filter(r=>r.effStatus==='Complete').length;
  const overdue=workRows.filter(r=>r.effStatus==='Overdue').length;
  const dueWk=workRows.filter(r=>typeof r.daysleft==='number'&&r.daysleft>=0&&r.daysleft<=7&&isOpen(r)).length;
    // Completion rate keeps Cancelled OUT OF THE DENOMINATOR only: a withdrawn request
  // was never work the team failed to finish, so counting it against them would be
  // misleading. The Total above still shows it.
  const rateBase=allRows.filter(r=>r.effStatus!=='Cancelled').length;
  const rate=rateBase?Math.round(done/rateBase*1000)/10:0;
  const cd=allRows.filter(r=>r.effStatus==='Complete'&&r.received&&(r.closed||r.due)).map(r=>Math.round((new Date(r.closed||r.due)-new Date(r.received))/86400000)).filter(n=>n>=0);
  const avg=cd.length?Math.round(cd.reduce((a,b)=>a+b,0)/cd.length):0;
  function grp(source,field,listKey,eff){const m={};(state.lists[listKey]||[]).forEach(x=>m[biVal(x)]=0);source.forEach(r=>{const k=eff?r.effStatus:r[field];if(m[k]!=null)m[k]++;});return Object.entries(m).filter(([k,v])=>v>0);}
  const cats=grp(allRows,'category','categories'),sts=grp(allRows,null,'statuses',true),pris=grp(allRows,'priority','priorities');
  const pm={};allRows.forEach(r=>{if(r.project)pm[r.project]=(pm[r.project]||0)+1;});const projR=Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const wm={};workRows.forEach(r=>{if(r.assignedTo&&isOpen(r))wm[r.assignedTo]=(wm[r.assignedTo]||0)+1;});const wlR=Object.entries(wm).sort((a,b)=>b[1]-a[1]);
  const rm={};allRows.forEach(r=>{if(r.requestedBy&&r.requestedBy!=='—')rm[r.requestedBy]=(rm[r.requestedBy]||0)+1;});const reqR=Object.entries(rm).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tm={};allRows.forEach(r=>{if(r.received){const mo=r.received.slice(0,7);tm[mo]=(tm[mo]||0)+1;}});const tR=Object.entries(tm).sort((a,b)=>a[0]<b[0]?-1:1);
  const al=workRows.filter(r=>isOpen(r)&&typeof r.daysleft==='number'&&r.daysleft<=7).sort((a,b)=>a.daysleft-b.daysleft).slice(0,12);
  function bars(arr,cf,lf){const mx=Math.max(1,...arr.map(x=>x[1]));return arr.map(([k,v])=>`<div class="bar-row"><div class="blab">${esc(lf?lf(k):k)}</div><div class="bar-track"><div class="bar-fill" style="width:${v/mx*100}%;background:${cf?cf(k):'var(--accent)'}">${v}</div></div></div>`).join('');}
  function donut(arr,cf,lf){
    const tot=arr.reduce((a,[,v])=>a+v,0)||1;const R=54,C=2*Math.PI*R;let off=0;
    const segs=arr.map(([k,v])=>{const frac=v/tot;const len=frac*C;const col=cf?cf(k):'var(--accent)';const s=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${col}" stroke-width="22" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"></circle>`;off+=len;return s;}).join('');
    const legend=arr.map(([k,v])=>`<div class="dleg"><span class="ddot" style="background:${cf?cf(k):'var(--accent)'}"></span><span class="dlk">${esc(lf?lf(k):k)}</span><span class="dlv">${v}</span></div>`).join('');
    return `<div class="donut-wrap"><svg viewBox="0 0 140 140" class="donut">${segs}<text x="70" y="64" text-anchor="middle" class="donut-tot">${tot}</text><text x="70" y="84" text-anchor="middle" class="donut-lab">${esc(t('total'))}</text></svg><div class="dlegend">${legend}</div></div>`;
  }
  function chartCard(key,title,inner){const closed=W.closed&&W.closed[key];return `<div class="chart-card ${closed?'closed':''}"><h3 onclick="toggleChart('${key}')"><span class="cc-caret">${closed?'▸':'▾'}</span> ${title}</h3><div class="cc-body">${inner}</div></div>`;}
  let h=`<div class="stats-head"><span class="rep-ic">📊</span> <b>${t('statsTitle')}</b></div>`;
  if(W.kpis)h+=`<div class="kpis">
    <div class="kpi"><div class="bar"></div><div class="lab">${t('kTotal')}</div><div class="val">${total}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--amber)"></div><div class="lab">${t('kPending')}</div><div class="val">${pending}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--accent)"></div><div class="lab">${t('kOpen')}</div><div class="val">${open}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--amber)"></div><div class="lab">${t('kDueWk')}</div><div class="val">${dueWk}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--red)"></div><div class="lab">${t('kOver')}</div><div class="val">${overdue}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--green)"></div><div class="lab">${t('kDone')}</div><div class="val">${done}</div></div>
    <div class="kpi"><div class="bar" style="background:var(--accent)"></div><div class="lab">${t('kRate')}</div><div class="val">${rate}%</div></div>
    <div class="kpi"><div class="bar" style="background:var(--steel)"></div><div class="lab">${t('kAvgDays')}</div><div class="val">${avg}</div></div></div>`;
  if(W.alerts){const aH=al.length?al.map(r=>{const ov=r.daysleft<0;return `<div class="alert-row ${ov?'ov':''}"><span class="id" style="font-weight:700;color:var(--med);font-size:12px">${fmtID(r.id)}</span><span class="alert-title">${esc(r.title)}</span><span class="alert-meta">${esc(r.assignedTo||'—')}</span><span class="alert-days">${ov?(Math.abs(r.daysleft)+'d '+t('overdueBy')):(t('dueIn')+' '+r.daysleft+'d')}</span></div>`;}).join(''):`<div class="empty" style="padding:18px">${t('noAlerts')}</div>`;h+=`<div class="panel" style="margin-bottom:20px"><div class="alert-head"><span class="sec-dot inbox"></span> ${t('alerts')}</div>${aH}</div>`;}
  let c='';
  if(W.byCat)c+=chartCard('byCat',t('byCat'),cats.length?bars(cats,null,dispCat):`<div class="empty" style="padding:18px">${t('noData')}</div>`);
  if(W.bySt)c+=chartCard('bySt',t('bySt'),sts.length?donut(sts,k=>STATUS_COLORS[k]):`<div class="empty" style="padding:18px">${t('noData')}</div>`);
  if(W.byPri)c+=chartCard('byPri',t('byPri'),pris.length?donut(pris,k=>PR_COLOR[k]||'var(--accent)',dispPri):`<div class="empty" style="padding:18px">${t('noData')}</div>`);
  if(W.byProj)c+=chartCard('byProj',t('byProj'),projR.length?bars(projR):`<div class="empty" style="padding:18px">${t('noData')}</div>`);
  if(W.wlTeam)c+=chartCard('wlTeam',t('wlTeam'),wlR.length?bars(wlR,()=>'var(--med)',null,true):`<div class="empty" style="padding:18px">${t('noData')}</div>`);
  if(W.overTime)c+=chartCard('overTime',t('overTime'),tR.length?bars(tR,()=>'var(--steel)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`);
  if(W.topReq)c+=chartCard('topReq',t('topReq'),reqR.length?bars(reqR,()=>'var(--purple)'):`<div class="empty" style="padding:18px">${t('noData')}</div>`);
  if(c)h+=`<div class="charts">${c}</div>`;
  return h;
}
function toggleChart(key){if(!state.widgets.closed)state.widgets.closed={};state.widgets.closed[key]=!state.widgets.closed[key];/* view preference: persist best-effort, never interrupt */saveWidgets(false);render();}

async function updStaffField(id,field,val){
  const v=(val||'').trim();
  if(field==='code'&&v&&staffList().some(s=>s.id!==id&&String(s.code)===v)){toast(t('codeExists'));render();return;}
  // A10: partial edit via server RPC — sends ONLY the changed field, so a
  // concurrent edit to a different field is not clobbered. If `en` changes the
  // server re-points requests + recurring_tasks atomically.
  if(adminActionBusy)return;
  adminActionBusy=true;
  try{
    const res=await admRpc('admin_patch_staff',{p_staff_id:id,p_patch:{[field]:v||null}});
    if(res&&res.ok===true){
      const st=await sbFetchStaff();if(st!==null)state.staff=st;
      if(res.tasks_updated>0){await admReloadRequests();}
      if(res.templates_updated>0){const rec=await sbFetchRecurring();if(rec!==null)state.recurring=rec;}
      render();toast(t('saved'));
    }else{
      toast(admOpError(res));render();
      if(res&&res.error==='session'){admSessionGone();}
    }
  }finally{adminActionBusy=false;}
}
async function addStaff(){
  const ar=(document.getElementById('add_staff_ar').value||'').trim();
  const en=(document.getElementById('add_staff_en').value||'').trim();
  const code=(document.getElementById('add_staff_code').value||'').trim();
  const phone=(document.getElementById('add_staff_phone').value||'').trim();
  if(!en&&!ar){toast(t('staffNeedName'));return;}
  const enV=en||ar,arV=ar||en;
  const existing=staffList().find(s=>s.en===enV);if(existing){toast(admOpError({error:existing.active===false?'staff_name_inactive':'staff_name_exists'}));return;}
  if(code&&staffList().some(s=>String(s.code)===code)){toast(t('codeExists'));return;}
  // A10: create via server RPC — sort_order computed server-side under a lock
  if(adminActionBusy)return;
  adminActionBusy=true;
  try{
    const res=await admRpc('admin_add_staff',{p_en:enV,p_ar:arV,p_code:code||null,p_phone:phone||null});
    if(res&&res.ok===true){
      const st=await sbFetchStaff();if(st!==null)state.staff=st;
      render();toast(t('added'));
    }else{
      toast(admOpError(res));
      if(res&&res.error==='session'){admSessionGone();}
    }
  }finally{adminActionBusy=false;}
}
async function updStaffCode(id,val){

  if(adminActionBusy)return;

async function saveStaffEdit(){clearDirty();
  const id=modal.id;const en=(document.getElementById('se_en').value||'').trim();const ar=(document.getElementById('se_ar').value||'').trim();const code=(document.getElementById('se_code').value||'').trim();const phone=(document.getElementById('se_phone').value||'').trim();
  if(!en&&!ar){toast(t('staffNeedName'));return;}
  if(code&&staffList().some(s=>s.id!==id&&String(s.code)===code)){toast(t('codeExists'));return;}
  const enV=en||ar,arV=ar||en;
  // A9: staff edit + rename propagation via server RPC (atomic).
  // Server updates staff, requests.assigned_to AND recurring_tasks.assigned_to
  // in one transaction, and reads the old name itself (never trusts the client).
  if(adminActionBusy)return;
  adminActionBusy=true;
  try{
    const res=await admRpc('admin_update_staff',{p_staff_id:id,p_en:enV,p_ar:arV,p_code:code||null,p_phone:phone||null});
    if(res&&res.ok===true){
      modal=null;
      const st=await sbFetchStaff();if(st!==null)state.staff=st;
      if(res.tasks_updated>0){await admReloadRequests();}
      if(res.templates_updated>0){const rec=await sbFetchRecurring();if(rec!==null)state.recurring=rec;}
      render();toast(t('saved'));
    }else{
      toast(admOpError(res));
      if(res&&res.error==='session'){admSessionGone();}
    }
  }finally{adminActionBusy=false;}
}

async function doDelStaff(id){

  // Refused (staff_in_use) if he still has live tasks or any template.
  modal=null;

}

async function addItem(key){
  const el=document.getElementById('add_'+key);const v=el.value.trim();if(!v)return;
  if(state.lists[key].some(x=>biVal(x)===v)){toast(t('exists'));return;}
  // Optimistic push, but ROLL BACK if the server refuses: otherwise the item sits in the
  // UI under a "saved" toast and vanishes on the next refresh — a false success is worse
  // than an error.
  state.lists[key].push(v);
  const ok=await saveLists();
  if(!ok){state.lists[key].pop();render();return;}
  el.value='';render();toast(t('added'));
}
async function addBiItem(key){
  const arEl=document.getElementById('add_'+key+'_ar');
  const enEl=document.getElementById('add_'+key+'_en');
  const ar=(arEl.value||'').trim();const en=(enEl.value||'').trim();
  if(!ar&&!en){return;}
  const enV=en||ar;const arV=ar||en;
  if(state.lists[key].some(x=>biVal(x)===enV)){toast(t('exists'));return;}
  state.lists[key].push({en:enV,ar:arV});
  const ok=await saveLists();
  if(!ok){state.lists[key].pop();render();return;}
  arEl.value='';enEl.value='';render();toast(t('added'));
}
async function delItem(key,i){
  const removed=state.lists[key][i];
  state.lists[key].splice(i,1);
  const ok=await saveLists();
  if(!ok){state.lists[key].splice(i,0,removed);render();return;}
  render();
}
async function toggleWidget(k){
  // Settings-page toggle: a deliberate change to what every admin sees. Roll back and
  // report if it does not persist.
  const old=!!state.widgets[k];
  state.widgets[k]=!old;
  const ok=await saveWidgets(true);
  if(!ok){state.widgets[k]=old;}
  render();
}

function exportExcel(scope){
  let rows;let fname='OM_Service_Requests.csv';
  if(scope==='open'){rows=state.requests.map(calc).filter(isOpen).sort((a,b)=>a.id-b.id);fname='OM_Open_Tasks.csv';}
  else{rows=state.requests.map(calc).sort((a,b)=>a.id-b.id);}
  const head=['#','Project','Category','Priority','Assigned To','Task Title','Manager Note','Received','Start','Duration','Status','Task ID','Due','Closed','Days Left','Progress %','Requested By','Mobile'];
  const data=rows.map((r,i)=>[i+1,r.project,r.category,r.priority,r.assignedTo,r.title,r.notes,r.received,r.start,r.duration,r.effStatus,fmtID(r.id),r.due,r.closed,r.daysleft,Math.round((r.progress||0)*100)+'%',r.requestedBy,r.phone||'']);
  let csv=[head].concat(data).map(row=>row.map(c=>{c=c==null?'':String(c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
  toast(rows.length+' '+t('exported'));
}


/* ===== TRACK PAGE (/track) — public, list of all active requests + search by task no ===== */
/* Requester tracking is derived from STATUS + confirmed_at only — never from the `archived` flag. A request is visible while it is still live, and for 8h after it is confirmed complete (see recentlyCompleted). Nothing is written to the row to make it disappear: the 8h window is computed at read time, so it cannot drift out of sync. */ function isActiveForTrack(r){return r.effStatus!=='Complete' && r.effStatus!=='Cancelled' && r.status!=='Cancelled' && r.status!=='Rejected';}
function recentlyCompleted(r){if(r.effStatus!=='Complete'||!r.confirmedAt)return false;const diff=Date.now()-new Date(r.confirmedAt).getTime();return diff>=0 && diff<=8*60*60*1000;}
function trkCard(r){
  const st=trackStatus(r);
  // Technician name/phone ride ON THE ROW (from the track RPC): staffDisp()/staffPhone()
  // read state.staff, which a visitor no longer loads — they would render blank.
  // Fall back to the old helpers for admin-side rows that still come from fromRow().
  const nm=(L==='ar'&&r.staffAr)?r.staffAr:(r.staffEn||(r.assignedTo?staffDisp(r.assignedTo):''));
  const ph=r.staffPhone||(r.assignedTo?staffPhone(r.assignedTo):'');
  const closed=(r.status==='Rejected'||r.status==='Cancelled');
  const who=(!closed&&r.accepted&&nm)?`<div class="trk-who">🧑‍🔧 ${esc(nm)}${ph?`<br><span dir="ltr" class="trk-phone">📱 ${esc(ph)}</span>`:''}</div>`:'';
  const rejBlock=(closed&&r.rejectReason)?`<div class="trk-reason"><span class="trk-reason-lab">${t(r.status==='Cancelled'?'cancelReasonLbl':'stfRejectReason')}</span>${esc(r.rejectReason)}</div>`:'';
  // A closed request was never the technician's work, so we point the requester
  // at the manager instead of at a name they cannot act on.
  const mgrBlock=closed?`<div class="trk-who">${esc(t('trkContactMgr'))}<br><span dir="ltr" class="trk-phone">📱 ${esc(MANAGER_PHONE)}</span></div>`:'';
  return `<div class="trk-card">
    <div class="trk-top"><span class="trk-id">${fmtID(r.id)}</span><span class="trk-badge" style="background:${st.bg};color:${st.fg}">${st.label}</span></div>
    ${who}
    ${rejBlock}
    ${mgrBlock}
  </div>`;
}

function trackStatus(r){
  if(r.effStatus==='Complete'||r.status==='Complete')return {label:t('stComplete'),bg:'#D8EADF',fg:'#2E6E4E'};
  if(r.status==='Rejected')return {label:t('stRejected'),bg:'#F3E8E8',fg:'#8B3A3A'};
  if(r.effStatus==='Cancelled'||r.status==='Cancelled')return {label:t('stCancelled'),bg:'#F0E1E0',fg:'#9A5450'};
  if(!r.accepted)return {label:t('trkWaiting'),bg:'#FBEFD6',fg:'#9A6B1E'};
  if(r.effStatus==='Overdue')return {label:t('stOverdue'),bg:'#F6DAD7',fg:'#A33B33'};
  if(r.effStatus==='On Hold')return {label:t('stOnHold'),bg:'#E6E9ED',fg:'#5A6B7B'};
  if(r.effStatus==='Needs Review')return {label:t('stNeedsReview'),bg:'#E3E9F5',fg:'#3A5A9E'};
  if(r.effStatus==='Needs Update')return {label:t('stNeedsUpdate'),bg:'#E3E9F5',fg:'#3A5A9E'};
  return {label:t('trkInProg'),bg:'#E3EDF6',fg:'#2E5E8E'};
}
let _trkSoft=null;function softTrack(){
  clearTimeout(_trkSoft);
  // Debounced: the lookup now goes to the server, so it must not fire per keystroke.
  // The cursor dance survives the re-render trackLookup triggers.
  _trkSoft=setTimeout(()=>{
    const v=document.getElementById('trkSearch');const pos=v?v.selectionStart:null;
    trackLookup().then(()=>{
      const n=document.getElementById('trkSearch');
      if(n){n.focus();if(pos!=null)try{n.setSelectionRange(pos,pos);}catch(e){}}
    });
  },250);
}

let staffCodeInput='';let staffLoginErr=false;
let _stfCodeT=null;function softStaffCode(){staffLoginErr=false;clearTimeout(_stfCodeT);_stfCodeT=setTimeout(()=>{const v=document.getElementById('stfCode');const pos=v?v.selectionStart:null;render();const n=document.getElementById('stfCode');if(n){n.focus();if(pos!=null)try{n.setSelectionRange(pos,pos);}catch(e){}}},200);}
async function doStaffLogin(){
  const code=(staffCodeInput||'').trim();
  // Verify the code on the server: the staff table (and its codes) is no longer
  // readable from the browser, so a local match is not just legacy — it is impossible.
  
  let r=null;
  try{r=await rpcStaffLogin(code);}
  catch(e){staffLoginErr='network';render();return;}   // network/server failure
  if(!r||r.ok!==true||!r.token){
    staffLoginErr=(r&&r.error==='too_many_attempts')?'throttled':((r&&r.error==='staff_inactive')?'inactive':'bad');
    render();return;
  }
  stfSetSession({token:r.token,expires_at:r.expires_at,en:(r.staff&&r.staff.en)||'',ar:(r.staff&&r.staff.ar)||'',id:(r.staff&&r.staff.id)||null});
  staffName=(r.staff&&r.staff.en)||'';
  staffLoginErr=false;staffModal=null;
  render();
  // A2: load this staff member's tasks from the server
  await loadStaffTasks();
}
// A2: fetch the logged-in staff member's tasks via RPC and merge into state.requests
// so the existing start/close UI (which reads state.requests) keeps working unchanged.
function doStaffLogout(){staffName='';staffCodeInput='';staffModal=null;stfClearSession();{state.requests=[];}render();}
async function loadStaffTasks(){
  const sess=stfGetSession();
  if(!sess){staffName='';render();return;}
  try{
    const r=await rpcStaffTasks(sess.token);
    if(r&&r.ok===true&&Array.isArray(r.tasks)){
      state.requests=r.tasks.map(fromRow);   // only this staff's tasks are returned
      render();
    }else if(r&&r.ok===false){
      // session invalid/expired → log out cleanly and clear the previous staff's tasks
      stfClearSession();staffName='';state.requests=[];render();
    }
  }catch(e){ if(typeof toast==='function'){toast(L==='ar'?'تعذّر تحديث المهام':'Could not refresh tasks');} }
}
function openStaffTask(id){
  staffModal=id;closeoutPhotos=[];closeoutFiles=[];coUploading=0;render();
  // No Start button: if this task is due to run (accepted, Not Started, its time arrived,
  // not locked), start it automatically so the technician can close it out directly.
  const r=state.requests.find(x=>x.id===id);
  if(r && r.status==='Not Started' && r.accepted && !LOCKED_STATUSES.includes(r.status)){
    const future=r.schedStart && new Date(r.schedStart).getTime()>Date.now();
    if(!future){ startTask(id); }   // starts via staff_start_task RPC → In Progress
  }
}
function pickStaff(i){const names=staffNames();if(names[i]!=null){staffName=names[i];staffModal=null;render();}}
function staffDetail(id){
  const r=state.requests.map(calc).find(x=>x.id===id);
  if(!r)return (staffModal=null,viewStaff());
  let imgs=[];try{imgs=JSON.parse(r.images||'[]');}catch(e){}
  let pdfs=[];try{pdfs=JSON.parse(r.files||'[]');}catch(e){}
  const gal=imgs.length?`<div class="stf-imgs">${imgs.map((u,i)=>`<img src="${esc(u)}" onclick="openLightboxArr(${id},${i})"/>`).join('')}</div>`:'';
  const pdfList=pdfs.length?`<div class="stf-files">${pdfs.map(f=>{const u=typeof f==='string'?f:f.url;const nm=typeof f==='string'?'PDF':(f.name||'PDF');return `<a class="stf-file" href="${esc(u)}" target="_blank" rel="noopener">📄 ${esc(nm)}</a>`;}).join('')}</div>`:'';
  const pend=r.pendingConfirm;
  const isFuture=r.isFuture;
  const isReady=r.isReady;
  const locked=LOCKED_STATUSES.includes(r.status);
  // No Start button any more: a task runs automatically by time.
  //  • immediate task → accepted as In Progress by the manager's RPC
  //  • scheduled task → auto-runs once its scheduled moment arrives (isReady)
  // "effectively running" = closeable now.
  const inProgress=(r.status==='In Progress');
  const effectivelyRunning=(inProgress || (r.status==='Not Started' && r.accepted && !isFuture));
  const lockBlock=locked?`<div class="stf-locked-block">
      <div class="stf-locked-status">🔒 ${esc(stfStatusLabel(r.status))}</div>
      <div class="stf-locked-hint">${t('stfLockedHint')}</div>
      ${r.managerNote?`<div class="stf-mgr-note"><span>${t('stfMgrNote')}</span><p>${esc(r.managerNote)}</p></div>`:''}
      ${r.rejectReason?`<div class="stf-reject-note"><span>${t('stfRejectReason')}</span><p>${esc(r.rejectReason)}</p></div>`:''}
    </div>`:'';
  return `<div class="panel emp-card staff-panel">
    <div class="stf-head"><button class="stf-back" onclick="staffModal=null;render()">‹ ${t('stfBackList')}</button><div class="stf-who">${esc(staffSelfDisp())}</div></div>
    <div class="stf-detail">
      <div class="stf-d-id">${fmtID(r.id)}</div>
      <div class="stf-d-title">${esc(r.title)}</div>
      <div class="stf-d-grid">
        <div><span>${t('mProj')}</span><b>${esc(r.project)}</b></div>
        <div><span>${t('svcType')}</span><b>${esc(dispCat(r.category))}</b></div>
        <div><span>${t('priority')}</span><b>${esc(dispPri(r.priority))}</b></div>
        <div><span>${t('mDue')}</span><b>${esc(r.due||'—')}</b></div>
      ${r.schedStart?`<div><span>${t('taskStartLbl')}</span><b>${fmtTime(r.schedStart)}</b></div>`:''}
        ${r.requestedBy&&r.requestedBy!=='—'?`<div><span>${t('reqByLbl')}</span><b>${esc(r.requestedBy)}</b></div>`:''}
        ${r.phone?`<div><span>${t('reqPhoneLbl')}</span><b><a href="tel:${esc(r.phone)}" style="color:var(--accent);text-decoration:none">${esc(r.phone)}</a></b></div>`:''}
      </div>
      ${isFuture?`<div class="stf-future">🗓️ ${t('futureTaskMsg')} <b>${fmtTime(r.schedStart)}</b></div>`:''}
      ${r.notes?`<div class="stf-note"><span>${t('noteLabel')}</span><p>${esc(r.notes)}</p></div>`:''}
      ${gal}
      ${pdfList}
      ${locked?lockBlock
            :pend?`<div class="stf-pend-msg">⏳ ${t('stfPendMsg')}</div>`
            :isFuture?`<div class="stf-future-block">🔒 ${t('futureLockMsg')}</div>`
            :effectivelyRunning?`<div class="stf-closeout">
                <div class="co-block">
                  <label class="img-btn co-btn">📷 ${t('closeoutPhoto')}<input type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif,.jpg,.jpeg,.png,.webp,.heic,.heif" multiple capture="environment" style="display:none" onchange="handleCloseout(this)"/></label>
                  <div class="img-previews" id="co-previews">${closeoutPhotos.map((u,i)=>`<div class="img-prev"><img src="${esc(u)}"/><button type="button" onclick="removeCloseout('${esc(u)}','')">×</button></div>`).join('')}</div>
                </div>
                <div class="co-block">
                  <label class="img-btn co-btn file-btn">📎 ${t('closeoutFiles')}<input type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation" multiple style="display:none" onchange="handleCloseoutFiles(this)"/></label>
                  <div class="co-filelist" id="co-filelist">${closeoutFiles.map((f,i)=>`<div class="co-fileitem"><span>📄 ${esc(f.name||'file')}</span><button type="button" onclick="removeCloseoutFile(${i})">×</button></div>`).join('')}</div>
                </div>
                <span class="hint">${t('closeoutOptional')}</span>
                <button class="btn btn-lg stf-done" onclick="staffMarkDone(${r.id})">✅ ${t('stfDone')}</button>
             </div>`:''}
    </div>
  </div>`;
}
function openLightboxArr(id,i){const r=state.requests.find(x=>x.id===id);if(!r)return;let a=[];try{a=JSON.parse(r.images||'[]');}catch(e){}if(!a.length)return;modal={type:'img',imgs:a,idx:i};

  host.innerHTML=`<div class="modal-bg gal-bg" onclick="closeStaffGal()"><button class="gal-close" onclick="closeStaffGal()">✕</button>${multi?`<div class="gal-count">${idx+1} / ${imgs.length}</div>`:''}<div class="gal-stage" onclick="event.stopPropagation()">${nav}<img class="gal-img" id="staffGalImg" src="${esc(imgs[idx])}"/></div></div>`;
}
function galStaffNav(d){if(!modal||modal.type!=='img')return;const n=modal.imgs.length;modal.idx=(modal.idx+d+n)%n;const img=document.getElementById('staffGalImg');if(img)img.src=modal.imgs[modal.idx];const c=document.querySelector('#staff-modal-host .gal-count');if(c)c.textContent=(modal.idx+1)+' / '+n;}
function closeStaffGal(){const h=document.getElementById('staff-modal-host');if(h)h.innerHTML='';modal=null;}
function staffMarkDone(id){
  if(coUploading>0){toast(t('uploading'));return;}
  staffModal2={id};
  let host=document.getElementById('staff-modal-host');if(!host){host=document.createElement('div');host.id='staff-modal-host';document.body.appendChild(host);}
  const nPhoto=closeoutPhotos.length, nFile=closeoutFiles.length;
  const attachLine=(nPhoto||nFile)?`<p class="co-summary">${nPhoto?('📷 '+nPhoto):''}${nPhoto&&nFile?' · ':''}${nFile?('📎 '+nFile):''}</p>`:'';
  host.innerHTML=`<div class="modal-bg" onclick="closeStaffConfirm()"><div class="modal" style="max-width:420px" onclick="event.stopPropagation()"><h3>${t('stfConfirmTitle')}</h3><p>${t('stfConfirmMsg')}<br><b>${fmtID(id)}</b></p>${attachLine}
    <div class="field" style="margin-top:10px"><label>${t('coComment')}</label><textarea id="co_comment" rows="2" placeholder="${t('coCommentPh')}" style="width:100%">${esc(closeoutComment||'')}</textarea></div>
    <div class="btnrow" style="justify-content:flex-end"><button class="btn sec" onclick="closeStaffConfirm()">${t('cancel')}</button><button class="btn green" id="coDoneBtn" onclick="doStaffDone(${id})">${t('stfDoneYes')}</button></div></div></div>`;
}
let staffModal2=null;let closeoutPhotos=[];let coUploading=0;let closeoutFiles=[];let closeoutComment='';
async function handleCloseoutFiles(input){
  const files=Array.from(input.files||[]);if(!files.length)return;
  const wrap=document.getElementById('co-filelist');const btn=document.getElementById('coDoneBtn');
  for(const f of files){
    // was a separate extension list that missed ppt/pptx and never checked size
    if(!uploadAllowed(f)){toast(t('fileRejected'));continue;}
    const tmpId='cf'+Math.random().toString(36).slice(2,8);
    if(wrap){const d=document.createElement('div');d.className='co-fileitem';d.id=tmpId;d.innerHTML='<span class="upl">'+t('uploading')+'</span>';wrap.appendChild(d);}
    coUploading++;
    try{const url=await sbUploadFile(f);closeoutFiles.push({url,name:f.name});const el=document.getElementById(tmpId);if(el)el.innerHTML='<span>📄 '+esc(f.name)+'</span><button type="button" onclick="removeCloseoutFileByUrl(\''+url+'\',\''+tmpId+'\')">×</button>';}
    catch(e){console.error('upload failed:',e&&e.message?e.message:e);const el=document.getElementById(tmpId);if(el)el.remove();toast(t('connErr'));}
    finally{coUploading--;}
  }
  input.value='';
}
function removeCloseoutFile(i){closeoutFiles.splice(i,1);render();}
function removeCloseoutFileByUrl(url,tmpId){closeoutFiles=closeoutFiles.filter(f=>f.url!==url);const el=document.getElementById(tmpId);if(el)el.remove();}
async function handleCloseout(input){
  const files=Array.from(input.files||[]);if(!files.length)return;
  const wrap=document.getElementById('co-previews');const btn=document.getElementById('coDoneBtn');
  for(const f of files){
    // Same rule as the requester's uploads: image/* would accept an SVG (which runs
    // script) and had no size check at all — the server would reject it with an
    // opaque connection error instead of a clear message.
    if(!uploadAllowed(f)){toast(t('fileRejected'));continue;}
    const tmpId='co'+Math.random().toString(36).slice(2,8);
    if(wrap){const d=document.createElement('div');d.className='img-prev';d.id=tmpId;d.innerHTML='<span class="upl">'+t('uploading')+'</span>';wrap.appendChild(d);}
    coUploading++;if(btn){btn.disabled=true;btn.style.opacity=.6;}
    try{const url=await sbUploadImage(f);closeoutPhotos.push(url);const el=document.getElementById(tmpId);if(el)el.innerHTML='<img src="'+url+'"/><button type="button" onclick="removeCloseout(\''+url+'\',\''+tmpId+'\')">×</button>';}
    catch(e){console.error('upload failed:',e&&e.message?e.message:e);const el=document.getElementById(tmpId);if(el)el.remove();toast(t('connErr'));}
    finally{coUploading--;if(coUploading<=0&&btn){btn.disabled=false;btn.style.opacity=1;}}
  }
  input.value='';
}
function removeCloseout(url,tmpId){closeoutPhotos=closeoutPhotos.filter(u=>u!==url);const el=document.getElementById(tmpId);if(el)el.remove();}
function closeStaffConfirm(){staffModal2=null;const h=document.getElementById('staff-modal-host');if(h)h.innerHTML='';}
// A3/A4: guard against double-clicks (server is atomic, but avoid confusing double toasts)
let staffActionBusy=false;
// full cleanup when the staff session is gone (expired locally or rejected by server)
function stfSessionGone(){
  stfClearSession();staffName='';state.requests=[];
  if(typeof closeStaffConfirm==='function')closeStaffConfirm();
  staffModal=null;staffModal2=null;
  closeoutPhotos=[];closeoutFiles=[];closeoutComment='';
  render();
}
async function startTask(id){
  // Start via server RPC (validates ownership, schedule, state)
  const sess=stfGetSession();
  if(!sess){stfSessionGone();return;}
  if(staffActionBusy)return;
  staffActionBusy=true;
  try{
    let res=null;
    try{res=await sbRpc('staff_start_task',{p_token:sess.token,p_task_id:id});}
    catch(e){toast(t('connErr'));return;}
    if(res&&res.ok===true){
      toast(fmtID(id)+' — '+t('taskStarted'));
      await loadStaffTasks();   // refresh from server so status reflects reality
    }else{
      toast(stfRpcError(res));  // show a clear reason
      if(res&&res.error==='invalid_session'){stfSessionGone();}
      else{await loadStaffTasks();}  // race: state changed under us → resync the card
    }
  }finally{staffActionBusy=false;}
}
// map RPC error codes to friendly messages
function stfRpcError(res){
  const e=(res&&res.error)||'';
  const ar=(L==='ar');
  const M={
    not_your_task: ar?'هذه ليست مهمتك':'Not your task',
    task_closed: ar?'المهمة مغلقة':'Task is closed', task_complete: ar?'المهمة مكتملة — استخدم إعادة الفتح':'Task is complete — use Reopen', assignee_missing: ar?'لا يوجد فني مُسنَد للمهمة':'No technician assigned', invalid_action: ar?'إجراء غير صالح':'Invalid action', task_already_cancelled: ar?'المهمة ملغاة مسبقاً':'Task already cancelled', internal_no_status: ar?'خطأ داخلي — أعد المحاولة':'Internal error — please retry', task_not_started: ar?'المهمة لم تبدأ بعد':'Task has not started yet',
    already_started: ar?'المهمة بدأت أصلاً':'Task already started',
    not_startable: ar?'لا يمكن بدء هذه المهمة':'Task not startable',
    not_started_yet: ar?'لم يحن موعد البدء بعد':'Not started yet (scheduled)',
    not_in_progress: ar?'المهمة غير قيد التنفيذ':'Task is not in progress',
    pending_confirmation: ar?'المهمة بانتظار تأكيد المدير':'Pending manager confirmation',
    invalid_images: ar?'صيغة الصور غير صحيحة':'Invalid images format',
    too_many_images: ar?'الحد الأقصى 10 صور':'Maximum 10 images',
    images_payload_too_large: ar?'بيانات الصور كبيرة جداً':'Images payload too large',
    invalid_files: ar?'صيغة الملفات غير صحيحة':'Invalid files format',
    too_many_files: ar?'الحد الأقصى 10 ملفات':'Maximum 10 files',
    files_payload_too_large: ar?'بيانات الملفات كبيرة جداً':'Files payload too large',
    note_too_long: ar?'التعليق أطول من الحد المسموح':'Comment is too long',
    conflict: ar?'تعذّر التنفيذ — حاول مجدداً':'Conflict — please retry',
    invalid_session: ar?'انتهت الجلسة — سجّل الدخول من جديد':'Session expired — log in again',
    task_not_found: ar?'المهمة غير موجودة':'Task not found'
  };
  return M[e]||(ar?'تعذّر التنفيذ':'Action failed');
}
async function doStaffDone(id){
  if(coUploading>0){toast(t('uploading'));return;}
  // Submit for confirmation via server RPC
  const sess=stfGetSession();
  if(!sess){stfSessionGone();return;}
  if(staffActionBusy)return;
  staffActionBusy=true;
  try{
    const cbox=document.getElementById('co_comment');const cmt=cbox?cbox.value.trim():'';
    const args={p_token:sess.token,p_task_id:id,p_note:cmt||null,
      p_images:closeoutPhotos.length?closeoutPhotos:null,
      p_files:closeoutFiles.length?closeoutFiles:null};
    let res=null;
    try{res=await sbRpc('staff_submit_task',args);}
    catch(e){toast(t('connErr'));return;}
    if(res&&res.ok===true){
      closeStaffConfirm();staffModal=null;closeoutPhotos=[];closeoutFiles=[];closeoutComment='';
      toast(t('stfDoneToast'));
      await loadStaffTasks();
    }else{
      toast(stfRpcError(res));
      if(res&&res.error==='invalid_session'){stfSessionGone();}
      else{
        // race: the task's state changed under us (e.g. manager set On Hold / rejected / closed).
        // Close the closeout modal and resync from the server so the card reflects reality.
        closeStaffConfirm();staffModal=null;closeoutPhotos=[];closeoutFiles=[];closeoutComment='';
        await loadStaffTasks();
      }
    }
  }finally{staffActionBusy=false;}
}

/* ===== boot ===== */
(async function(){
  // A0: decide the page/role FIRST, then load only what that role needs.
  // This stops requests/staff/recurring from being fetched before we know the user.
  const p=(location.pathname||'').toLowerCase();
  if(p.indexOf('/admin')>=0){
    if(!L)L='en';
    const authed=await checkAdminFlag();
    if(authed){ await load('admin'); enterAdminDirect(); }
    else { openAdmin(); }          // no data load until PIN passes (see tryAdmin)
  }
  else if(p.indexOf('/staff')>=0){
    await load('staff');
    enterPublic('staff');
  }
  else {
    await load('visitor');
    renderGate();
  }
})();

</script></body></html>
