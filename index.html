<!DOCTYPE html>
<html lang="en" translate="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"><meta name="google" content="notranslate"><title>ADVACON — Service Requests</title><style>
:root{
  --navy:#15406E;--navy2:#1B4D7E;--med:#2A5C8A;--accent:#3E6E9E;--steel:#5B7A99;
  --lblue:#DCE6F0;--pale:#EEF2F7;--lgray:#F4F6F9;--head:#EAEEF3;--grid:#D3DAE3;
  --txt:#23303D;--grey:#6E7A87;--white:#fff;
  --green:#3C7D5A;--amber:#C08A3E;--red:#B0504A;--purple:#6E5C8A;
  --shadow:0 1px 3px rgba(21,64,110,.08),0 4px 16px rgba(21,64,110,.06);
  --sidew:230px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--lgray);color:var(--txt);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
html,body{overflow-x:hidden}
.app{width:100%}
.app:has(.emp-stage){display:block!important}
/* gate */
.gate{position:fixed;inset:0;background:linear-gradient(135deg,#15406E,#0E2C4D);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.gate-card{background:#fff;border-radius:18px;padding:40px 34px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.35);max-width:460px;width:100%}
.gate-card img{height:58px;margin-bottom:8px}
.gate-card .co{font-size:11px;letter-spacing:.08em;color:var(--grey);font-weight:700}
.gate-card .intro{margin:16px 0 22px}
.gate-card .intro-ar{direction:rtl;font-size:15px;font-weight:700;color:var(--navy);line-height:1.6;margin-bottom:6px}
.gate-card .intro-ar-sub{direction:rtl;font-size:12.5px;color:var(--steel);line-height:1.6;margin-bottom:14px}
.gate-card .intro-en{font-size:13px;font-weight:600;color:var(--med);line-height:1.5;margin-bottom:5px}
.gate-card .intro-en-sub{font-size:11.5px;color:var(--grey);line-height:1.5}
.gate-card .intro::after{content:"";display:block;height:1px;background:var(--grid);margin:16px auto 0;width:70%}
.gate-card h2{font-size:18px;color:var(--navy);margin-bottom:4px}
.gate-card .sub{font-size:13px;color:var(--steel);margin-bottom:18px;direction:rtl}
.lang-btns{display:flex;gap:12px}
.lang-btns button{flex:1;padding:18px;border:2px solid var(--grid);background:var(--white);border-radius:13px;cursor:pointer;font-family:inherit;transition:.18s;display:flex;flex-direction:column;gap:3px;align-items:center}
.lang-btns button:hover{border-color:var(--accent);background:var(--pale)}
.lang-btns .big{font-size:19px;font-weight:700;color:var(--navy)}
.lang-btns .small{font-size:11px;color:var(--grey)}
.gate-card input{font-family:inherit;font-size:16px;padding:12px;border:1.5px solid var(--grid);border-radius:8px;width:100%}
/* ===== LAYOUT: sidebar + content ===== */
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidew);background:var(--white);border-inline-end:1px solid var(--grid);box-shadow:var(--shadow);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;z-index:40}
.side-brand{padding:18px 16px;border-bottom:1px solid var(--grid);text-align:left;direction:ltr}
.side-brand img{height:38px;margin-bottom:6px}
.side-brand .co{font-size:8px;letter-spacing:.05em;color:var(--grey);font-weight:700;line-height:1.3;display:block}
.side-brand .sys{font-size:12.5px;font-weight:700;color:var(--navy);margin-top:3px;display:block}
.side-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.side-nav button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;padding:11px 13px;font-size:13.5px;font-weight:600;color:var(--grey);cursor:pointer;border-radius:9px;font-family:inherit;transition:.15s;text-align:start}
.side-nav button:hover{background:var(--lgray);color:var(--navy)}
.side-nav button.active{background:var(--navy);color:var(--white)}
.side-nav button .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.side-nav button .badge{margin-inline-start:auto;background:var(--amber);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:18px;text-align:center}
.side-nav button.active .badge{background:#fff;color:var(--navy)}
.side-sep{height:1px;background:var(--grid);margin:8px 10px}
.side-nav .ext-ic{margin-inline-start:auto;font-size:12px;color:var(--grey);opacity:.7}
.side-foot{padding:10px;border-top:1px solid var(--grid);display:flex;gap:6px}
.side-foot button{flex:1;background:var(--white);border:1.5px solid var(--grid);color:var(--med);font-weight:700;padding:8px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12.5px}
.side-foot button:hover{background:var(--pale)}
.content{flex:1;min-width:0;display:flex;flex-direction:column}
.wrap{max-width:1600px;margin:0 auto;padding:24px 30px;width:100%;flex:1}
/* employee top (no sidebar) */
.empbar{background:var(--white);border-bottom:3px solid var(--navy);box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.empbar-inner{max-width:760px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px}
.empbar img{height:34px;width:auto;max-width:160px;object-fit:contain;display:block}
.empbar .sys{font-size:15px;font-weight:700;color:var(--navy)}
.empbar .lt{margin-inline-start:auto;border:1.5px solid var(--grid);color:var(--med);font-weight:700;border-radius:7px;padding:7px 12px;background:none;cursor:pointer;font-family:inherit;font-size:12.5px}
/* heads */
.phead{margin-bottom:18px}
.phead .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:700}
.phead h1{font-size:24px;color:var(--navy);font-weight:700;margin-top:2px}
.phead p{color:var(--grey);margin-top:4px;font-size:13px}
.panel{background:var(--white);border:1px solid var(--grid);border-radius:12px;box-shadow:var(--shadow)}
.panel-pad{padding:22px}
/* form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:12.5px;font-weight:600;color:var(--med)}
label .req{color:var(--red)}
input,select,textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--grid);border-radius:8px;background:var(--white);color:var(--txt);transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,110,158,.13)}
textarea{resize:vertical;min-height:80px}
.hint{font-size:11.5px;color:var(--grey)}
.btn{background:var(--navy);color:var(--white);border:none;padding:11px 22px;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn:hover{background:var(--navy2)}
.btn.sm{padding:7px 13px;font-size:12.5px}
.btn.sec{background:var(--white);color:var(--navy);border:1.5px solid var(--grid)}
.btn.sec:hover{background:var(--lgray)}
.btn.danger{background:var(--white);color:var(--red);border:1.5px solid #E8C9C7}
.btn.danger:hover{background:#FBF0EF}
.btn.green{background:var(--green)}
.btn.green:hover{background:#346B4E}
.btnrow{display:flex;gap:10px;margin-top:8px;align-items:center;flex-wrap:wrap}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--green);color:#fff;padding:12px 22px;border-radius:10px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:200;transition:.35s;font-size:13.5px;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
/* kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--white);border:1px solid var(--grid);border-radius:11px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lab{font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--grey);font-weight:700}
.kpi .val{font-size:27px;font-weight:700;color:var(--navy);margin-top:4px}
.kpi .bar{position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--med)}
.qcount{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.qchip{background:var(--white);border:1px solid var(--grid);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow)}
.qchip .dot{width:9px;height:9px;border-radius:50%}
/* ===== TASK CARDS ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.tcard{background:var(--white);border:1px solid var(--grid);border-radius:13px;box-shadow:var(--shadow);overflow:hidden;border-inline-start:4px solid var(--med)}
.tcard.ov{border-inline-start-color:var(--red)}
.tcard.warn{border-inline-start-color:var(--amber)}
.tcard-head{display:flex;align-items:center;gap:8px;padding:12px 15px;background:var(--head);border-bottom:1px solid var(--grid);flex-wrap:wrap}
.tcard-head .id{font-weight:700;color:var(--med);font-size:13px}
.tcard-head .st{margin-inline-start:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.tcard-head .prio{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;border:1px solid}
.prio.High{color:var(--red);border-color:#E8C9C7}.prio.Medium,.prio.Med{color:var(--amber);border-color:#E8D6BC}.prio.Low{color:var(--steel);border-color:var(--grid)}
.tcard-body{padding:14px 15px}
.tcard .req-q{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:4px;line-height:1.45}
.tcard .meta{display:flex;flex-wrap:wrap;gap:5px 16px;margin:10px 0;font-size:12.5px}
.tcard .meta div{display:flex;flex-direction:column}
.tcard .meta .ml{font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--grey);font-weight:700}
.tcard .meta .mv{color:var(--txt);font-weight:600}
.tcard .field-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.tcard .field-row .fr{flex:1;min-width:120px;display:flex;flex-direction:column;gap:3px}
.tcard .field-row label{font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--grey)}
.tcard .mini{padding:7px 9px;font-size:13px;border:1px solid var(--grid);border-radius:7px;font-family:inherit;width:100%}
.tcard .notes-in{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--grid);border-radius:7px;font-family:inherit;margin-top:8px;background:#FBF8F2}
.dl{font-weight:700;font-size:12.5px}
.tcard-foot{display:flex;gap:8px;padding:11px 15px;border-top:1px solid var(--grid);background:var(--lgray);flex-wrap:wrap}
.tcard-foot .btn{flex:1;justify-content:center;min-width:90px}
.progress-wrap{background:var(--grid);border-radius:10px;height:16px;overflow:hidden;position:relative;margin-top:10px}
.progress-bar{height:100%;border-radius:10px;background:var(--accent)}
.progress-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--txt)}
.empty{padding:44px 20px;text-align:center;color:var(--grey)}
.filterbar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filterbar select,.filterbar input{padding:8px 10px;font-size:13px;width:auto;min-width:130px}
.filterbar .spacer{flex:1}
.count-chip{background:var(--lblue);color:var(--navy);padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:700;white-space:nowrap}
.section-head{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--navy);margin:4px 0 12px;flex-wrap:wrap}
.sec-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.sec-dot.inbox{background:var(--amber)}.sec-dot.periodic{background:#7C5CBF}
.stf-future{margin:12px 0;padding:10px 14px;background:#EEF2FF;border:1px solid #C7D2FE;border-radius:10px;color:#3730A3;font-size:14px}
.stf-future-block{margin:14px 0 4px;padding:14px;background:#F8FAFC;border:1px dashed #CBD5E1;border-radius:10px;color:#64748B;text-align:center;font-size:14px}
.stf-ready{margin:14px 0 4px;text-align:center}
.stf-ready-msg{padding:10px;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:10px;color:#065F46;font-size:14px;margin-bottom:12px}
.stf-start{background:var(--accent);color:#fff}
.co-note-box{margin-top:8px;padding:8px 12px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;color:#166534;font-size:13px}
.sched-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.sched-badge.future{background:#EEF2FF;color:#3730A3}
.sched-badge.ready{background:#ECFDF5;color:#065F46}
.sec-dot.work{background:var(--green)}.sec-dot.pend{background:#C08A3E}
/* incoming cards (simpler) */
.in-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:13px;margin-bottom:26px}
.in-card{background:var(--white);border:1px solid var(--grid);border-inline-start:4px solid var(--amber);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.in-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.in-card .q{font-size:14px;font-weight:600;margin-bottom:10px;line-height:1.4}
.in-card .meta{font-size:12.5px;color:var(--steel);margin-bottom:4px}
.in-card .meta b{color:var(--txt)}
.in-card .acts{display:flex;gap:8px;margin-top:12px}
.in-card .acts .btn{flex:1;justify-content:center}
/* pagination */
.pager{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:18px;flex-wrap:wrap}
.pager button{min-width:36px;height:36px;border:1px solid var(--grid);background:var(--white);border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--med);padding:0 10px}
.pager button:hover:not(:disabled){background:var(--pale)}
.pager button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.pager button:disabled{opacity:.4;cursor:default}
.pager .pinfo{font-size:12.5px;color:var(--grey);margin:0 8px}
/* charts */
.charts{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;margin-top:18px}
.chart-card{background:var(--white);border:1px solid var(--grid);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.chart-card h3{font-size:14px;color:var(--navy);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bar-row .blab{font-size:12px;width:130px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--lgray);border-radius:6px;height:21px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-inline-start:7px;color:#fff;font-size:11px;font-weight:700;min-width:22px}
.alert-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--navy);padding:13px 16px;border-bottom:1px solid var(--grid)}
.alert-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--grid);font-size:13px}
.alert-row:last-child{border-bottom:none}
.alert-row .alert-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alert-row .alert-meta{color:var(--grey);font-size:12px;min-width:80px;text-align:end;white-space:nowrap}
.alert-row .alert-days{font-weight:700;font-size:12px;color:var(--amber);min-width:100px;text-align:end;white-space:nowrap}
.alert-row.ov .alert-days{color:var(--red)}
/* settings */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.list-card{background:var(--white);border:1px solid var(--grid);border-radius:11px;overflow:hidden}
.list-card h3{background:var(--head);color:var(--navy);padding:11px 15px;font-size:13px;border-bottom:1px solid var(--grid);display:flex;justify-content:space-between;align-items:center}
.list-card .items{padding:8px;max-height:260px;overflow-y:auto}
.list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px}
.list-item:hover{background:var(--lgray)}
.list-item span{flex:1;font-size:13px}
.list-item button{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.additem{display:flex;gap:8px;padding:10px;border-top:1px solid var(--grid)}
.additem input{flex:1}
.wtoggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 22px}
.wtoggle{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--grid);font-size:13.5px}
.switch{width:42px;height:24px;border-radius:14px;background:var(--grid);border:none;cursor:pointer;position:relative;transition:.2s;padding:0;flex-shrink:0}
.switch.on{background:var(--green)}
.switch .knob{position:absolute;top:3px;inset-inline-start:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on .knob{inset-inline-start:21px}
/* thanks */
.thanks-wrap{display:flex;align-items:center;justify-content:center;min-height:70vh;padding:18px}
.thanks-card{background:var(--white);border:1px solid var(--grid);border-radius:18px;box-shadow:var(--shadow);padding:40px 32px;text-align:center;max-width:460px;width:100%}
.thanks-check{width:68px;height:68px;border-radius:50%;background:var(--green);color:#fff;font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.thanks-card h1{font-size:24px;color:var(--navy);margin-bottom:8px}
.thanks-msg{color:var(--steel);font-size:14px;margin-bottom:16px}
.thanks-id{display:inline-block;background:var(--lblue);color:var(--navy);font-weight:700;padding:7px 18px;border-radius:24px;font-size:15px;letter-spacing:1px;margin-bottom:22px}
.thanks-contact{background:var(--lgray);border-radius:12px;padding:16px;margin-bottom:22px;text-align:center}
.thanks-contact p{font-size:12.5px;color:var(--grey);margin-bottom:8px}
.thanks-name{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px;text-align:center}
.thanks-phone{font-size:18px;font-weight:700;color:var(--med);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;direction:ltr}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,40,70,.5);display:flex;align-items:center;justify-content:center;z-index:160;padding:16px}
.modal{background:#fff;border-radius:14px;padding:26px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;color:var(--navy);margin-bottom:10px}
.modal p{font-size:13.5px;color:var(--steel);margin-bottom:18px;line-height:1.6}
/* mobile */
.menu-btn{display:none}
@media(max-width:860px){
  .form-grid,.settings-grid,.charts,.wtoggle-grid{grid-template-columns:1fr}
  .kpis{grid-template-columns:1fr 1fr}
  .cards,.in-cards{grid-template-columns:1fr}
  .sidebar{position:fixed;inset-inline-start:0;top:0;height:100vh;transform:translateX(-110%);transition:.25s}
  body[dir="rtl"] .sidebar{transform:translateX(110%)}
  .sidebar.open{transform:translateX(0)!important}
  .menu-btn{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border:none;background:var(--navy);color:#fff;border-radius:9px;font-size:20px;cursor:pointer;position:fixed;top:12px;inset-inline-start:12px;z-index:45;box-shadow:var(--shadow)}
  .content{padding-top:8px}
  .wrap{padding:64px 14px 20px}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:39}
}

/* images */
.img-upload{display:flex;flex-direction:column;gap:8px}
.img-btn{display:inline-flex;align-items:center;gap:8px;background:var(--pale);color:var(--navy);border:1.5px dashed var(--accent);border-radius:9px;padding:12px 16px;font-size:13.5px;font-weight:600;cursor:pointer;width:fit-content;transition:.15s}
.img-btn:hover{background:var(--lblue)}
.img-previews{display:flex;flex-wrap:wrap;gap:8px}
.img-prev{position:relative;width:72px;height:72px;border-radius:9px;overflow:hidden;border:1px solid var(--grid);background:var(--lgray);display:flex;align-items:center;justify-content:center}
.img-prev img{width:100%;height:100%;object-fit:cover}
.img-prev .upl{font-size:10px;color:var(--grey);text-align:center;padding:4px}
.img-prev button{position:absolute;top:2px;inset-inline-end:2px;width:20px;height:20px;border-radius:50%;background:rgba(176,80,74,.92);color:#fff;border:none;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}

.pt-panel{background:#fff;border:1px solid var(--grid);border-radius:14px;overflow:hidden;box-shadow:0 2px 14px rgba(21,64,110,.07);margin-bottom:28px;animation:ptIn .18s ease}
@keyframes ptIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.pt-panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 18px;background:var(--pale);border-bottom:1px solid var(--grid);border-inline-start:3px solid var(--med)}
.pt-panel-title{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--navy)}
.pt-panel-title b{font-weight:800;letter-spacing:-.01em}
.pt-panel-title .count-chip{background:#fff;color:var(--med);border:1px solid var(--grid)}
.pt-panel .tbl-wrap{padding:6px 10px 12px;overflow-x:auto}
.pt-panel .pt-tbl{border:none}
.pt-cat-empty{padding:30px 18px;text-align:center;color:var(--grey);font-style:italic;font-size:13.5px;background:#fff}
.btn-mini{flex-shrink:0}
/* master full table */
.pt-master{margin-top:4px;border:1px dashed var(--grid);border-radius:16px;overflow:hidden;background:#FbFcFd}
.pt-master-head{display:flex;align-items:center;gap:11px;padding:15px 20px;cursor:pointer;color:var(--steel);font-size:14px;font-weight:700;transition:background .15s}
.pt-master-head:hover{background:var(--lgray)}
.pt-master-head .count-chip{background:var(--grid);color:var(--steel)}
.pt-master .tbl-wrap{padding:0 10px 12px}

@media(max-width:1100px){.pt-tiles{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){.pt-tiles{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.pt-tiles{grid-template-columns:1fr}}
/* technician closeout: photo + file boxes inside opened task */
.stf-closeout{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.stf-lock-badge{display:inline-flex;align-items:center;gap:4px;background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.stf-locked-block{margin-top:10px;padding:14px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;display:flex;flex-direction:column;gap:8px}
.stf-locked-status{font-size:16px;font-weight:800;color:#92400E}
.stf-locked-hint{font-size:13px;color:#78716C;line-height:1.5}
.stf-mgr-note,.stf-reject-note{background:#fff;border-radius:8px;padding:8px 10px}
.stf-mgr-note span,.stf-reject-note span{display:block;font-size:11px;font-weight:700;color:#92400E;margin-bottom:2px}
.stf-mgr-note p,.stf-reject-note p{margin:0;font-size:14px;color:#1C1917;line-height:1.5}
.stf-reject-note span{color:#B91C1C}
.prev-st{font-size:11px;color:#9CA3AF;margin-top:2px;font-style:italic}
.co-block{display:flex;flex-direction:column;gap:9px}
.co-btn{display:inline-flex;align-items:center;gap:8px;justify-content:center;background:var(--lblue);color:var(--accent);border:1.5px dashed var(--accent);border-radius:11px;padding:12px 14px;font-weight:700;font-size:14px;cursor:pointer;transition:.15s}
.co-btn:hover{background:var(--accent);color:#fff}
.co-btn.file-btn{background:#F4F6F9;color:var(--steel);border-color:var(--steel)}
.co-btn.file-btn:hover{background:var(--steel);color:#fff}
.co-filelist{display:flex;flex-direction:column;gap:6px}
.co-fileitem{display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff;border:1px solid var(--grid);border-radius:8px;padding:8px 11px;font-size:12.5px;color:var(--txt);text-decoration:none}
.co-fileitem .upl{color:var(--grey);font-style:italic}
.co-fileitem button{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;line-height:1;padding:0 2px}
.co-files-grid{display:flex;flex-wrap:wrap;gap:7px}
.co-files-grid .co-fileitem{flex:0 0 auto}
.co-summary{font-size:12.5px;color:var(--steel);font-weight:600;margin:4px 0 0}

/* ===== Work Evidence — Phase 1 =====
   Lightroom principle: the PAGE stays in the app's light identity; only the
   gallery area goes dark, so photos gain contrast without the admin feeling
   they left the system. */
.we-hd{margin-bottom:14px}
.we-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.we-modes{display:flex;border:1px solid var(--grid);background:var(--white);overflow:hidden}
.we-mode{padding:7px 14px;border:0;border-inline-end:1px solid var(--grid);background:var(--white);
  color:var(--steel);font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px}
.we-mode:last-child{border-inline-end:0}
.we-mode.on{background:var(--navy);color:var(--white)}
.we-mode:disabled{opacity:.45;cursor:not-allowed}
.we-soon{font-size:9px;background:var(--lblue);color:var(--med);padding:1px 4px;font-weight:700}
.we-mode.on .we-soon{background:var(--accent);color:var(--white)}

.we-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:12px 0 14px}
.we-kpi{background:var(--white);border:1px solid var(--grid);box-shadow:var(--shadow);padding:12px 14px;
  border-inline-start:3px solid var(--navy)}
.we-kpi.claim{border-inline-start-color:var(--amber)}
.we-kpi.proof{border-inline-start-color:var(--green)}
.we-kpi.pair{border-inline-start-color:var(--accent)}
.we-kpi b{display:block;font-size:24px;color:var(--navy);font-weight:700;line-height:1.1;
  font-family:ui-monospace,'Cascadia Mono',Consolas,monospace;letter-spacing:-.02em}
.we-kpi span{font-size:11px;color:var(--grey);font-weight:600;display:block;margin-top:2px}

.we-ctl{background:var(--white);border:1px solid var(--grid);box-shadow:var(--shadow);
  padding:10px 12px;display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.we-srch{flex:1 1 220px;min-width:180px;padding:8px 11px;border:1px solid var(--grid);
  font-size:13px;font-family:inherit;color:var(--txt);background:var(--white)}
.we-srch:focus{outline:2px solid var(--accent);outline-offset:-1px}
.we-quick{display:flex;gap:5px}
.we-chip{padding:6px 11px;border:1px solid var(--grid);background:var(--white);color:var(--steel);
  font-size:12px;font-family:inherit;cursor:pointer;font-weight:600;white-space:nowrap}
.we-chip:hover{border-color:var(--accent);color:var(--med)}
.we-chip.on{background:var(--navy);border-color:var(--navy);color:var(--white)}
.we-chip:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.we-sel{padding:7px 9px;border:1px solid var(--grid);background:var(--white);color:var(--txt);
  font-size:12px;font-family:inherit;min-width:120px}
.we-sel:focus{outline:2px solid var(--accent);outline-offset:-1px}
.we-more{margin-inline-start:auto;display:flex;gap:7px}

.we-adv{background:var(--white);border:1px solid var(--grid);border-top:0;box-shadow:var(--shadow);
  padding:11px 12px;display:flex;gap:9px;flex-wrap:wrap;align-items:flex-end}
.we-f{display:flex;flex-direction:column;gap:3px}
.we-f label{font-size:10px;color:var(--grey);font-weight:700}
.we-f input,.we-f select{padding:6px 8px;border:1px solid var(--grid);background:var(--white);
  color:var(--txt);font-size:12px;font-family:inherit;min-width:110px}
.we-f input:focus,.we-f select:focus{outline:2px solid var(--accent);outline-offset:-1px}

.we-meta{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px;
  font-size:12px;color:var(--grey)}
.we-meta b{color:var(--navy);font-family:ui-monospace,Consolas,monospace}

/* the stage — the only dark surface on the page */
.we-stage{background:#1F2937;padding:18px;border:1px solid #16202B}
.we-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.we-tile{background:#2A3744;border:1px solid #16202B;cursor:pointer;display:flex;flex-direction:column;
  transition:border-color .12s,transform .12s}
.we-tile:hover{border-color:var(--accent);transform:translateY(-2px)}
.we-tile.sel{border-color:#5B9BD5;box-shadow:0 0 0 2px rgba(91,155,213,.45)}
.we-tile:focus-visible{outline:2px solid #5B9BD5;outline-offset:2px}

.we-imgs{display:flex;height:190px;background:#16202B;position:relative}
.we-half{flex:1;position:relative;overflow:hidden;min-width:0}
.we-half+.we-half{border-inline-start:2px solid #16202B}
.we-half img{width:100%;height:100%;object-fit:cover;display:block}
.we-tag{position:absolute;top:7px;inset-inline-start:7px;font-size:9px;font-weight:700;
  padding:3px 7px;letter-spacing:.04em;color:#fff;z-index:2}
.we-tag.claim{background:var(--amber)}
.we-tag.proof{background:var(--green)}
.we-more-n{position:absolute;bottom:7px;inset-inline-end:7px;background:rgba(0,0,0,.72);color:#fff;
  font-size:10px;font-weight:700;padding:2px 6px;z-index:2}

/* an image that fails (heic on Windows) must not leave a hole */
.we-fb{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;background:#1F2937;color:#6E8299;font-size:10px;text-align:center;padding:8px}
.we-fb i{font-size:22px;font-style:normal}

/* files-only tasks get a real tile, never an empty photo frame */
.we-docs{height:190px;background:#16202B;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:7px;padding:16px}
.we-docs i{font-size:34px;font-style:normal}
.we-docs .nm{font-size:12px;color:#C7D3DF;text-align:center;word-break:break-word;
  max-width:100%;font-weight:600}
.we-docs .ct{font-size:10px;color:#6E8299}

.we-ft{padding:9px 11px;background:#2A3744;border-top:1px solid #16202B}
.we-r1{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:5px}
.we-id{font-size:12px;font-weight:700;color:#8FB4D9;font-family:ui-monospace,Consolas,monospace}
.we-ti{font-size:12px;color:#E3EAF1;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px;min-height:33px}
.we-r2{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:10px;color:#7D8FA3}
.we-pj{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.we-ct{display:flex;gap:7px;white-space:nowrap}

.we-pg{display:flex;gap:8px;align-items:center;justify-content:center;padding:16px 0 4px}
.we-pg button{padding:6px 13px;border:1px solid var(--grid);background:var(--white);color:var(--med);
  font-size:12px;font-family:inherit;cursor:pointer;font-weight:600}
.we-pg button:hover:not(:disabled){border-color:var(--accent);background:var(--lgray)}
.we-pg button:disabled{opacity:.4;cursor:default}
.we-pgn{font-size:12px;color:var(--grey);font-family:ui-monospace,Consolas,monospace}

.we-empty{padding:56px 20px;text-align:center;color:#8FA3B8}
.we-empty h3{color:#C7D3DF;font-size:16px;margin:0 0 6px;font-weight:600}
.we-empty p{font-size:13px;margin:0;color:#6E8299}

@media(max-width:1024px){.we-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
  .we-grid{grid-template-columns:1fr}
  .we-stage{padding:12px}
  .we-more{margin-inline-start:0;width:100%}
  .we-quick{width:100%;overflow-x:auto}
  .we-kpi b{font-size:20px}
}
@media(prefers-reduced-motion:reduce){.we-tile{transition:none}.we-tile:hover{transform:none}}
</style></head>

// sign in with email+password → returns {ok:true,session} or {ok:false,error}
async function admSignIn(email,password){
  let login=null;
  try{
    const res=await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
      method:'POST',headers:{'apikey':SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:password})
    });
    login=await res.json();
    if(!res.ok||!login.access_token){
      return {ok:false,error:(login&&(login.error_description||login.msg||login.error))||('http_'+res.status)};
    }
  }catch(e){return {ok:false,error:'network'};}
  // verify this user is actually an admin
  let isAdmin=false;
  try{
    const ar=await fetch(SB_URL+'/rest/v1/rpc/is_admin',{
      method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+login.access_token,'Content-Type':'application/json'},body:'{}'
    });
    isAdmin=(await ar.json())===true;
  }catch(e){return {ok:false,error:'network'};}
  if(!isAdmin)return {ok:false,error:'not_admin'};
  const sess={access_token:login.access_token,refresh_token:login.refresh_token,
    expires_at:login.expires_at||null,user_id:(login.user&&login.user.id)||null};
  admSetSession(sess);
  return {ok:true,session:sess};
}
// sign out: revoke on server (best effort) + clear local session
async function admSignOut(){
  const sess=admGetSession();
  if(sess&&sess.access_token){
    try{await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+sess.access_token,'Content-Type':'application/json'},body:'{}'});}catch(e){}
  }
  admClearSession();
}

// Batch B: anon RPC call (visitor, no admin session) — used by create_request.
async function admRpcAnon(fn,args){
  try{
    const res=await fetch(SB_URL+'/rest/v1/rpc/'+fn,{method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify(args||{})});
    if(!res.ok)return {ok:false,error:'http_'+res.status};
    return await res.json();
  }catch(e){return {ok:false,error:'network'};}
}
async function admRpc(fn,args){
  const okSess=await admEnsureSession();
  if(!okSess)return {ok:false,error:'session'};
  const sess=admGetSession();
  try{
    const res=await fetch(SB_URL+'/rest/v1/rpc/'+fn,{method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+sess.access_token,'Content-Type':'application/json'},
      body:JSON.stringify(args||{})});
    if(!res.ok){
      if(res.status===401||res.status===403)return {ok:false,error:'session'};
      return {ok:false,error:'http_'+res.status};
    }
    return await res.json();
  }catch(e){return {ok:false,error:'network'};}
}

  try{

// verify an access token really belongs to an admin (server-side, not just localStorage)
async function admVerifyIsAdmin(accessToken){
  try{
    const r=await fetch(SB_URL+'/rest/v1/rpc/is_admin',{method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:'{}'});
    if(!r.ok)return false;
    return (await r.json())===true;
  }catch(e){return false;}
}
// exchange a refresh token for a fresh access token
async function admRefresh(refreshToken){
  try{
    const r=await fetch(SB_URL+'/auth/v1/token?grant_type=refresh_token',{method:'POST',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:refreshToken})});
    const j=await r.json();
    if(!r.ok||!j.access_token)return null;
    return {access_token:j.access_token,refresh_token:j.refresh_token||refreshToken,
      expires_at:j.expires_at||null,user_id:(j.user&&j.user.id)||null};
  }catch(e){return null;}
}
// A5 (reviewer fix): a stored session is only valid if the SERVER confirms it.
// - refresh the access token when expired (or near expiry)
// - then call is_admin() with the (fresh) token
// - on ANY failure: clear the session and return false (→ show login, never open the panel)
// This makes a hand-forged localStorage value useless.
async function admEnsureSession(){
  let sess=admGetSession();
  if(!sess||!sess.access_token||!sess.refresh_token){admClearSession();return false;}
  const nowSec=Math.floor(Date.now()/1000);
  const exp=Number(sess.expires_at||0);
  // refresh if expired or within 60s of expiring (or if expires_at is missing/garbage)
  if(!exp || exp<=nowSec+60){
    const fresh=await admRefresh(sess.refresh_token);
    if(!fresh){admClearSession();return false;}
    admSetSession(fresh);sess=fresh;
  }
  // always confirm with the server that this token maps to an admin
  const ok=await admVerifyIsAdmin(sess.access_token);
  if(!ok){
    // token might be valid but just expired between checks → one refresh+retry
    const fresh=await admRefresh(sess.refresh_token);
    if(fresh){admSetSession(fresh);if(await admVerifyIsAdmin(fresh.access_token))return true;}
    admClearSession();return false;
  }
  return true;
}

async function load(role){
  // A0: load only what the given role needs — don't fetch everything before we know the role.
  //  - admin   : everything (called AFTER PIN check)
  //  - staff   : settings only (their tasks come from staff_get_tasks)
  //  - visitor : requests + settings only (no staff codes, no recurring templates)
  role = role || 'visitor';
  // A1 fix: on the staff page with secure backend, do NOT load the staff table
  // (names+codes). The logged-in staff's display name comes from the session.
  const wantStaff     = (role==='admin');
  const wantRecurring = (role==='admin');
  // A2: on the staff page with secure backend, do NOT fetch all requests — the staff
  // member's tasks come from staff_get_tasks (RPC). Still load staff (for name display) + settings.
  const wantAllRequests = (role!=='staff');
  // A3: a visitor gets the server-filtered track list (live + completed<8h, safe
  // fields only) instead of the whole requests table.
  const visitorTrack = (role==='visitor');
  const [sb,st,rec,cfg]=await Promise.all([
    visitorTrack ? sbFetchTrackList() : (wantAllRequests ? sbFetchAll() : Promise.resolve(null)),
    wantStaff     ? sbFetchStaff()     : Promise.resolve(null),
    wantRecurring ? sbFetchRecurring() : Promise.resolve(null),
    sbFetchSettings()
  ]);
  if(sb!==null)state.requests=sb;
  if(st!==null)state.staff=st;
  if(rec!==null)state.recurring=rec;
  if(cfg){
    if(cfg.lists)state.lists=cfg.lists;
    if(cfg.widgets)state.widgets=Object.assign(JSON.parse(JSON.stringify(DEFAULT_WIDGETS)),cfg.widgets);
  }
  try{const r=await LS.get('advacon_lang');if(r&&r.value)L=r.value;}catch(e){}
  // migrate lists to bilingual {en,ar} objects (categories & priorities) — keeps old data, never loses it
  const AR_CAT={"Maint 🔧":"أعمال الصيانة","Movement 🔄":"النقل والتنقّل","Procurement 🛒":"المشتريات","Fuel Supply ⛽":"تزويد الوقود","Material Transport 🚛":"نقل المواد","Others 🧩":"أخرى","Maintenance":"أعمال الصيانة","Movement":"النقل والتنقّل","Procurement":"المشتريات","Fuel Supply":"تزويد الوقود","Material Transport":"نقل المواد","Others":"أخرى","Administrative":"شؤون إدارية"};
  const EN_CAT={"Maint 🔧":"Maintenance","Movement 🔄":"Movement","Procurement 🛒":"Procurement","Fuel Supply ⛽":"Fuel Supply","Material Transport 🚛":"Material Transport","Others 🧩":"Others"};
  const AR_PRI={"Low":"منخفضة","Med":"متوسطة","Medium":"متوسطة","High":"عالية"};
  let changed=false;
  if(state.lists&&Array.isArray(state.lists.categories)){
    const seen=new Set();const out=[];
    for(let c of state.lists.categories){
      if(typeof c==='string'){const en=EN_CAT[c]||c;const ar=AR_CAT[c]||AR_CAT[en]||en;c={en,ar};changed=true;}
      else if(c&&c.en){if(!c.ar){c.ar=AR_CAT[c.en]||c.en;changed=true;}}
      if(c&&c.en&&!seen.has(c.en)){seen.add(c.en);out.push(c);}
    }
    state.lists.categories=out;
  }
  if(state.lists&&Array.isArray(state.lists.priorities)){
    const seen=new Set();const out=[];
    for(let p of state.lists.priorities){
      if(typeof p==='string'){const en=(p==='Med')?'Medium':p;const ar=AR_PRI[p]||AR_PRI[en]||en;p={en,ar};changed=true;}
      else if(p&&p.en){if(!p.ar){p.ar=AR_PRI[p.en]||p.en;changed=true;}}
      if(p&&p.en&&!seen.has(p.en)){seen.add(p.en);out.push(p);}
    }
    state.lists.priorities=out;
  }
  /* Legacy normalisation ('Med'->'Medium', backfill missing ar) is applied IN MEMORY only.
     It must never write: load() runs for visitors and technicians too, and a settings write
     is now admin-only. The stored data is already migrated, so `changed` is effectively
     always false here; if a stale row ever appears, an admin saving Settings persists the fix. */
  // recurring generator needs templates (loaded for admin only). Keep it running as before
  // for admin; visitor/staff no longer trigger generation from their pages.
  /* CRON: server-side generate_recurring_tasks() runs every minute; browser generation disabled */
}
async function saveLists(){
  // 3-C: settings are admin-only server-side. Patch ONLY `lists` so a concurrent
  // widget change by another admin is not clobbered (same reason admin_patch_staff
  // is partial). app_settings.lists is what app_list_contains() validates against.
  const res=await admRpc('admin_patch_app_settings',{p_patch:{lists:state.lists}});
  if(res&&res.ok===true)return true;
  toast(admOpError(res));
  if(res&&res.error==='session'){admSessionGone();}
  return false;
}

async function saveWidgets(showError){
  // Widgets are shared system settings, so they go through the same admin RPC and patch
  // ONLY `widgets`. Error surfacing is the CALLER's choice: a Settings toggle is a
  // deliberate save (show the error), collapsing a chart is a transient view preference
  // (stay quiet — an expired session must not toast on every click).
  try{
    const res=await admRpc('admin_patch_app_settings',{p_patch:{widgets:state.widgets}});
    if(res&&res.ok===true)return true;
    if(showError){
      toast(admOpError(res));
      if(res&&res.error==='session'){admSessionGone();}
    }
    return false;
  }catch(e){
    if(showError)toast(t('connErr'));
    return false;
  }
}

function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}
// A8-UI global: after an action, show the toast ON TOP of the open modal, keep both ~1s,
// then dismiss toast + close modal TOGETHER. Clicking anywhere dismisses both immediately.
let _finishTimer=null,_finishClickBound=false;
function finishModal(msg){
  const tEl=document.getElementById('toast');
  if(msg&&tEl){tEl.textContent=msg;tEl.classList.add('show');}
  const closeBoth=()=>{
    if(_finishTimer){clearTimeout(_finishTimer);_finishTimer=null;}
    document.removeEventListener('pointerdown',onClick,true);_finishClickBound=false;
    if(tEl)tEl.classList.remove('show');
    modal=null;renderModal();
  };
  const onClick=()=>closeBoth();
  if(!_finishClickBound){document.addEventListener('pointerdown',onClick,true);_finishClickBound=true;}
  _finishTimer=setTimeout(closeBoth,1000);
}

function calc(r){
  const o={...r};
  // scheduled-start tasks: Future (before start) or Ready (start passed, not yet begun)
  o.isScheduled=!!(r.schedStart && r.status==='Not Started' && r.accepted && !r.archived);
  o.isFuture=o.isScheduled && new Date(r.schedStart).getTime()>Date.now();
  o.isReady=o.isScheduled && new Date(r.schedStart).getTime()<=Date.now();
  if(r.start&&r.duration){const d=new Date(r.start);d.setDate(d.getDate()+Number(r.duration)-1);o.due=d.toISOString().slice(0,10);}else o.due='';
  o.effStatus=r.status;
  // overdue counts from the scheduled start; a future task is never overdue

function isOpen(r){return r.accepted && !r.archived && r.effStatus!=='Complete' && r.effStatus!=='Cancelled' && r.status!=='Cancelled';}

function isAccepted(r){return !isArchived(r) && r.accepted;}

function setAdminFlag(){try{sessionStorage.setItem('advacon_admin','1');}catch(e){}}
function clearAdminFlag(){try{sessionStorage.removeItem('advacon_admin');}catch(e){}try{localStorage.removeItem('advacon_admin');}catch(e){}try{LS.delete('advacon_admin');}catch(e){}admClearSession();}
async function checkAdminFlag(){
  // A5 (reviewer fix): with admin auth on, a stored session is only trusted after the
  // SERVER confirms it (refresh if needed + is_admin). A forged localStorage value fails here.
  {return await admEnsureSession();}
  // legacy: session-only PIN flag, cleared automatically when the browser is fully closed
  try{if(sessionStorage.getItem('advacon_admin')==='1')return true;}catch(e){}
  // clean up any old persistent flags from previous versions
  try{localStorage.removeItem('advacon_admin');}catch(e){}
  try{LS.delete('advacon_admin');}catch(e){}
  return false;
}
async function tryAdmin(){
  // The legacy PIN branch is gone: the password was a literal in this file, which
  // every visitor can read. Admin sign-in is email+password via Supabase Auth,
  // verified server-side by is_admin() — the browser cannot grant itself access.
  // Admin sign-in: email + password via Supabase Auth
  const emEl=document.getElementById('admEmail'), pwEl=document.getElementById('admPw'), errEl=document.getElementById('admErr');
  const email=(emEl?emEl.value:'').trim(), pw=(pwEl?pwEl.value:'');
  if(!email||!pw){if(errEl)errEl.textContent=(L==='ar'?'أدخل البريد وكلمة المرور':'Enter email and password');return;}
  if(errEl)errEl.textContent=(L==='ar'?'جارٍ الدخول…':'Signing in…');
  const r=await admSignIn(email,pw);
  if(pwEl)pwEl.value='';   // never keep the password around
  if(!r.ok){
    let msg;
    if(r.error==='not_admin')msg=(L==='ar'?'هذا الحساب ليس مديراً.':'This account is not an admin.');
    else if(r.error==='network')msg=(L==='ar'?'مشكلة بالاتصال. حاول مجدداً.':'Connection problem. Try again.');
    else msg=(L==='ar'?'بريد أو كلمة مرور غير صحيحة.':'Invalid email or password.');
    if(errEl)errEl.textContent=msg;
    // if the login succeeded but the user isn't an admin, sign out to drop the session
    if(r.error==='not_admin'){await admSignOut();}
    return;
  }
  // success → open the manager dashboard
  state.role='admin';state.route='manage';if(!L)L='en';await saveLang();
  await load('admin');
  document.getElementById('gate').innerHTML='';document.getElementById('app').style.display='flex';applyDir();render();startRealtime();
}

function enterPublic(role){state.role=role;if(role==='staff')L='ar';else if(!L)L='ar';document.getElementById('gate').innerHTML='';document.getElementById('app').style.display='block';applyDir();

  if(role==='staff'){const sess=stfGetSession();if(sess&&sess.en){staffName=sess.en;render();loadStaffTasks();startPublicPolling();return;}}

}
let _pubPoll=null;
function startPublicPolling(){
  // A0: only the staff page polls. A2: when secure backend is on, the staff page
  // refreshes ONLY its own tasks via RPC (not all requests).
  if(state.role!=='staff')return;
  if(_pubPoll)return;
  {
    _pubPoll=setInterval(()=>{
      // keep refreshing even when a task's detail is open, so a manager's status
      // change (e.g. On Hold) updates the card/detail live. Only pause while the
      // closeout modal (staffModal2) is open, to not interrupt typing/uploading.
      if(staffModal2)return;
      if(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;
      if(!staffName)return;                 // not logged in yet
      loadStaffTasks();
    },20000);
    return;
  }
  // legacy polling (rollback): re-fetch all requests
  _pubPoll=setInterval(async()=>{if(staffModal||staffModal2)return;if(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;const sb=await sbFetchAll();if(sb!==null){const sig=JSON.stringify(sb.map(r=>[r.id,r.status,r.accepted,r.archived,r.pendingConfirm,r.confirmedAt].join('|')));if(sig!==_pubSig){_pubSig=sig;state.requests=sb;render();}}},20000);
}

/* realtime */
let _rt=null,_rtRef=1,_rtHb=null,_poll=null;
async function refreshNow(){if(state.role!=='admin')return;
  // don't disrupt if a modal is open or user is typing in a field
  if(modal)return;
  if(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;
  const sb=await sbFetchAll();
  if(sb!==null){
    // only re-render if data actually changed (avoid needless flicker)
    const sig=JSON.stringify(sb.map(r=>[r.id,r.status,r.accepted,r.archived,r.assignedTo,r.duration,r.start,r.notes].join('|')));
    if(sig!==_lastSig){_lastSig=sig;state.requests=sb;render();}
    else{state.requests=sb;}
  }
}
let _lastSig='';
function startRealtime(){
  // websocket gives near-instant updates; keep a slower 20s poll only as a fallback
  if(!_poll)_poll=setInterval(refreshNow,20000);
  // also attempt websocket realtime for near-instant updates
  try{if(_rt)return;const ws=SB_URL.replace('https://','wss://')+'/realtime/v1/websocket?apikey='+encodeURIComponent(SB_KEY)+'&vsn=1.0.0';_rt=new WebSocket(ws);_rt.onopen=()=>{_rt.send(JSON.stringify({topic:'realtime:public:requests',event:'phx_join',payload:{config:{postgres_changes:[{event:'*',schema:'public',table:'requests'}]}},ref:String(_rtRef++)}));_rtHb=setInterval(()=>{if(_rt&&_rt.readyState===1)_rt.send(JSON.stringify({topic:'phoenix',event:'heartbeat',payload:{},ref:String(_rtRef++)}));},25000);};_rt.onmessage=(m)=>{try{const d=JSON.parse(m.data);if(d.event==='postgres_changes'||(d.payload&&d.payload.data))refreshNow();}catch(e){}};_rt.onclose=()=>{_rt=null;if(_rtHb){clearInterval(_rtHb);_rtHb=null;}setTimeout(()=>{if(state.role==='admin')startRealtime();},3000);};_rt.onerror=()=>{try{_rt.close();}catch(e){}};}catch(e){}}

function opts(arr,sel){return [`<option value="">${t('select')}</option>`].concat((arr||[]).map(x=>{const v=biVal(x),d=biDisp(x);return `<option value="${esc(v)}" ${v===sel?'selected':''}>${esc(d)}</option>`;})).join('');}

function render(){
  /* CRON: archive_stale_completed_tasks() runs every 10 min server-side; browser auto-archive disabled */
  const app=document.getElementById('app');
  if(state.role==='track'){
    app.innerHTML=`<div class="emp-stage track-stage">
      <button class="lang-float" onclick="toggleLang()">${t('lang')}</button>
      <div class="track-wrap" id="view"></div>
    </div>`;
    document.getElementById('view').innerHTML=viewTrack();
    return;
  }
  if(state.role==='staff'){
    app.innerHTML=`<div class="emp-stage staff-stage">
      <button class="lang-float" onclick="toggleLang()">${t('lang')}</button>
      <div class="track-wrap" id="view"></div>
    </div>`;
    document.getElementById('view').innerHTML=viewStaff();
    return;
  }
  if(state.role!=='admin'){
    // employee: navy stage, single white card
    if(!['thanks','request','choose','track'].includes(state.route))state.route='choose';
    app.innerHTML=`<div class="emp-stage">
      <button class="lang-float" onclick="toggleLang()">${t('lang')}</button>
      <div class="emp-wrap" id="view"></div>
    </div>`;
    let inner;
    if(state.route==='thanks')inner=viewThanks();
    else if(state.route==='request')inner=viewRequest();
    else if(state.route==='track')inner=viewTrack();
    else inner=viewChoose();
    document.getElementById('view').innerHTML=inner;
    return;
  }
  // admin: sidebar shell
  const navk=["reports","manage","archive","staffdir","media","settings","all"];
  const rows=state.requests.map(calc);
  const pendingCount=rows.filter(isIncoming).length;
  let nav=navk.map(k=>{
    const badge=(k==='manage'&&pendingCount>0)?`<span class="badge">${pendingCount}</span>`:'';
    return `<button class="${state.route===k?'active':''}" onclick="go('${k}')"><span class="ic">${t('navIc')[k]}</span><span>${t('nav')[k]}</span>${badge}</button>`;
  }).join('');
  // external pages — open in a new tab (do NOT navigate away from admin)
  nav+=`<div class="side-sep"></div>`;
  nav+=`<button onclick="openExternal('/')"><span class="ic">🌐</span><span>${t('navVisitor')}</span><span class="ext-ic">↗</span></button>`;
  nav+=`<button onclick="openExternal('/staff')"><span class="ic">🛠️</span><span>${t('navTech')}</span><span class="ext-ic">↗</span></button>`;
  app.innerHTML=`
    <button class="menu-btn" onclick="toggleSide()">☰</button>
    ${sideOpen?'<div class="scrim" onclick="toggleSide()"></div>':''}

/* ===== WORK EVIDENCE — Phase 1 =====
   The page answers one question: was the work done? So the tile is a TASK,
   not a photo, and the evidence is what you see first.

   Grounded in the real archive: 1.77 photos per task (no masonry — there is no
   density to justify it), 25:1 photos to files (files are an exception, not a
   peer category), and >=25 tasks carry BOTH a complaint and a proof photo —
   which is why the split tile exists. It is real, but a minority, so every
   other shape degrades cleanly.

   Phase 1 scope: header, KPIs, controls, gallery, pagination. The side panel,
   Timeline/Table views, ZIP and lightbox are Phase 2+ — openEvidencePanel() is
   the seam they attach to.

   Data: state.requests, already loaded by admin_get_requests() (is_admin()
   gated). No new table read, no new grant. */

const WE_PAGE=24;
let weF={q:'',quick:'',from:'',to:'',proj:'',cat:'',tech:'',stat:'',src:'',kind:''};
let weAdv=false;      // "More filters" is closed by default — no vertical filter wall
let wePg=1;
let weSel=0;          // selected task id, Phase 2 reads this

function weUrls(raw){
  if(!raw)return[];
  try{const a=JSON.parse(raw);if(!Array.isArray(a))return[];
    return a.filter(u=>typeof u==='string'&&u);}catch(e){return[];}
}
function weDocs(raw){
  try{const a=JSON.parse(raw||'[]');if(!Array.isArray(a))return[];
    return a.filter(f=>f&&typeof f==='object'&&f.url);}catch(e){return[];}
}
function weAtt(r){
  return {ci:weUrls(r.images), pi:weUrls(r.closeoutImages),
          cd:weDocs(r.files),  pd:weDocs(r.closeoutFiles)};
}
/* Riyadh calendar date. received is stored as a Riyadh date; toISOString() is
   UTC and would return yesterday for the three hours after local midnight. */
function weDay(back){
  return new Date(Date.now()-(back||0)*864e5).toLocaleDateString('en-CA',{timeZone:'Asia/Riyadh'});
}
function weIcon(n){
  const e=String(n||'').toLowerCase().split('.').pop();
  if(e==='pdf')return'📕';
  if(e==='doc'||e==='docx')return'📘';
  if(e==='xls'||e==='xlsx')return'📗';
  if(e==='ppt'||e==='pptx')return'📙';
  return'📄';
}

function weRows(){
  const q=(weF.q||'').trim().toLowerCase().replace(/^#/,'').replace(/^tsk-?/,'');
  return state.requests.map(calc).filter(r=>{
    const a=weAtt(r);
    const nI=a.ci.length+a.pi.length, nD=a.cd.length+a.pd.length;
    if(nI+nD===0)return false;                       // no attachments -> not evidence

    if(weF.kind==='img'&&nI===0)return false;
    if(weF.kind==='file'&&nD===0)return false;
    if(weF.src==='req'&&a.ci.length+a.cd.length===0)return false;
    if(weF.src==='tech'&&a.pi.length+a.pd.length===0)return false;
    if(weF.proj&&r.project!==weF.proj)return false;
    if(weF.cat&&r.category!==weF.cat)return false;
    if(weF.tech&&r.assignedTo!==weF.tech)return false;
    if(weF.stat&&r.effStatus!==weF.stat)return false;

    const d=(r.received||'').slice(0,10);
    if(weF.from&&d&&d<weF.from)return false;
    if(weF.to&&d&&d>weF.to)return false;

    if(q){
      if(/^\d+$/.test(q)){
        // numeric = an ID lookup and nothing else: '341' must not match a task
        // whose title merely contains 341, nor 3410.
        if(String(r.id)!==q)return false;
      }else{
        const hay=[r.title,r.project,r.category,r.assignedTo,r.effStatus,r.requestedBy]
          .join(' ').toLowerCase();
        if(hay.indexOf(q)<0)return false;
      }
    }
    return true;
  }).sort((a,b)=>b.id-a.id);
}

function weStats(rows){
  let img=0,pair=0;
  rows.forEach(r=>{
    const a=weAtt(r);
    img+=a.ci.length+a.pi.length;
    if(a.ci.length&&a.pi.length)pair++;
  });
  return {tasks:rows.length, img:img, pair:pair};
}

/* A broken image (heic on Windows) must leave a labelled placeholder, not a hole.
   Built with DOM calls: putting HTML inside an onerror="" attribute breaks the tag
   the moment that HTML contains a double quote. */
function weFallback(img){
  if(!img||img.dataset.fb)return;
  img.dataset.fb='1';
  img.style.display='none';
  const d=document.createElement('div');
  d.className='we-fb';
  const i=document.createElement('i');
  i.textContent='🖼';
  d.appendChild(i);
  d.appendChild(document.createTextNode(t('wePrev')));
  if(img.parentNode)img.parentNode.appendChild(d);
}

function weTile(r){
  const a=weAtt(r);
  const nI=a.ci.length+a.pi.length, nD=a.cd.length+a.pd.length;
  const both=a.ci.length>0&&a.pi.length>0;
  const half=(url,tag,cls,extra)=>`<div class="we-half">
      <span class="we-tag ${cls}">${tag}</span>
      <img src="${esc(url)}" loading="lazy" alt="${esc(r.title||'')}" onerror="weFallback(this)"/>
      ${extra||''}</div>`;

  let media;
  if(both){
    media=`<div class="we-imgs">
      ${half(a.ci[0],t('weClaim'),'claim')}
      ${half(a.pi[0],t('weProof'),'proof', nI>2?`<span class="we-more-n">+${nI-2}</span>`:'')}
    </div>`;
  }else if(a.pi.length){
    media=`<div class="we-imgs">${half(a.pi[0],t('weProof'),'proof',
      nI>1?`<span class="we-more-n">+${nI-1}</span>`:'')}</div>`;
  }else if(a.ci.length){
    media=`<div class="we-imgs">${half(a.ci[0],t('weClaim'),'claim',
      nI>1?`<span class="we-more-n">+${nI-1}</span>`:'')}</div>`;
  }else{
    // files only: a real document tile, never an empty photo frame
    const d=a.cd.length?a.cd[0]:a.pd[0];
    const src=a.cd.length?t('weSReq'):t('weSTech');
    media=`<div class="we-docs">
      <i>${weIcon(d.name||d.url)}</i>
      <span class="nm">${esc(d.name||t('weDoc'))}</span>
      <span class="ct">${src}${nD>1?' · +'+(nD-1)+' '+t('weMoreF'):''}</span>
    </div>`;
  }

  return `<div class="we-tile ${weSel===r.id?'sel':''}" tabindex="0" onclick="weePick(${r.id})"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();weePick(${r.id});}">
    ${media}
    <div class="we-ft">
      <div class="we-r1"><span class="we-id">${fmtID(r.id)}</span>${effBadge(r)}</div>
      <div class="we-ti">${esc(r.title||'—')}</div>
      <div class="we-r2">
        <span class="we-pj">${esc(r.project||'—')}${r.assignedTo?' · '+esc(r.assignedTo):''}</span>
        <span class="we-ct">${nI?`<span>🖼 ${nI}</span>`:''}${nD?`<span>📄 ${nD}</span>`:''}</span>
      </div>
    </div>
  </div>`;
}

function viewMedia(){
  const all=weRows();
  const s=weStats(all);
  const pages=Math.max(1,Math.ceil(all.length/WE_PAGE));
  if(wePg>pages)wePg=pages;
  const rows=all.slice((wePg-1)*WE_PAGE, wePg*WE_PAGE);

  const opt=(arr,cur)=>arr.map(v=>`<option value="${esc(v)}" ${cur===v?'selected':''}>${esc(v)}</option>`).join('');
  const cats=(state.lists.categories||[]).map(c=>typeof c==='string'?c:(c.en||''));
  const techs=[...new Set(state.requests.map(r=>r.assignedTo).filter(Boolean))].sort();
  const sts=["Not Started","In Progress","On Hold","Needs Review","Needs Update","Complete","Rejected","Cancelled"];
  const qk=(k,lab)=>`<button class="we-chip ${weF.quick===k?'on':''}" onclick="weeQuick('${k}')">${lab}</button>`;

  const head=`<div class="we-hd">
    <div class="we-top">
      <div class="phead" style="margin:0"><h1 style="margin:0">${t('weTitle')}</h1><p class="sub" style="margin:2px 0 0">${t('weSub')}</p></div>
      <div class="we-modes">
        <button class="we-mode on">▦ ${t('weGal')}</button>
        <button class="we-mode" disabled title="${t('weSoonT')}">⋮ ${t('weTime')} <span class="we-soon">${t('weSoon')}</span></button>
        <button class="we-mode" disabled title="${t('weSoonT')}">☰ ${t('weTbl')} <span class="we-soon">${t('weSoon')}</span></button>
      </div>
    </div>
    <div class="we-kpis">
      <div class="we-kpi"><b>${s.tasks}</b><span>${t('weKTasks')}</span></div>
      <div class="we-kpi proof"><b>${s.img}</b><span>${t('weKImgs')}</span></div>
      <div class="we-kpi pair"><b>${s.pair}</b><span>${t('weKPair')}</span></div>
    </div>
  </div>
  <div class="we-ctl">
    <input class="we-srch" type="search" id="we_q" value="${esc(weF.q)}" placeholder="${t('wePh')}"
      oninput="weeSet('q',this.value)" aria-label="${t('weSearch')}"/>
    <div class="we-quick">${qk('today',t('weQT'))}${qk('7',t('weQ7'))}${qk('30',t('weQ30'))}${qk('',t('weQA'))}</div>
    <select class="we-sel" onchange="weeSet('proj',this.value)" aria-label="${t('weProj')}">
      <option value="">${t('weAllP')}</option>${opt(state.lists.projects||[],weF.proj)}</select>
    <div class="we-more">
      <button class="btn sm sec" onclick="weeAdv()">${weAdv?'▲':'▼'} ${t('weMore')}</button>
      <button class="btn sm sec" onclick="weeClear()">${t('weClear')}</button>
    </div>
  </div>
  ${weAdv?`<div class="we-adv">
    <div class="we-f"><label>${t('weFrom')}</label><input type="date" value="${weF.from}" onchange="weeSet('from',this.value)"/></div>
    <div class="we-f"><label>${t('weTo')}</label><input type="date" value="${weF.to}" onchange="weeSet('to',this.value)"/></div>
    <div class="we-f"><label>${t('weCat')}</label><select onchange="weeSet('cat',this.value)"><option value="">${t('weAll')}</option>${opt(cats,weF.cat)}</select></div>
    <div class="we-f"><label>${t('weTech')}</label><select onchange="weeSet('tech',this.value)"><option value="">${t('weAll')}</option>${opt(techs,weF.tech)}</select></div>
    <div class="we-f"><label>${t('weStat')}</label><select onchange="weeSet('stat',this.value)"><option value="">${t('weAll')}</option>${opt(sts,weF.stat)}</select></div>
    <div class="we-f"><label>${t('weSrc')}</label><select onchange="weeSet('src',this.value)">
      <option value="">${t('weAll')}</option>
      <option value="req" ${weF.src==='req'?'selected':''}>${t('weSReq')}</option>
      <option value="tech" ${weF.src==='tech'?'selected':''}>${t('weSTech')}</option></select></div>
    <div class="we-f"><label>${t('weKind')}</label><select onchange="weeSet('kind',this.value)">
      <option value="">${t('weAll')}</option>
      <option value="img" ${weF.kind==='img'?'selected':''}>${t('weKImg')}</option>
      <option value="file" ${weF.kind==='file'?'selected':''}>${t('weKFile')}</option></select></div>
  </div>`:''}`;

  if(!all.length){
    return head+`<div class="we-stage"><div class="we-empty">
      <h3>${t('weNoneT')}</h3><p>${t('weNoneS')}</p></div></div>`;
  }

  const pg=pages>1?`<div class="we-pg">
    <button onclick="weeGo(${wePg-1})" ${wePg<=1?'disabled':''}>${t('wePrevP')}</button>
    <span class="we-pgn">${wePg} / ${pages}</span>
    <button onclick="weeGo(${wePg+1})" ${wePg>=pages?'disabled':''}>${t('weNextP')}</button>
  </div>`:'';

  return head+
    `<div class="we-meta"><span><b>${all.length}</b> ${t('weFound')}</span>
      <span>${t('weShow')} ${(wePg-1)*WE_PAGE+1}–${Math.min(wePg*WE_PAGE,all.length)}</span></div>
    <div class="we-stage"><div class="we-grid">${rows.map(weTile).join('')}</div></div>${pg}`;
}

/* pending images for the request form */
let reqImages=[]; // array of {url, name}
let reqFiles=[];  // array of {url, name} — PDF files
let uploadingCount=0; // attachments currently uploading
function setSubmitState(){const b=document.getElementById('submitBtn');if(!b)return;if(uploadingCount>0){b.disabled=true;b.classList.add('loading');b.textContent=t('waitUpload');}else{b.disabled=false;b.classList.remove('loading');b.innerHTML=t('submit')+' →';}}
async function handleReqImages(input){
  const files=Array.from(input.files||[]);
  if(!files.length)return;
  const wrap=document.getElementById('img-previews');
  for(const f of files){
    // images had no size check at all — an oversized one used to fail with a raw
    // server error after the upload had already started
    if(!uploadAllowed(f)){toast(t('fileRejected'));continue;}
    const tmpId='t'+Math.random().toString(36).slice(2,8);
    if(wrap){const d=document.createElement('div');d.className='img-prev';d.id=tmpId;d.innerHTML='<span class="upl">'+t('uploading')+'</span>';wrap.appendChild(d);}
    uploadingCount++;setSubmitState();
    try{const url=await sbUploadImage(f);reqImages.push({url,name:f.name});const el=document.getElementById(tmpId);if(el)el.innerHTML='<img src="'+url+'"/><button type="button" onclick="removeReqImage(\''+url+'\')">×</button>';}
    catch(e){console.error('upload failed:',e&&e.message?e.message:e);const el=document.getElementById(tmpId);if(el)el.remove();toast(t('connErr'));}
    finally{uploadingCount=Math.max(0,uploadingCount-1);setSubmitState();}
  }
  input.value='';
}
function removeReqImage(url){reqImages=reqImages.filter(x=>x.url!==url);const wrap=document.getElementById('img-previews');if(wrap){[...wrap.children].forEach(c=>{const img=c.querySelector('img');if(img&&img.src===url)c.remove();});}}
// Storage bucket enforces these server-side (20MB, images+pdf+office only, and
// deliberately NOT svg/html/js — an SVG executes script if opened directly).
// We mirror the rules here so the user gets a clear message instead of a raw
// server rejection; the bucket remains the real guard.
const UPLOAD_MAX_BYTES=20*1024*1024;
const UPLOAD_MIME_OK=['image/jpeg','image/png','image/webp','image/heic','image/heif',
  'application/pdf','application/msword',
  'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
  'application/vnd.ms-excel',
  'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
  'application/vnd.ms-powerpoint',
  'application/vnd.openxmlformats-officedocument.presentationml.presentation'];
function uploadAllowed(f){
  if(f.size>UPLOAD_MAX_BYTES)return false;
  if(f.type&&UPLOAD_MIME_OK.indexOf(f.type)>=0)return true;
  // some browsers report an empty type; fall back to the extension
  return /\.(jpe?g|png|webp|heic|heif|pdf|docx?|xlsx?|pptx?)$/i.test(f.name);
}
async function handleReqFiles(input){
  const files=Array.from(input.files||[]);
  if(!files.length)return;
  const wrap=document.getElementById('file-previews');
  for(const f of files){
    if(!uploadAllowed(f)){toast(t('fileRejected'));continue;}
    const tmpId='f'+Math.random().toString(36).slice(2,8);
    if(wrap){const d=document.createElement('div');d.className='file-prev';d.id=tmpId;d.innerHTML='<span class="upl">'+t('uploading')+'</span>';wrap.appendChild(d);}
    uploadingCount++;setSubmitState();
    try{const url=await sbUploadFile(f);reqFiles.push({url,name:f.name});const el=document.getElementById(tmpId);if(el)el.innerHTML='<span class="fic">📄</span><span class="fnm">'+esc(f.name)+'</span><button type="button" onclick="removeReqFile(\''+url+'\')">×</button>';}
    catch(e){console.error('upload failed:',e&&e.message?e.message:e);const el=document.getElementById(tmpId);if(el)el.remove();toast(t('connErr'));}
    finally{uploadingCount=Math.max(0,uploadingCount-1);setSubmitState();}
  }
  input.value='';
}
function removeReqFile(url){reqFiles=reqFiles.filter(x=>x.url!==url);const wrap=document.getElementById('file-previews');if(wrap){[...wrap.children].forEach(c=>{const b=c.querySelector('button');if(b&&b.getAttribute('onclick')&&b.getAttribute('onclick').includes(url))c.remove();});}}

async function submitReq(){
  if(uploadingCount>0){toast(t('waitUpload'));return;}
  const req=document.getElementById('f_req').value.trim(),phone=document.getElementById('f_phone').value.trim(),proj=document.getElementById('f_proj').value,cat=document.getElementById('f_cat').value,title=document.getElementById('f_title').value.trim();
  if(!req||!phone||!proj||!cat||!title){toast(t('fillReq'));return;}
  const btn=document.getElementById('submitBtn');if(btn){btn.disabled=true;btn.classList.add('loading');btn.textContent=t('sending');}
  // Batch B: visitor submit via create_request RPC (server forces all admin fields).
  const imagesJson=JSON.stringify(reqImages.map(x=>x.url));
  const filesJson=JSON.stringify(reqFiles.map(x=>({url:x.url,name:x.name})));
  let id=null;
  try{
    const res=await admRpcAnon('create_request',{p_requested_by:req,p_phone:phone,p_project:proj,p_category:cat,p_title:title,p_priority:document.getElementById('f_pri').value||'Medium',p_images:imagesJson,p_files:filesJson});
    if(res&&res.ok===true){id=res.task_id;}
    else{toast(admOpError(res));if(btn){btn.disabled=false;btn.classList.remove('loading');btn.innerHTML=t('submit')+' →';}return;}
  }catch(e){toast(t('connErr'));if(btn){btn.disabled=false;btn.classList.remove('loading');btn.innerHTML=t('submit')+' →';}return;}
  thanksInfo={id,project:proj,category:cat,received:today()};reqImages=[];reqFiles=[];uploadingCount=0;state.route='thanks';render();
}
async function shareRequest(){
  if(!thanksInfo)return;
  const id=fmtID(thanksInfo.id);
  try{
    const W=1080,H=1080;
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const x=cv.getContext('2d');
    const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,'#16314c');g.addColorStop(1,'#0a1a2b');
    x.fillStyle=g;x.fillRect(0,0,W,H);
    const pad=90,cardY=150;
    x.fillStyle='#ffffff';roundRect(x,pad,cardY,W-2*pad,H-cardY-pad,40);x.fill();
    try{const logo=new Image();logo.src='data:image/png;base64,'+LOGO_B64;await logo.decode();const lw=300,lh=lw*logo.height/logo.width;x.drawImage(logo,(W-lw)/2,cardY+60,lw,lh);}catch(e){}
    const cy=cardY+260;x.fillStyle='#3f9a5c';x.beginPath();x.arc(W/2,cy,70,0,7);x.fill();
    x.strokeStyle='#fff';x.lineWidth=12;x.lineCap='round';x.beginPath();x.moveTo(W/2-32,cy);x.lineTo(W/2-6,cy+26);x.lineTo(W/2+34,cy-22);x.stroke();
    const ar=(L==='ar');
    x.fillStyle='#16314c';x.textAlign='center';
    x.font='bold 52px "Segoe UI",Tahoma,Arial';x.fillText(ar?'تم استلام طلبك':'Request Received',W/2,cy+170);
    x.fillStyle='#eef3f8';roundRect(x,W/2-260,cy+210,520,140,24);x.fill();
    x.fillStyle='#3e6e9e';x.font='30px "Segoe UI",Tahoma,Arial';x.fillText(ar?'رقم الطلب':'Request No.',W/2,cy+258);
    x.fillStyle='#16314c';x.font='bold 76px "Segoe UI",Tahoma,Arial';x.fillText(id,W/2,cy+330);
    x.fillStyle='#5a6b7b';x.font='32px "Segoe UI",Tahoma,Arial';
    const proj=thanksInfo.project||'';const cat=thanksInfo.category?dispCat(thanksInfo.category):'';
    x.fillText((proj?proj:'')+(proj&&cat?'  •  ':'')+(cat?cat:''),W/2,cy+420);
    x.fillStyle='#9aa7b3';x.font='28px "Segoe UI",Tahoma,Arial';x.fillText(thanksInfo.received||today(),W/2,cy+470);
    x.fillStyle='#9aa7b3';x.font='26px "Segoe UI",Tahoma,Arial';x.fillText(ar?'طلبات خدمة التشغيل والصيانة':'Operations & Maintenance Service Requests',W/2,H-pad-50);
    const blob=await new Promise(res=>cv.toBlob(res,'image/png'));
    const file=new File([blob],'request-'+id+'.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:id,text:(ar?'رقم الطلب: ':'Request No: ')+id});
    }else{
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='request-'+id+'.png';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);
      toast(t('imgSaved'));
    }
  }catch(e){toast(t('connErr'));}
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function pager(key,total){if(total<=1)return '';const cur=pageNum[key];let b='';b+=`<button onclick="setPage('${key}',${cur-1})" ${cur<=1?'disabled':''}>‹</button>`;const w=[];for(let i=1;i<=total;i++){if(i===1||i===total||Math.abs(i-cur)<=1)w.push(i);else if(w[w.length-1]!=='…')w.push('…');}w.forEach(p=>{b+=p==='…'?`<span class="pinfo">…</span>`:`<button class="${p===cur?'active':''}" onclick="setPage('${key}',${p})">${p}</button>`;});b+=`<button onclick="setPage('${key}',${cur+1})" ${cur>=total?'disabled':''}>›</button>`;return `<div class="pager">${b}<span class="pinfo">${t('page')} ${cur} ${t('of')} ${total}</span></div>`;}

function dueCell(r){
  let dl=r.daysleft,dlTxt=dl,dlCol='var(--green)';
  if(dl==='✓'){dlTxt='✓';}
  else if(typeof dl==='number'){if(dl<0){dlTxt=Math.abs(dl)+'d '+t('overdueBy');dlCol='var(--red)';}else if(dl<=2){dlTxt=dl+'d';dlCol='var(--amber)';}else{dlTxt=dl+'d';}}
  return {txt:dlTxt,col:dlCol};
}

function taskRow(r){

function addInterval(date,n,unit){
  const d=new Date(date);
  if(unit==='hour')d.setTime(d.getTime()+n*3600000);
  else if(unit==='day')d.setTime(d.getTime()+n*86400000);
  else if(unit==='week')d.setTime(d.getTime()+n*7*86400000);
  else if(unit==='month')d.setMonth(d.getMonth()+n);
  else if(unit==='year')d.setFullYear(d.getFullYear()+n);
  return d;
}

// Maps a schedule to its label and back (weekly <-> 1 week). This lived next to the
// dead runRecurringGenerator and was removed with it — freqKeyOf/freqFromKey below
// still need it, so the Periodic Tasks screen would have thrown on render.
const FREQ_MAP=[['hourly',1,'hour'],['daily',1,'day'],['weekly',1,'week'],['biweekly',2,'week'],['monthly',1,'month'],['bimonthly',2,'month'],['quarterly',3,'month'],['semiannual',6,'month'],['yearly',1,'year']];
function freqKeyOf(n,unit){const m=FREQ_MAP.find(p=>p[1]===Number(n)&&p[2]===unit);return m?m[0]:'daily';}
function freqFromKey(key){const m=FREQ_MAP.find(p=>p[0]===key);return m?{everyN:m[1],everyUnit:m[2]}:{everyN:1,everyUnit:'day'};}
function unitLabel(n,unit){
  return t('freq_'+freqKeyOf(n,unit))||unit;
}

async function savePeriodForm(){
  const g=(id)=>{const e=document.getElementById(id);return e?e.value:'';};
  const id=periodForm._id;
  // preserve original startAt unless the user actually changed the field
  const startField=g('pf_start');
  const origStartLocal=(periodForm.startAt||'').slice(0,16);
  let startAt;
  if(id&&startField===origStartLocal){startAt=periodForm.startAt;}      // unchanged → keep exact original
  else if(startField){startAt=new Date(startField).toISOString();}      // changed → convert
  else{startAt=periodForm.startAt||new Date().toISOString();}
  const freq=freqFromKey(g('pf_unit'));
  // 3-D: templates are saved through admin_save_recurring_task. We send ONLY
  // user-owned fields — last_run_at and gen_count are server-owned. (The old
  // direct write posted last_run_at back on every edit, which let a forged value
  // make Cron back-fill whole cycles.) Keys are snake_case to match the RPC.
  const patch={
    title:g('pf_title').trim(),
    every_n:freq.everyN,
    every_unit:freq.everyUnit,
    start_at:startAt,
    assigned_to:g('pf_staff'),
    project:g('pf_proj'),
    category:g('pf_cat'),
    priority:g('pf_pri'),
    notes:g('pf_notes').trim(),
    active:periodForm.active!==false,
    include_friday:(document.getElementById('pf_friday')?document.getElementById('pf_friday').checked:true)
  };
  if(!patch.title){toast(t('fTitleReq'));return;}
  if(adminActionBusy)return;
  adminActionBusy=true;
  try{
    const res=await admRpc('admin_save_recurring_task',{p_id:id?Number(id):null,p_patch:patch});
    if(res&&res.ok===true){
      const rec=await sbFetchRecurring();if(rec!==null)state.recurring=rec;
      clearDirty();modal=null;render();toast(t('saved'));
      /* CRON handles generation */
    }else{
      toast(admOpError(res));
      if(res&&res.error==='session'){admSessionGone();}
    }
  }finally{adminActionBusy=false;}
}

async function togglePeriod(id){
  // adminActionBusy guards the DOUBLE CLICK: without it the second click reads the
  // already-flipped local value and fires a second, opposite request — the two can
  // then land out of order. Sending the TARGET state (not a flip) also makes the RPC
  // idempotent, so a stale list cannot toggle the row back by accident.
  if(adminActionBusy)return;
  const tpl=state.recurring.find(x=>String(x.id)===String(id));if(!tpl)return;
  const old=!!tpl.active;
  const want=!old;
  adminActionBusy=true;
  tpl.active=want;render();
  try{
    const res=await admRpc('admin_toggle_recurring_task',{p_id:Number(id),p_active:want});
    if(!(res&&res.ok===true)){
      tpl.active=old;render();
      toast(admOpError(res));
      if(res&&res.error==='session'){admSessionGone();}
    }
    /* CRON handles generation */
  }finally{adminActionBusy=false;}
}

function needsAttention(){
  const all=state.requests.map(calc);
  const now=Date.now();
  // overdue: open tasks past due (never archived)
  const overdue=all.filter(r=>r.effStatus==='Overdue'&&!r.archived);
  // stale pending: incoming requests waiting more than 24h since received
  const stalePending=all.filter(r=>isIncoming(r)&&r.receivedAt&&(now-new Date(r.receivedAt).getTime())>24*3600000);
  // long in-progress: in progress more than 7 days since started (never archived)
  const longRunning=all.filter(r=>r.effStatus==='In Progress'&&!r.archived&&r.startedAt&&(now-new Date(r.startedAt).getTime())>7*24*3600000);
  const total=overdue.length+stalePending.length+longRunning.length;
  if(!total)return '';
  const item=(r,reason,col)=>`<div class="na-row" onclick="openEdit(${r.id})"><span class="na-id">${fmtID(r.id)}</span><span class="na-title">${esc(r.title)}</span><span class="na-assignee">${esc(r.assignedTo||r.requestedBy||'—')}</span><span class="na-reason" style="color:${col}">${reason}</span></div>`;
  let rows='';
  overdue.forEach(r=>rows+=item(r,t('naOverdue'),'var(--red)'));
  stalePending.forEach(r=>rows+=item(r,t('naStalePending'),'var(--amber)'));
  longRunning.forEach(r=>rows+=item(r,t('naLongRunning'),'var(--steel)'));
  return `<div class="panel panel-pad na-panel"><div class="na-head"><span class="na-warn">⚠</span> <b>${t('naTitle')}</b> <span class="count-chip">${total}</span></div><div class="na-list">${rows}</div></div>`;
}

function openCloseoutGallery(id,idx){const r=state.requests.find(x=>x.id===id);if(!r)return;let a=[];try{a=JSON.parse(r.closeoutImages||'[]');}catch(e){}if(!a.length)return;modal={type:'img',imgs:a,idx:idx||0};renderModal();}
function returnToAcceptance(id){modal={type:'confirm',title:t('confirmReturnAcceptQ'),msg:fmtID(id),okLabel:t('returnAccept'),okClass:'',onok:'doReturnToAcceptance('+id+')'};renderModal();}
async function doReturnToAcceptance(id){await admTaskAction(id,'return_to_acceptance',null,'returnedToast');}

async function doReturnToTech(id){await admTaskAction(id,'return_to_technician',null,'returnedToast');}
function fmtTime(ts){if(!ts)return '—';try{const d=new Date(new Date(ts).getTime()+3*3600000);const dt=d.toISOString().slice(0,10);let h=d.getUTCHours(),m=d.getUTCMinutes();const ap=h>=12?'PM':'AM';h=h%12||12;return dt+' '+h+':'+String(m).padStart(2,'0')+' '+ap;}catch(e){return ts;}}
function fmtDuration(fromTs,toTs){if(!fromTs||!toTs)return '—';try{const ms=new Date(toTs).getTime()-new Date(fromTs).getTime();if(ms<0)return '—';const totalH=ms/3600000;const days=Math.floor(totalH/24);const hours=Math.round(totalH%24);if(days>0)return days+'d '+hours+'h';return hours+'h';}catch(e){return '—';}}
function inRange(ts,from,to){if(!ts)return false;const d=new Date(ts).getTime();const f=new Date(from+'T00:00:00+03:00').getTime();const t2=new Date(to+'T23:59:59+03:00').getTime();return d>=f&&d<=t2;}
function loadSheetJS(){return new Promise((res,rej)=>{if(window.XLSX)return res(window.XLSX);const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>res(window.XLSX);s.onerror=rej;document.head.appendChild(s);});}

function ddActions(r){
  let b=`<button class="ico" title="${t('edit')}" onclick="event.stopPropagation();openEdit(${r.id})">✎</button>`;
  if(r.effStatus==='Complete'){b+=`<button class="ico" title="${t('reopen')}" onclick="event.stopPropagation();reopenTask(${r.id})">↺</button>`;} else if(r.accepted&&(r.assignedTo||'').trim()&&r.effStatus!=='Cancelled'){if(r.effStatus==='On Hold'||r.effStatus==='Needs Review'||r.effStatus==='Needs Update'){b+=`<button class="ico" title="${t('returnToTech')}" onclick="event.stopPropagation();returnToTech(${r.id})">↩</button>`;}b+=`<button class="ico" title="${t('returnAccept')}" onclick="event.stopPropagation();returnToAcceptance(${r.id})">⤴</button>`;}
  if(isIncoming(r)){b+=`<button class="ico del" title="${t('rejectTask')}" onclick="event.stopPropagation();askReject(${r.id})">🗑</button>`;}
  else if(isAdminArchived(r)){b+=`<button class="ico ok" title="${t('restore')}" onclick="event.stopPropagation();restoreTask(${r.id})">♻</button>`;}
